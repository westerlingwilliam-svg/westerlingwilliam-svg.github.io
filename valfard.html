<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky City: Pro Architect</title>
    <style>
        :root {
            --common: #b5b5b5;
            --uncommon: #1eff00;
            --rare: #0070dd;
            --epic: #a335ee;
            --legendary: #ff8000;
            --mythic: #ff003c;
            --sd-blue: #005293;
            --sd-gold: #fecc00;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at center, #001a33 0%, #000b18 100%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            background: rgba(0, 30, 60, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-bottom: 3px solid var(--sd-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 100;
        }

        .stats-left b { color: var(--sd-gold); font-size: 1.4rem; }

        /* MULTI-BLOCKS */
        .blocks-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px;
        }
        
        .blocks-row {
            display: flex;
            gap: 25px;
            align-items: flex-end;
        }

        .block-wrapper { text-align: center; width: 140px; position: relative; }

        .lucky-block {
            width: 100px; height: 100px;
            background: var(--sd-gold);
            border-radius: 20px;
            display: flex;
            justify-content: center; align-items: center;
            font-size: 4rem; color: var(--sd-blue);
            cursor: pointer;
            box-shadow: 0 8px 0 #b38f00, 0 0 20px rgba(254, 204, 0, 0.2);
            transition: 0.1s;
            user-select: none;
            margin: 0 auto;
            position: relative;
        }
        
        .lucky-block.rare-tier { background: var(--rare); color: white; box-shadow: 0 8px 0 #004a94; }
        .lucky-block:active:not(.disabled) { transform: translateY(4px); box-shadow: 0 4px 0 #b38f00; }
        
        .lucky-block.disabled { 
            opacity: 0.3; 
            cursor: not-allowed; 
            filter: grayscale(1); 
            transform: translateY(4px);
            box-shadow: none !important;
        }

        .cooldown-text {
            position: absolute;
            font-size: 1.5rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 10px black;
            pointer-events: none;
            display: none;
        }

        .drop-info {
            background: rgba(0,0,0,0.5);
            margin-top: 8px;
            padding: 5px;
            border-radius: 8px;
            font-size: 0.7rem;
            border: 1px solid rgba(254, 204, 0, 0.2);
            min-height: 35px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* GAME AREA */
        .game-area { display: flex; flex: 1; overflow: hidden; }
        #city-grid {
            flex: 3; display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 15px; padding: 25px;
        }
        
        .slot {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.05);
            border-radius: 15px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }
        .slot:hover { background: rgba(255,255,255,0.08); border-color: var(--sd-gold); }

        .building-icon { 
            font-size: 3rem; 
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* SIDEBAR */
        .sidebar {
            flex: 1; background: rgba(0, 15, 30, 0.9);
            border-left: 2px solid var(--sd-blue);
            padding: 20px; display: flex; flex-direction: column;
        }
        .inv-item {
            background: rgba(255,255,255,0.05); padding: 12px;
            border-radius: 10px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.2s;
        }
        .inv-item:hover { background: rgba(255,255,255,0.1); }

        .place-btn {
            background: var(--sd-gold); color: var(--sd-blue);
            border: none; padding: 8px 12px; border-radius: 5px;
            font-weight: 900; cursor: pointer;
        }

        #game-msg {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%); background: var(--sd-gold);
            color: #001a33; padding: 12px 30px; border-radius: 50px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            opacity: 0; transition: 0.3s; z-index: 1000;
            font-weight: bold; text-align: center; pointer-events: none;
        }
        .show-msg { opacity: 1 !important; transform: translateX(-50%) translateY(-10px); }
        .highlight { border-color: #00ff99 !important; box-shadow: 0 0 20px rgba(0,255,153,0.3); }
        .mythic-glow { box-shadow: inset 0 0 25px #ff003c, 0 0 15px #ff003c; border-color: #ff003c !important; }
        
        .income-tag { 
            background: rgba(0,0,0,0.6);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem; 
            color: #00ff99; 
            font-weight: bold; 
            margin-top: 5px; 
        }
    </style>
</head>
<body>

<div class="header">
    <div class="stats-left">
        <div>💰 <b id="money">500</b> KR</div>
        <div style="font-size: 0.9rem; opacity: 0.8;">PROD: <span id="pps">0</span>/S</div>
        <button id="upg-luck-btn" class="upgrade-block-btn" onclick="upgradeBlocks()" style="background:#00ff99; border:none; padding:5px 15px; border-radius:15px; cursor:pointer; font-weight:bold; margin-top:10px;">
            LÅS UPP RARE BLOCK: <span id="upg-cost">2500</span> KR
        </button>
    </div>

    <div class="blocks-container">
        <div class="blocks-row">
            <div class="block-wrapper">
                <div id="block-1" class="lucky-block" onclick="buyBlock(1)">?
                    <div id="cd-1" class="cooldown-text">5</div>
                </div>
                <div id="info-1" class="drop-info">Bas-block (250 kr)</div>
            </div>

            <div class="block-wrapper" id="block-2-wrapper" style="display:none;">
                <div id="block-2" class="lucky-block rare-tier" onclick="buyBlock(2)">★
                    <div id="cd-2" class="cooldown-text">5</div>
                </div>
                <div id="info-2" class="drop-info">Rare-block (1500 kr)</div>
            </div>
        </div>
    </div>

    <div style="text-align: right;">
        <button onclick="resetGame()" style="background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer;">[ Reset ]</button>
        <a href="games.html" style="color: white; text-decoration: none; margin-left:10px; font-weight: bold;">[ AVSLUTA ]</a>
    </div>
</div>

<div class="game-area">
    <div id="city-grid"></div>
    <div class="sidebar">
        <h2 style="margin:0 0 15px 0; font-size: 1.2rem; color: var(--sd-gold); text-align: center;">INVENTORY</h2>
        <div id="inventory" style="overflow-y: auto;"></div>
    </div>
</div>

<div id="game-msg">Meddelande</div>

<script>
    let money = 500;
    let upgCost = 2500;
    let hasSecondBlock = false;
    let inventory = [];
    let cityData = Array(30).fill(null);
    let selectedInvIndex = null;
    let cooldowns = [0, 0];

    const buildings = [
        { name: "Svensk Stuga", icon: "🏠", rarity: "Common", income: 10, color: "#b5b5b5" },
        { name: "Skånelänga", icon: "🏡", rarity: "Uncommon", income: 30, color: "#1eff00" },
        { name: "Stadshus", icon: "🏙️", rarity: "Rare", income: 100, color: "#0070dd" },
        { name: "Kärnkraftverk", icon: "⚛️", rarity: "Epic", income: 400, color: "#a335ee" },
        { name: "Guld-Slott", icon: "🏰", rarity: "Legendary", income: 2000, color: "#ff8000" },
        { name: "Jimmies Imperium", icon: "💎", rarity: "Mythic", income: 12000, color: "#ff003c" }
    ];

    function saveGame() {
        const gameData = { money, upgCost, hasSecondBlock, inventory, cityData };
        localStorage.setItem('valfard_pro_save', JSON.stringify(gameData));
    }

    function loadGame() {
        const saved = localStorage.getItem('valfard_pro_save');
        if (saved) {
            const data = JSON.parse(saved);
            money = data.money; upgCost = data.upgCost;
            hasSecondBlock = data.hasSecondBlock;
            inventory = data.inventory; cityData = data.cityData;
            if(hasSecondBlock) {
                document.getElementById('block-2-wrapper').style.display = 'block';
                document.getElementById('upg-luck-btn').style.display = 'none';
            }
        }
    }

    function resetGame() {
        if(confirm("Vill du nollställa din stad?")) {
            localStorage.removeItem('valfard_pro_save');
            location.reload();
        }
    }

    function buyBlock(tier) {
        if (cooldowns[tier-1] > 0) return;
        let cost = tier === 1 ? 250 : 1500;

        if (money >= cost) {
            money -= cost;
            startCooldown(tier);
            
            const rand = Math.random() * 100;
            let wonItem;
            let mythicC, legC, epicC, rareC, uncC, comC;

            if (tier === 1) {
                mythicC = 0.5; legC = 2; epicC = 8; rareC = 15; uncC = 25;
                comC = 49.5;
                if (rand < mythicC) wonItem = buildings[5];
                else if (rand < 2.5) wonItem = buildings[4];
                else if (rand < 10.5) wonItem = buildings[3];
                else if (rand < 25.5) wonItem = buildings[2];
                else if (rand < 50.5) wonItem = buildings[1];
                else wonItem = buildings[0];
            } else {
                // Rare Block har bättre odds och ingen Common/Uncommon
                mythicC = 5; legC = 15; epicC = 30; rareC = 50;
                if (rand < 5) wonItem = buildings[5];
                else if (rand < 20) wonItem = buildings[4];
                else if (rand < 50) wonItem = buildings[3];
                else wonItem = buildings[2];
            }

            inventory.push({ ...wonItem, id: Date.now() });
            
            const display = document.getElementById(`info-${tier}`);
            display.innerHTML = `
                <span style="font-weight:bold; color:${wonItem.color}">${wonItem.name.toUpperCase()}</span>
                <span style="opacity:0.8">${wonItem.rarity}</span>
            `;

            renderInventory();
            updateUI();
            saveGame();
        } else {
            showMessage("⚠️ Inte tillräckligt med pengar!");
        }
    }

    function startCooldown(tier) {
        cooldowns[tier-1] = 5;
        const block = document.getElementById(`block-${tier}`);
        const cdText = document.getElementById(`cd-${tier}`);
        block.classList.add('disabled');
        cdText.style.display = 'block';

        let timer = setInterval(() => {
            cooldowns[tier-1]--;
            cdText.innerText = cooldowns[tier-1];
            if (cooldowns[tier-1] <= 0) {
                clearInterval(timer);
                block.classList.remove('disabled');
                cdText.style.display = 'none';
            }
        }, 1000);
    }

    function upgradeBlocks() {
        if (money >= upgCost) {
            money -= upgCost;
            hasSecondBlock = true;
            document.getElementById('block-2-wrapper').style.display = 'block';
            document.getElementById('upg-luck-btn').style.display = 'none';
            showMessage("⭐ RARE BLOCK UPPLÅST!");
            updateUI();
            saveGame();
        } else {
            showMessage("⚠️ Du har inte råd!");
        }
    }

    function handleSlotClick(i) {
        if (selectedInvIndex !== null) {
            placeBuilding(i);
        } else if (cityData[i] !== null) {
            pickUpBuilding(i);
        }
    }

    function pickUpBuilding(i) {
        inventory.push(cityData[i]);
        cityData[i] = null;
        showMessage("📦 Plockade upp byggnaden!");
        renderCity();
        renderInventory();
        updateUI();
        saveGame();
    }

    function placeBuilding(slotIndex) {
        if (!cityData[slotIndex]) {
            cityData[slotIndex] = inventory[selectedInvIndex];
            inventory.splice(selectedInvIndex, 1);
            selectedInvIndex = null;
            renderCity();
            renderInventory();
            updateUI();
            saveGame();
        }
    }

    function showMessage(html) {
        const msg = document.getElementById('game-msg');
        msg.innerHTML = html;
        msg.classList.add('show-msg');
        setTimeout(() => msg.classList.remove('show-msg'), 2000);
    }

    function renderInventory() {
        const invEl = document.getElementById('inventory');
        invEl.innerHTML = '';
        inventory.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'inv-item';
            div.style.borderLeft = `5px solid ${item.color}`;
            div.innerHTML = `
                <div><b style="color:${item.color}">${item.icon}</b> ${item.name}<br><small>${item.rarity}</small></div>
                <button class="place-btn" onclick="event.stopPropagation(); preparePlacement(${index})">BYGG</button>
            `;
            invEl.appendChild(div);
        });
    }

    function preparePlacement(index) {
        selectedInvIndex = index;
        showMessage("Välj en ruta i staden!");
        const slots = document.getElementsByClassName('slot');
        for (let s of Array.from(slots)) {
            if (!s.innerHTML.trim()) s.classList.add('highlight');
        }
    }

    function renderCity() {
        const grid = document.getElementById('city-grid');
        grid.innerHTML = '';
        cityData.forEach((data, i) => {
            const slot = document.createElement('div');
            slot.className = 'slot';
            if (data) {
                slot.innerHTML = `
                    <div class="building-icon">${data.icon}</div>
                    <div class="income-tag">+${data.income}/s</div>
                `;
                if(data.rarity === "Mythic") slot.classList.add('mythic-glow');
            }
            slot.onclick = () => handleSlotClick(i);
            grid.appendChild(slot);
        });
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(money).toLocaleString();
        const income = cityData.reduce((t, b) => t + (b ? b.income : 0), 0);
        document.getElementById('pps').innerText = income.toLocaleString();
    }

    setInterval(() => {
        const income = cityData.reduce((t, b) => t + (b ? b.income : 0), 0);
        money += income;
        updateUI();
    }, 1000);

    loadGame();
    renderCity();
    renderInventory();
    updateUI();
</script>

</body>
</html>
