<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky City: Builder Update</title>
    <style>
        :root {
            --common: #b5b5b5;
            --uncommon: #1eff00;
            --rare: #0070dd;
            --epic: #a335ee;
            --legendary: #ff8000;
            --mythic: #ff003c;
            --sd-blue: #005293;
            --sd-gold: #fecc00;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at center, #002b55 0%, #001a33 100%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            background: rgba(0, 82, 147, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-bottom: 3px solid var(--sd-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .stats-left b { color: var(--sd-gold); font-size: 1.4rem; }

        /* LUCKY BLOCK & INFO */
        .block-container { text-align: center; width: 350px; }
        #lucky-block {
            width: 120px; height: 120px;
            background: var(--sd-gold);
            border-radius: 20px;
            display: flex;
            justify-content: center; align-items: center;
            font-size: 4.5rem; color: var(--sd-blue);
            cursor: pointer;
            box-shadow: 0 10px 0 #b38f00, 0 0 30px rgba(254, 204, 0, 0.3);
            transition: 0.1s;
            animation: pulse 2s infinite;
            user-select: none;
            margin: 0 auto;
        }
        #lucky-block:active { transform: translateY(8px) scale(0.95); box-shadow: 0 2px 0 #b38f00; }
        
        .drop-info {
            background: rgba(0,0,0,0.4);
            margin-top: 10px;
            padding: 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            border: 1px solid rgba(254, 204, 0, 0.2);
            min-height: 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .upgrade-block-btn {
            background: #00ff99;
            color: #001a33;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.8rem;
            box-shadow: 0 4px 0 #009966;
        }

        /* GAME AREA */
        .game-area { display: flex; flex: 1; overflow: hidden; }
        #city-grid {
            flex: 3; display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 12px; padding: 25px;
        }
        .slot {
            background: rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: 0.2s;
            cursor: pointer;
        }
        .slot:hover { border-color: rgba(254, 204, 0, 0.5); }
        .income-tag { font-size: 0.75rem; color: #00ff99; font-weight: bold; margin-top: 5px; }

        /* SIDEBAR */
        .sidebar {
            flex: 1; background: rgba(0, 20, 40, 0.8);
            border-left: 1px solid rgba(254, 204, 0, 0.2);
            padding: 20px; display: flex; flex-direction: column;
        }
        .inv-item {
            background: rgba(255,255,255,0.05); padding: 12px;
            border-radius: 10px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .place-btn {
            background: var(--sd-gold); color: var(--sd-blue);
            border: none; padding: 8px 12px; border-radius: 5px;
            font-weight: 900; cursor: pointer;
        }

        /* MSG */
        #game-msg {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%); background: var(--sd-blue);
            padding: 12px 30px; border-radius: 10px; border: 2px solid var(--sd-gold);
            opacity: 0; transition: 0.3s; z-index: 1000;
            font-weight: bold; text-align: center; pointer-events: none;
        }
        .show-msg { opacity: 1 !important; }
        .highlight { border-color: #00ff99 !important; box-shadow: 0 0 15px rgba(0,255,153,0.3); }
        .mythic-glow { box-shadow: inset 0 0 15px #ff003c; border-color: #ff003c !important; }
    </style>
</head>
<body>

<div class="header">
    <div class="stats-left">
        <div>PENGAR: <b id="money">500</b> KR</div>
        <div>PRODUKTION: <b id="pps">0</b> KR/S</div>
    </div>

    <div class="block-container">
        <div id="lucky-block">?</div>
        <div id="drop-display" class="drop-info">
            Öppna ett block för att se vad du får!
        </div>
        <button id="upg-luck-btn" class="upgrade-block-btn" onclick="upgradeLuck()">UPPGRADERA TUR (Lv <span id="luck-lv">1</span>): <span id="upg-cost">1000</span> KR</button>
    </div>

    <div style="text-align: right;">
        <button onclick="resetGame()" style="background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer;">[ Reset ]</button>
        <a href="games.html" style="color: white; text-decoration: none; margin-left:10px; font-weight: bold;">[ AVSLUTA ]</a>
    </div>
</div>

<div class="game-area">
    <div id="city-grid"></div>
    <div class="sidebar">
        <h2 style="margin:0 0 15px 0; font-size: 1.2rem; color: var(--sd-gold); text-align: center;">INVENTORY</h2>
        <div id="inventory" style="overflow-y: auto;"></div>
    </div>
</div>

<div id="game-msg">Meddelande</div>

<script>
    let money = 500;
    const blockCost = 250;
    let luckLevel = 1;
    let upgCost = 1000;
    let inventory = [];
    let cityData = Array(30).fill(null);
    let selectedInvIndex = null;

    const buildings = [
        { name: "Röd Stuga", icon: "🏠", rarity: "Common", income: 10, color: "#b5b5b5" },
        { name: "Skånelänga", icon: "🏡", rarity: "Uncommon", income: 25, color: "#1eff00" },
        { name: "Hyreshus", icon: "🏢", rarity: "Rare", income: 75, color: "#0070dd" },
        { name: "Kärnkraftverk", icon: "⚛️", rarity: "Epic", income: 300, color: "#a335ee" },
        { name: "Guld-Slott", icon: "🏰", rarity: "Legendary", income: 1800, color: "#ff8000" },
        { name: "Jimmies Imperium", icon: "💎", rarity: "Mythic", income: 10000, color: "#ff003c" }
    ];

    function saveGame() {
        const gameData = { money, luckLevel, upgCost, inventory, cityData };
        localStorage.setItem('valfard_builder_save', JSON.stringify(gameData));
    }

    function loadGame() {
        const saved = localStorage.getItem('valfard_builder_save');
        if (saved) {
            const data = JSON.parse(saved);
            money = data.money; luckLevel = data.luckLevel; upgCost = data.upgCost;
            inventory = data.inventory; cityData = data.cityData;
        }
    }

    function resetGame() {
        if(confirm("Vill du nollställa din stad?")) {
            localStorage.removeItem('valfard_builder_save');
            location.reload();
        }
    }

    const grid = document.getElementById('city-grid');
    for (let i = 0; i < 30; i++) {
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.onclick = () => handleSlotClick(i);
        grid.appendChild(slot);
    }

    document.getElementById('lucky-block').onclick = function() {
        if (money >= blockCost) {
            money -= blockCost;
            
            const rand = Math.random() * 100;
            let wonItem;

            let mythicC = (luckLevel >= 3) ? (0.5 + luckLevel) : 0;
            let legC = 2 + (luckLevel * 2);
            let epicC = 8 + (luckLevel * 3);
            let rareC = 15 + (luckLevel * 4);
            let uncC = 25;
            let comC = Math.max(0, 100 - (mythicC + legC + epicC + rareC + uncC));

            if (rand < mythicC) wonItem = buildings[5];
            else if (rand < mythicC + legC) wonItem = buildings[4];
            else if (rand < mythicC + legC + epicC) wonItem = buildings[3];
            else if (rand < mythicC + legC + epicC + rareC) wonItem = buildings[2];
            else if (rand < mythicC + legC + epicC + rareC + uncC) wonItem = buildings[1];
            else wonItem = buildings[0];

            // Beräkna procent för den vinsten
            let winChance = 0;
            if(wonItem.rarity === "Mythic") winChance = mythicC;
            else if(wonItem.rarity === "Legendary") winChance = legC;
            else if(wonItem.rarity === "Epic") winChance = epicC;
            else if(wonItem.rarity === "Rare") winChance = rareC;
            else if(wonItem.rarity === "Uncommon") winChance = uncC;
            else winChance = comC;

            inventory.push({ ...wonItem, id: Date.now() });
            
            // Uppdatera displayen under blocket
            const display = document.getElementById('drop-display');
            display.innerHTML = `
                <span style="font-weight:bold; color:${wonItem.color}">${wonItem.name.toUpperCase()}</span>
                <span style="opacity:0.8">${wonItem.rarity} | Chans: ${winChance.toFixed(1)}%</span>
            `;

            renderInventory();
            updateUI();
            saveGame();
        } else {
            showMessage("⚠️ Inte tillräckligt med pengar!");
        }
    };

    function handleSlotClick(i) {
        if (selectedInvIndex !== null) {
            placeBuilding(i);
        } else if (cityData[i] !== null) {
            pickUpBuilding(i);
        }
    }

    function pickUpBuilding(i) {
        inventory.push(cityData[i]);
        cityData[i] = null;
        showMessage("📦 Plockade upp byggnaden!");
        renderCity();
        renderInventory();
        updateUI();
        saveGame();
    }

    function placeBuilding(slotIndex) {
        if (!cityData[slotIndex]) {
            cityData[slotIndex] = inventory[selectedInvIndex];
            inventory.splice(selectedInvIndex, 1);
            selectedInvIndex = null;
            const slots = document.getElementsByClassName('slot');
            for (let s of slots) s.classList.remove('highlight');
            renderCity();
            renderInventory();
            updateUI();
            saveGame();
        }
    }

    function upgradeLuck() {
        if (money >= upgCost) {
            money -= upgCost;
            luckLevel++;
            upgCost = Math.ceil(upgCost * 3);
            updateUI();
            saveGame();
            showMessage(`TUR UPPGRADERAD! Nivå ${luckLevel}`);
        } else {
            showMessage("⚠️ Du har inte råd!");
        }
    }

    function showMessage(html) {
        const msg = document.getElementById('game-msg');
        msg.innerHTML = html;
        msg.classList.add('show-msg');
        setTimeout(() => msg.classList.remove('show-msg'), 2000);
    }

    function renderInventory() {
        const invEl = document.getElementById('inventory');
        invEl.innerHTML = '';
        inventory.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'inv-item';
            div.style.borderLeft = `5px solid ${item.color}`;
            div.innerHTML = `
                <div><b style="color:${item.color}">${item.icon}</b> ${item.name}<br><small>${item.rarity}</small></div>
                <button class="place-btn" onclick="event.stopPropagation(); preparePlacement(${index})">BYGG</button>
            `;
            invEl.appendChild(div);
        });
    }

    function preparePlacement(index) {
        selectedInvIndex = index;
        showMessage("Klicka på en tom ruta för att bygga!");
        const slots = document.getElementsByClassName('slot');
        for (let s of slots) { if (!s.dataset.occupied) s.classList.add('highlight'); }
    }

    function renderCity() {
        const slots = document.getElementsByClassName('slot');
        cityData.forEach((data, i) => {
            if (data) {
                slots[i].innerHTML = `
                    <div style="font-size:2.8rem">${data.icon}</div>
                    <div class="income-tag" style="color:${data.color}">+${data.income}/s</div>
                `;
                slots[i].dataset.occupied = "true";
                slots[i].style.background = "rgba(255,255,255,0.1)";
                if(data.rarity === "Mythic") slots[i].classList.add('mythic-glow');
            } else {
                slots[i].innerHTML = "";
                slots[i].classList.remove('mythic-glow');
                delete slots[i].dataset.occupied;
                slots[i].style.background = "";
            }
        });
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(money).toLocaleString();
        const income = cityData.reduce((t, b) => t + (b ? b.income : 0), 0);
        document.getElementById('pps').innerText = income.toLocaleString();
        document.getElementById('luck-lv').innerText = luckLevel;
        document.getElementById('upg-cost').innerText = upgCost.toLocaleString();
        document.getElementById('upg-luck-btn').disabled = (money < upgCost);
    }

    setInterval(() => {
        const income = cityData.reduce((t, b) => t + (b ? b.income : 0), 0);
        money += income;
        updateUI();
    }, 1000);

    loadGame();
    renderCity();
    renderInventory();
    updateUI();
</script>

</body>
</html>
