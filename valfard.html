<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky City - Fullscreen Edition</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
    --gold:#f5c842;--gold2:#e8a800;--gold-glow:rgba(245,200,66,0.35);
    --bg:#07080f;--bg2:#0d1020;--bg3:#131629;--bg4:#1a1f35;
    --border:#ffffff12;--border2:#ffffff22;--border3:#ffffff35;
    --text:#e8eaf6;--muted:#6b7099;--muted2:#9196bb;
    --r12:12px;--r16:16px;--r20:20px;
}
html,body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:var(--bg);
    color:var(--text);
    font-family:'Segoe UI',system-ui,sans-serif;
    display:flex;
    flex-direction:column;
    zoom: 1.25;
    -moz-transform: scale(1.25);
    -moz-transform-origin: 0 0;
}

/* HEADER */
#header{display:grid;grid-template-columns:350px 1fr 200px;align-items:center;padding:0 30px;height:220px;background:var(--bg2);border-bottom:2px solid var(--border2);position:relative;z-index:10;box-shadow:0 4px 50px rgba(0,0,0,0.8)}
#header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

.stat-label{font-size:0.9rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:5px}
.stat-money{font-size:2.5rem;font-weight:800;color:var(--gold);letter-spacing:-1px;line-height:1}
.stat-money .unit{font-size:1.2rem;color:var(--muted2);font-weight:400}
.stat-pps{font-size:1.2rem;color:var(--muted2);margin-top:8px}
.stat-pps span{color:#4ade80;font-weight:700}

#upg-luck-btn{margin-top:12px;display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#1a2a1a,#0d1f0d);border:2px solid #4ade8055;color:#4ade80;padding:10px 20px;border-radius:30px;cursor:pointer;font-size:0.85rem;font-weight:800;transition:all 0.2s;text-transform:uppercase}

/* NY MENY-KNAPP OCH RESET POSITIONERING */
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:15px;justify-content:center;height:100%}

.menu-link-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border3);
    color: var(--text);
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 12px;
    font-weight: 800;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
}
.menu-link-btn:hover {
    background: var(--text);
    color: #000;
}

.reset-btn {
    background: transparent;
    color: #ff4444;
    border: 1px solid #ff444444;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 0.7rem;
    transition: all 0.2s;
    opacity: 0.6;
}
.reset-btn:hover {
    opacity: 1;
    background: #ff444411;
}

/* LUCKY BLOCKS */
.blocks-row{display:flex;gap:15px;justify-content:center;align-items:flex-start}
.block-wrapper{display:flex;flex-direction:column;align-items:center;gap:8px;width:140px}
.lucky-block{width:110px;height:110px;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;position:relative;transition:all 0.15s;border:2px solid rgba(255,255,255,0.15)}

.bt1{background:linear-gradient(145deg,#3a3a3e,#1f1f23);box-shadow:0 8px 0 #0e0e10}
.bt2{background:linear-gradient(145deg,#2a5a2e,#0d3b10);box-shadow:0 8px 0 #081a0a}
.bt3{background:linear-gradient(145deg,#1d2e4a,#0d1a2d);box-shadow:0 8px 0 #090f18}
.bt4{background:linear-gradient(145deg,#2e1d4a,#180d2d);box-shadow:0 8px 0 #0e0818}
.bt5{background:linear-gradient(145deg,#4a321d,#2d1a0d);box-shadow:0 8px 0 #140a02}

.block-icon{font-size:3rem;line-height:1}
.block-stars{display:flex;gap:3px;margin-top:5px}
.bstar{font-size:12px}
.bstar.on{color:var(--gold)}
.bstar.off{color:#2a2a3a}

.block-meta{text-align:center;width:100%;margin-top:5px}
.block-name{font-size:0.8rem;font-weight:800;color:var(--muted2);text-transform:uppercase}
.block-price{font-size:0.9rem;color:var(--gold);font-weight:800;margin:2px 0}
.upg-bl-btn{width:100%;padding:6px 0;border-radius:8px;cursor:pointer;font-size:0.75rem;font-weight:800;border:1px solid var(--border2);background:rgba(255,255,255,0.06);color:var(--text)}

/* CITY GRID */
#game-area{display:flex;flex:1;height:calc(100vh - 220px);overflow:hidden}
#city-grid{
    flex:1;
    display:grid;
    grid-template-columns:repeat(6, 160px);
    grid-auto-rows: 160px;
    gap:15px;
    padding:15px; 
    margin-top: -10px; 
    justify-content:center;
    background:radial-gradient(circle at center, var(--bg2), var(--bg));
    overflow-y: auto;
}

.slot{border-radius:var(--r20);border:2px solid var(--border);background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all 0.25s;width:160px;height:160px}
.slot-icon{font-size:3.5rem;margin-bottom:5px;animation:flt 3s ease-in-out infinite}
.slot-lvl{position:absolute;top:10px;left:10px;background:#000;padding:4px 8px;border-radius:6px;font-size:0.75rem;font-weight:800;color:var(--gold);border:1px solid var(--border2)}
.slot-income{font-size:0.9rem;font-weight:800;color:#4ade80;background:rgba(0,0,0,0.3);padding:4px 10px;border-radius:10px}
.upg-btn{margin-top:8px;width:85%;padding:6px 0;border-radius:10px;background:var(--gold);color:#000;font-size:0.8rem;font-weight:900;border:none;cursor:pointer}

/* HIGHLIGHT FÖR TOMMA RUTOR */
.highlight-empty{
    border-color: #4ade80 !important;
    box-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
    animation: pulse-green 1.5s infinite;
}
@keyframes pulse-green {
    0% { background: var(--bg3); }
    50% { background: rgba(74, 222, 128, 0.15); }
    100% { background: var(--bg3); }
}

/* SIDEBAR */
#sidebar{width:420px;flex-shrink:0;background:var(--bg2);border-left:2px solid var(--border2);display:flex;flex-direction:column}
.sidebar-tabs{display:flex;padding:20px;gap:12px}
.tab-btn{flex:1;padding:14px;border-radius:15px;border:2px solid var(--border2);background:var(--bg3);color:var(--muted);font-size:0.9rem;font-weight:800;text-transform:uppercase;cursor:pointer}
.tab-btn.active{background:var(--gold);color:#000;border-color:var(--gold);box-shadow:0 0 20px var(--gold-glow)}

.sidebar-content{flex:1;overflow-y:auto;padding:20px}
#inventory{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.inv-card{border-radius:var(--r20);padding:15px 10px;background:var(--bg4);border:2px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:10px}
.inv-icon{font-size:3rem}
.inv-name{font-size:0.9rem;font-weight:800}

.inv-btns{display:flex;flex-direction:column;gap:6px;width:90%}
.inv-btns button{width:100%;padding:8px;border-radius:10px;font-size:0.8rem;font-weight:800;cursor:pointer;border:none}
.bld-btn{background:#4ade80;color:#000}
.sll-btn{background:rgba(239,68,68,0.2);color:#f87171;border:1px solid #f87171!important}

/* SHOP */
#shop-ui{display:flex;flex-direction:column;gap:15px}
.shop-card{border-radius:var(--r20);padding:15px;background:var(--bg4);border:2px solid var(--border2);display:flex;align-items:center;gap:15px}
.shop-ico{font-size:2.5rem}
.buy-btn2{padding:10px 15px;border-radius:10px;font-weight:800;font-size:0.85rem;background:#4ade80;color:#000;border:none;cursor:pointer}

/* TOAST */
#toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:var(--gold);color:#000;padding:18px 40px;border-radius:40px;font-size:1.2rem;font-weight:800;z-index:1000;opacity:0;pointer-events:none;transition:all 0.3s}
#toast.show{opacity:1;transform:translateX(-50%) translateY(-20px)}

@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
</style>
</head>
<body>

<div id="header">
  <div>
    <div class="stat-label">Stadsbudget</div>
    <div class="stat-money">💰 <span id="money">500</span> <span class="unit">KR</span></div>
    <div class="stat-pps">Produktion: <span id="pps">0</span>/s</div>
    <button id="upg-luck-btn" onclick="upgradeBlocks()">⚡ Lås upp nästa block — <span id="upg-cost">2 500</span> KR</button>
  </div>
  <div class="blocks-row" id="blocks-row"></div>
  <div class="header-right">
    <a href="games.html" class="menu-link-btn">⬅ TILL MENYN</a>
    <button class="reset-btn" onclick="resetGame()">↺ ÅTERSTÄLL STADEN</button>
  </div>
</div>

<div id="game-area">
  <div id="city-grid"></div>
  <div id="sidebar">
    <div class="sidebar-tabs">
      <button class="tab-btn active" id="inv-tab" onclick="switchTab('inv')">Lager</button>
      <button class="tab-btn" id="shop-tab" onclick="switchTab('shop')">Butik</button>
    </div>
    <div class="sidebar-content">
      <div id="inventory"></div>
      <div id="shop-ui" style="display:none"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let money=500,currentMaxBlock=1,inventory=[],cityData=Array(24).fill(null);
let selectedInvIndex=null,cooldowns=[0,0,0,0,0];
let globalMultiplier=1,sellBonus=1,cdReduction=0;
let blockLevels=[0,0,0,0,0],shopLevels=[0,0,0];

const upgCosts=[0,2500,15000,75000,300000];
const blockPrices=[250,1500,7500,35000,150000];
const blockIcons=['❓','⭐','💠','💜','👑'];
const blockNames=['Common','Uncommon','Rare','Epic','Legend'];

const shopUpgrades=[
  {name:'Snabbare Leverans',desc:'-1s cooldown',icon:'⚡',costs:[10000,50000,200000,750000,2500000],maxLevel:5,apply:()=>{cdReduction++}},
  {name:'Skattesänkning',desc:'+25% säljpris',icon:'💸',costs:[25000,125000,500000,2000000,8000000],maxLevel:5,apply:()=>{sellBonus+=0.25}},
  {name:'Arbetsmoral',desc:'+15% produktion',icon:'📈',costs:[50000,250000,1000000,4000000,15000000],maxLevel:5,apply:()=>{globalMultiplier+=0.15}}
];

function bUpgCost(t,l){return Math.floor([5000,25000,100000,400000,1500000][t-1]*Math.pow(4,l))}

const buildings=[
  {name:'Stuga',icon:'🏠',rarity:'Common',income:10,color:'#9e9e9e',sellPrice:50,level:1},
  {name:'Bod',icon:'🛖',rarity:'Common',income:8,color:'#9e9e9e',sellPrice:40,level:1},
  {name:'Garage',icon:'🚗',rarity:'Common',income:12,color:'#9e9e9e',sellPrice:60,level:1},
  {name:'Kiosk',icon:'🏪',rarity:'Common',income:15,color:'#9e9e9e',sellPrice:75,level:1},
  {name:'Länga',icon:'🏡',rarity:'Uncommon',income:35,color:'#4caf50',sellPrice:600,level:1},
  {name:'Pizzeria',icon:'🍕',rarity:'Uncommon',income:45,color:'#4caf50',sellPrice:750,level:1},
  {name:'Macken',icon:'⛽',rarity:'Uncommon',income:50,color:'#4caf50',sellPrice:800,level:1},
  {name:'Skola',icon:'🏫',rarity:'Uncommon',income:40,color:'#4caf50',sellPrice:700,level:1},
  {name:'Hyreshus',icon:'🏢',rarity:'Rare',income:120,color:'#2196f3',sellPrice:3000,level:1},
  {name:'Gallerian',icon:'🛍️',rarity:'Rare',income:150,color:'#2196f3',sellPrice:4000,level:1},
  {name:'Sjukhus',icon:'🏥',rarity:'Rare',income:180,color:'#2196f3',sellPrice:4500,level:1},
  {name:'Banken',icon:'🏦',rarity:'Rare',income:200,color:'#2196f3',sellPrice:5000,level:1},
  {name:'Fabrik',icon:'🏭',rarity:'Epic',income:550,color:'#9c27b0',sellPrice:15000,level:1},
  {name:'Kraftverk',icon:'⚛️',rarity:'Epic',income:700,color:'#9c27b0',sellPrice:20000,level:1},
  {name:'Skyskrapa',icon:'🏙️',rarity:'Epic',income:900,color:'#9c27b0',sellPrice:25000,level:1},
  {name:'Arena',icon:'🏟️',rarity:'Epic',income:1100,color:'#9c27b0',sellPrice:30000,level:1},
  {name:'Slott',icon:'🏰',rarity:'Legendary',income:3500,color:'#ff9800',sellPrice:60000,level:1},
  {name:'Oljerigg',icon:'🛢️',rarity:'Legendary',income:5000,color:'#ff9800',sellPrice:85000,level:1},
  {name:'Guldgruva',icon:'⛏️',rarity:'Legendary',income:6500,color:'#ff9800',sellPrice:100000,level:1},
  {name:'Guldpalats',icon:'🏛️',rarity:'Legendary',income:8500,color:'#ff9800',sellPrice:130000,level:1},
  {name:'Imperium',icon:'💎',rarity:'Mythic',income:25000,color:'#f44336',sellPrice:500000,level:1},
  {name:'Future City',icon:'🛸',rarity:'Mythic',income:45000,color:'#f44336',sellPrice:800000,level:1},
  {name:'Mega-Bank',icon:'💰',rarity:'Mythic',income:80000,color:'#f44336',sellPrice:1500000,level:1},
  {name:'Atlantis',icon:'🔱',rarity:'Mythic',income:110000,color:'#f44336',sellPrice:2000000,level:1},
  {name:'Galaktisk Bas',icon:'🚀',rarity:'Celestial',income:450000,color:'#00bcd4',sellPrice:10000000,level:1},
  {name:'Månbas',icon:'🌕',rarity:'Celestial',income:650000,color:'#00bcd4',sellPrice:15000000,level:1},
  {name:'Tidsmaskin',icon:'⌛',rarity:'Celestial',income:950000,color:'#00bcd4',sellPrice:25000000,level:1},
  {name:'The Matrix',icon:'🕶️',rarity:'Godly',income:2500000,color:'#fff',sellPrice:50000000,level:1},
  {name:'Gudaportal',icon:'⛩️',rarity:'Godly',income:5000000,color:'#fff',sellPrice:100000000,level:1}
];

function pick(a,f,t){return a[Math.min(f+Math.floor(Math.random()*(t-f)),a.length-1)]}

function getDrop(tier,bl){
  const r=Math.random()*100,cb=bl*0.05,mb=bl*0.08,lb=bl*0.15,eb=bl*0.5;
  if(tier===1){
    if(r<0.001+cb*0.2)return pick(buildings,27,29);
    if(r<0.01+cb*0.5)return pick(buildings,24,27);
    if(r<0.1+mb)return pick(buildings,20,24);
    if(r<1+eb)return pick(buildings,16,20);
    if(r<10+lb*2)return pick(buildings,4,8);
    return pick(buildings,0,4);
  }else if(tier===2){
    if(r<0.005+cb*0.3)return pick(buildings,27,29);
    if(r<0.05+cb)return pick(buildings,24,27);
    if(r<0.5+mb*2)return pick(buildings,20,24);
    if(r<5+eb)return pick(buildings,8,12);
    if(r<35+lb)return pick(buildings,4,8);
    return pick(buildings,0,4);
  }else if(tier===3){
    if(r<0.01+cb*0.5)return pick(buildings,27,29);
    if(r<0.2+cb*1.5)return pick(buildings,24,27);
    if(r<2+mb*2)return pick(buildings,12,16);
    if(r<15+eb)return pick(buildings,8,12);
    if(r<60+lb)return pick(buildings,4,8);
    return pick(buildings,0,4);
  }else if(tier===4){
    if(r<0.05+cb)return pick(buildings,27,29);
    if(r<1+cb*2)return pick(buildings,24,27);
    if(r<5+mb*3)return pick(buildings,16,20);
    if(r<20+eb)return pick(buildings,12,16);
    if(r<50+lb)return pick(buildings,8,12);
    return pick(buildings,0,8);
  }else{
    if(r<0.5+cb*2)return pick(buildings,27,29);
    if(r<3+cb*3)return pick(buildings,24,27);
    if(r<10+mb*4)return pick(buildings,20,24);
    if(r<40+eb*1.5)return pick(buildings,16,20);
    if(r<70+lb)return pick(buildings,12,16);
    return pick(buildings,0,12);
  }
}

function buyBlock(tier){
  if(cooldowns[tier-1]>0)return;
  const price=blockPrices[tier-1];
  if(money<price){showToast('⚠️ För lite pengar!');return}
  money-=price;startCooldown(tier);
  const won=getDrop(tier,blockLevels[tier-1]);
  inventory.push({...won,level:1,id:Date.now()});
  showToast(won.icon+' '+won.name+' — '+won.rarity+'!');
  renderInv();updateUI();save();
}

function upgBlockLevel(tier){
  const l=blockLevels[tier-1];
  if(l>=4){showToast('Max odds uppnådda!');return}
  const cost=bUpgCost(tier,l);
  if(money<cost){showToast('Behöver '+fmt(cost)+' KR');return}
  money-=cost;blockLevels[tier-1]++;
  showToast('✨ Block '+tier+' är nu ⭐'+blockLevels[tier-1]);
  renderBlocks();updateUI();save();
}

function switchTab(tab){
  document.getElementById('inventory').style.display=tab==='inv'?'grid':'none';
  document.getElementById('shop-ui').style.display=tab==='shop'?'flex':'none';
  document.getElementById('inv-tab').classList.toggle('active',tab==='inv');
  document.getElementById('shop-tab').classList.toggle('active',tab==='shop');
  if(tab==='shop')renderShop();
}

function renderShop(){
  const el=document.getElementById('shop-ui');el.innerHTML='';
  shopUpgrades.forEach((upg,i)=>{
    const l=shopLevels[i],mx=l>=upg.maxLevel,cost=mx?0:upg.costs[l];
    const d=document.createElement('div');d.className='shop-card';
    d.innerHTML='<div class="shop-ico">'+upg.icon+'</div><div class="shop-info"><div class="shop-n">'+upg.name+'</div><div class="shop-d">'+upg.desc+'</div></div><div class="shop-r"><button class="buy-btn2" '+(mx?'disabled':'')+' data-i="'+i+'">'+(mx?'MAX':fmt(cost)+' KR')+'</button></div>';
    el.appendChild(d);
  });
  el.querySelectorAll('.buy-btn2').forEach(b=>b.addEventListener('click',()=>buyShopUpg(parseInt(b.dataset.i))));
}

function buyShopUpg(i){
  const upg=shopUpgrades[i],l=shopLevels[i];
  if(l>=upg.maxLevel){showToast('Max uppgraderad!');return}
  const cost=upg.costs[l];
  if(money<cost){showToast('⚠️ För lite pengar!');return}
  money-=cost;upg.apply();shopLevels[i]++;
  showToast('✅ '+upg.name+' → nivå '+shopLevels[i]);
  renderShop();updateUI();save();
}

function upgradeBuilding(i){
  const b=cityData[i];if(!b)return;
  if(b.level>=50){showToast('Maxnivå 50 uppnådd!');return}
  let base = Math.max(b.sellPrice, 200);
  const cost=Math.floor(base * 2.5 * Math.pow(1.85, b.level-1));
  if(money>=cost){
    money-=cost;
    b.level++;
    let mult = 1.05; 
    if(b.rarity === 'Uncommon') mult = 1.15;
    else mult = 1.30;
    b.income = Math.floor(b.income * mult); 
    showToast(b.icon+' '+b.name+' → Level '+b.level+'!');
    renderCity();updateUI();save();
  } else showToast('Behöver '+fmt(cost)+' KR!');
}

function renderCity(){
  const grid=document.getElementById('city-grid');grid.innerHTML='';
  cityData.forEach((data,i)=>{
    const slot=document.createElement('div');
    const highlight = (selectedInvIndex !== null && !data) ? ' highlight-empty' : '';
    slot.className='slot'+(data?'':' empty') + highlight;
    if(data){
      const c=data.color;
      slot.style.borderColor=c;
      slot.style.background='linear-gradient(135deg,'+c+'15,'+c+'05)';
      let base = Math.max(data.sellPrice, 200);
      const uc=Math.floor(base * 2.5 * Math.pow(1.85, data.level-1));
      slot.innerHTML='<div class="slot-lvl">LVL '+data.level+'</div><div class="slot-icon">'+data.icon+'</div><div class="slot-income">+'+fmt(Math.floor(data.income*globalMultiplier))+'/s</div><button class="upg-btn" data-s="'+i+'">'+(data.level>=50?'MAX':'UPG ('+fmtS(uc)+')')+'</button>';
    }
    slot.addEventListener('click',e=>{
      if(e.target.dataset.s!==undefined){e.stopPropagation();upgradeBuilding(parseInt(e.target.dataset.s));}
      else handleSlotClick(i);
    });
    grid.appendChild(slot);
  });
}

function renderInv(){
  const el=document.getElementById('inventory');el.innerHTML='';
  inventory.forEach((item,idx)=>{
    const d=document.createElement('div');d.className='inv-card';
    d.style.borderColor=item.color;
    if(selectedInvIndex === idx) d.style.background = 'rgba(74, 222, 128, 0.1)';
    d.innerHTML='<div class="inv-icon">'+item.icon+'</div><div class="inv-name" style="color:'+item.color+'">'+item.name+'</div><div class="inv-btns"><button class="bld-btn" data-idx="'+idx+'">'+(selectedInvIndex === idx ? 'AVBRYT' : 'BYGG')+'</button><button class="sll-btn" data-idx="'+idx+'">SÄLJ</button></div>';
    el.appendChild(d);
  });
  el.querySelectorAll('.bld-btn').forEach(b=>b.addEventListener('click',()=>prepPlace(parseInt(b.dataset.idx))));
  el.querySelectorAll('.sll-btn').forEach(b=>b.addEventListener('click',()=>sellItem(parseInt(b.dataset.idx))));
}

function handleSlotClick(i){
  if(selectedInvIndex!==null)placeBuilding(i);
  else if(cityData[i])pickUp(i);
}

function pickUp(i){
  inventory.push(cityData[i]);cityData[i]=null;
  showToast('📦 Byggnad i inventory');
  renderCity();renderInv();updateUI();save();
}

function placeBuilding(si){
  if(!cityData[si]){
    cityData[si]=inventory[selectedInvIndex];inventory.splice(selectedInvIndex,1);selectedInvIndex=null;
    renderCity();renderInv();updateUI();save();
  }else showToast('Platsen är redan tagen!');
}

function prepPlace(idx){
  if(selectedInvIndex === idx) selectedInvIndex = null;
  else selectedInvIndex=idx;
  renderInv();
  renderCity(); 
  if(selectedInvIndex !== null) showToast('Klicka på en lysande plats i staden!');
}

function sellItem(idx){
  const item=inventory[idx];
  const price=Math.floor(item.sellPrice*sellBonus);
  money+=price;inventory.splice(idx,1);selectedInvIndex=null;
  showToast('💰 Sålde '+item.name+' för '+fmt(price)+' KR');
  renderInv();renderCity();updateUI();save();
}

function startCooldown(tier){
  cooldowns[tier-1]=Math.max(1,5-cdReduction);renderBlocks();
  let t=setInterval(()=>{
    cooldowns[tier-1]--;
    const cdEl = document.getElementById('cd-'+tier);
    if(cdEl) cdEl.innerText = cooldowns[tier-1];
    if(cooldowns[tier-1]<=0){clearInterval(t);renderBlocks();}
  },1000);
}

function upgradeBlocks(){
  const cost=upgCosts[currentMaxBlock];
  if(money>=cost){money-=cost;currentMaxBlock++;renderBlocks();updateUI();save();showToast('🎉 Nytt block upplåst!');}
  else showToast('⚠️ För lite pengar!');
}

function renderBlocks(){
  const row=document.getElementById('blocks-row');row.innerHTML='';
  for(let i=1;i<=currentMaxBlock;i++){
    const isCd=cooldowns[i-1]>0,bl=blockLevels[i-1];
    const nc=bl<4?bUpgCost(i,bl):null;
    const stars=Array.from({length:4},(_,s)=>'<span class="bstar '+(s<bl?'on':'off')+'">★</span>').join('');
    const w=document.createElement('div');w.className='block-wrapper';
    w.innerHTML='<div id="block-'+i+'" class="lucky-block bt'+i+' '+(isCd?'disabled':'')+'" onclick="buyBlock('+i+')">'+(isCd?'<div class="cd-over"><span class="cd-n" id="cd-'+i+'">'+cooldowns[i-1]+'</span></div>':'<div class="block-icon">'+blockIcons[i-1]+'</div><div class="block-stars">'+stars+'</div>')+'</div><div class="block-meta"><div class="block-name">'+blockNames[i-1]+'</div><div class="block-price">'+fmt(blockPrices[i-1])+' KR</div>'+(nc?'<button class="upg-bl-btn" onclick="event.stopPropagation();upgBlockLevel('+i+')">⬆ BÄTTRE</button>':'<div class="upg-bl-btn mx">MAX</div>')+'</div>';
    row.appendChild(w);
  }
}

function updateUI(){
  document.getElementById('money').innerText=fmt(Math.floor(money));
  const inc=cityData.reduce((t,b)=>t+(b?b.income:0),0)*globalMultiplier;
  document.getElementById('pps').innerText=fmt(Math.floor(inc));
  if(currentMaxBlock<5) document.getElementById('upg-cost').innerText=fmt(upgCosts[currentMaxBlock]);
  else document.getElementById('upg-luck-btn').style.display='none';
}

let _tt;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2500);
}

function fmt(n){return Math.round(n).toLocaleString('sv-SE')}
function fmtS(n){
  if(n>=1000000)return(n/1000000).toFixed(1)+'M';
  if(n>=1000)return Math.round(n/1000)+'k';
  return String(n);
}

function save(){
  localStorage.setItem('lc_v6',JSON.stringify({money,currentMaxBlock,inventory,cityData,globalMultiplier,sellBonus,cdReduction,blockLevels,shopLevels}));
}

function loadGame(){
  const s=localStorage.getItem('lc_v6');
  if(s){const d=JSON.parse(s);money=d.money||500;currentMaxBlock=d.currentMaxBlock||1;inventory=d.inventory||[];cityData=d.cityData||Array(24).fill(null);globalMultiplier=d.globalMultiplier||1;sellBonus=d.sellBonus||1;cdReduction=d.cdReduction||0;blockLevels=d.blockLevels||[0,0,0,0,0];shopLevels=d.shopLevels||[0,0,0];}
}

function resetGame(){if(confirm('Nollställa hela staden?')){localStorage.removeItem('lc_v6');location.reload();}}

setInterval(()=>{
  const inc=cityData.reduce((t,b)=>t+(b?b.income:0),0)*globalMultiplier;
  money+=inc;updateUI();
},1000);

loadGame();renderCity();renderInv();renderBlocks();updateUI();
</script>
</body>
</html>
