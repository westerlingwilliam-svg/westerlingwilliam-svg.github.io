<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimmie.Fun - För Sverige</title>
    <style>
        body {
            font-family: 'Arial Black', sans-serif;
            background-color: #005293; /* SD-Blå */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* Skapar ett mönster av gula ränder i bakgrunden */
            background-image: linear-gradient(45deg, #004a85 25%, transparent 25%, transparent 50%, #004a85 50%, #004a85 75%, transparent 75%, transparent);
            background-size: 100px 100px;
        }

        .container {
            padding: 50px;
            background: white;
            border: 8px solid #fecc00; /* Gul ram */
            border-radius: 0px; /* Mer kantigt och rejält */
            box-shadow: 0 0 0 10px #005293, 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 450px;
        }

        h1 {
            font-size: 4rem;
            color: #005293;
            margin: 0;
            text-shadow: 3px 3px #fecc00;
            letter-spacing: -2px;
        }

        p {
            font-size: 1.5rem;
            color: #333;
            font-weight: bold;
            margin: 10px 0 30px;
        }

        /* Knappen */
        .btn-enter {
            display: block;
            padding: 20px;
            background-color: #fecc00;
            color: #005293;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.5rem;
            border: 4px solid #005293;
            transition: 0.2s;
        }

        .btn-enter:hover {
            background-color: #005293;
            color: #fecc00;
            border-color: #fecc00;
            transform: scale(1.05);
        }

        .sweden-bar {
            height: 10px;
            background: linear-gradient(90deg, #005293 45%, #fecc00 45%, #fecc00 55%, #005293 55%);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sweden-bar"></div>
        <h1>JIMMIE.FUN</h1>
        <p>Gjord av Wille 🇸🇪</p>
        <a href="games.html" class="btn-enter">TILL SPELEN</a>
        <div style="margin-top:20px; color:#005293; font-size: 2rem;">🇸🇪 🇸🇪 🇸🇪</div>
    </div>
</body>
</html>
