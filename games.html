<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimmie.Fun - Spel och Saker</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            border-top: 15px solid #fecc00;
        }

        header {
            background-color: #005293;
            padding: 30px;
            color: white;
            margin-bottom: 40px;
            border-bottom: 5px solid #fecc00;
            text-align: center;
        }

        /* Flaggan i headern byggd med rektanglar */
        .header-flag {
            width: 45px; height: 30px;
            background: #005293; position: relative;
            display: inline-block; vertical-align: middle;
            margin: 0 15px; border: 1px solid #fff;
        }
        .f-y-v { position: absolute; width: 8px; height: 100%; background: #fecc00; left: 15px; }
        .f-y-h { position: absolute; width: 100%; height: 8px; background: #fecc00; top: 11px; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .game-card {
            background: white;
            border: 3px solid #005293;
            padding: 30px 20px;
            text-decoration: none;
            color: #005293;
            font-weight: bold;
            text-align: center;
            transition: 0.3s;
        }

        .game-card:hover {
            background-color: #fecc00;
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Liten flagga på varje kort */
        .card-flag {
            width: 30px; height: 20px; background: #005293;
            position: relative; margin: 0 auto 15px;
            border: 1px solid #ddd;
        }
        .cf-v { position: absolute; width: 6px; height: 100%; background: #fecc00; left: 10px; }
        .cf-h { position: absolute; width: 100%; height: 6px; background: #fecc00; top: 7px; }

        .back-btn {
            display: inline-block;
            margin-top: 40px;
            color: white;
            text-decoration: none;
            background: #005293;
            padding: 15px 30px;
            font-weight: bold;
            border: 2px solid #fecc00;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: #fecc00;
            color: #005293;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-flag"><div class="f-y-h"></div><div class="f-y-v"></div></div>
        <h1 style="display:inline-block; vertical-align:middle;">JIMMIE.FUN</h1>
        <div class="header-flag"><div class="f-y-h"></div><div class="f-y-v"></div></div>
    </header>

    <div class="game-grid">
        <a href="quotes.html" class="game-card">
            <div class="card-flag"><div class="cf-h"></div><div class="cf-v"></div></div>
            <h3>Jimmie Quotes</h3>
        </a>

        <a href="folkhemmet.html" class="game-card">
            <div class="card-flag"><div class="cf-h"></div><div class="cf-v"></div></div>
            <h3>Bygg Folkhemmet</h3>
        </a>

        <a href="#" class="game-card">
            <div class="card-flag"><div class="cf-h"></div><div class="cf-v"></div></div>
            <h3>SD-Clicker</h3>
        </a>
    </div>

    <center>
        <a href="index.html" class="back-btn">TILLBAKA TILL START</a>
    </center>

</body>
</html>
