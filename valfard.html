<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sverige-Byggaren: Lucky Blocks Pro</title>
    <style>
        :root {
            --common: #b5b5b5;
            --rare: #4facfe;
            --epic: #a335ee;
            --legendary: #ff8000;
            --sd-blue: #005293;
            --sd-gold: #fecc00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at center, #002b55 0%, #001a33 100%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            background: rgba(0, 82, 147, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-bottom: 3px solid var(--sd-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .stats-left div { margin-bottom: 5px; }
        .stats-left b { color: var(--sd-gold); font-size: 1.4rem; }

        /* DET STORA LUCKY BLOCKET */
        .block-container {
            position: relative;
            perspective: 1000px;
        }

        #lucky-block {
            width: 140px; height: 140px; /* Mycket större */
            background: var(--sd-gold);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            color: var(--sd-blue);
            cursor: pointer;
            box-shadow: 0 10px 0 #b38f00, 0 0 40px rgba(254, 204, 0, 0.4);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: pulse 2s infinite;
            user-select: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 10px 0 #b38f00, 0 0 20px rgba(254, 204, 0, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 10px 0 #b38f00, 0 0 50px rgba(254, 204, 0, 0.6); }
            100% { transform: scale(1); box-shadow: 0 10px 0 #b38f00, 0 0 20px rgba(254, 204, 0, 0.3); }
        }

        #lucky-block:active { transform: translateY(8px) scale(0.95); box-shadow: 0 2px 0 #b38f00; }
        .block-price { font-weight: 900; margin-top: 10px; font-size: 1.1rem; color: var(--sd-gold); text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        /* SPELYTA */
        .game-area { display: flex; flex: 1; overflow: hidden; }

        /* STADEN - EN RAD MINDRE (5 rader istället för 6) */
        #city-grid {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(5, 1fr); /* En rad mindre på höjden */
            gap: 15px;
            padding: 30px;
        }

        .slot {
            background: rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: 0.3s;
        }

        .slot:hover { background: rgba(255,255,255,0.05); border-color: var(--sd-gold); }
        
        /* INKOMST-TEXT I RUTAN */
        .income-tag {
            font-size: 0.75rem;
            background: rgba(0, 255, 153, 0.2);
            color: #00ff99;
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 5px;
            font-weight: bold;
        }

        .slot-icon { font-size: 3rem; }

        /* SIDEBAR INVENTORY */
        .sidebar {
            flex: 1;
            background: rgba(0, 20, 40, 0.8);
            border-left: 1px solid rgba(254, 204, 0, 0.2);
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .inv-item {
            background: var(--glass);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .inv-item:hover { border-color: var(--sd-gold); background: rgba(255,255,255,0.1); }

        .place-btn {
            background: var(--sd-gold);
            color: var(--sd-blue);
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 0 #b38f00;
        }

        .place-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b38f00; }

        /* NOTIFICATIONS */
        #game-msg {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--sd-blue);
            color: white;
            padding: 15px 40px;
            border-radius: 15px;
            border: 2px solid var(--sd-gold);
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }
        .show-msg { opacity: 1 !important; bottom: 60px !important; }

        .highlight { border-color: #00ff99 !important; box-shadow: 0 0 20px rgba(0,255,153,0.2); }
    </style>
</head>
<body>

<div class="header">
    <div class="stats-left">
        <div>KONTO: <b id="money">500</b> KR</div>
        <div>PRODUKTION: <b id="pps">0</b> KR/S</div>
    </div>

    <div class="block-container">
        <div id="lucky-block">?</div>
        <div class="block-center block-price">PRIS: <span id="block-cost">250</span> KR</div>
    </div>

    <div style="text-align: right;">
        <a href="games.html" style="color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.9rem;">[ Tillbaka ]</a>
    </div>
</div>

<div class="game-area">
    <div id="city-grid"></div>

    <div class="sidebar">
        <h2 style="margin-top:0; border-bottom: 2px solid var(--sd-gold); padding-bottom: 10px;">INVENTORY</h2>
        <div id="inventory" style="overflow-y: auto;"></div>
    </div>
</div>

<div id="game-msg">Meddelande</div>

<script>
    let money = 500;
    let blockCost = 250;
    let selectedInvIndex = null;
    let incomePerSecond = 0;
    let inventory = [];
    let cityData = Array(30).fill(null); // 6x5 istället för 6x6

    const buildings = [
        { name: "Röd Stuga", icon: "🏠", rarity: "Common", income: 10, chance: 0.6, color: "#b5b5b5" },
        { name: "Hyreshus", icon: "🏢", rarity: "Rare", income: 50, chance: 0.3, color: "#4facfe" },
        { name: "Kärnkraftverk", icon: "⚛️", rarity: "Epic", income: 250, chance: 0.08, color: "#a335ee" },
        { name: "Guld-Slott", icon: "🏰", rarity: "Legendary", income: 1500, chance: 0.02, color: "#ff8000" }
    ];

    // Skapa stadens yta (6 kolumner x 5 rader = 30 rutor)
    const grid = document.getElementById('city-grid');
    for (let i = 0; i < 30; i++) {
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.onclick = () => placeBuilding(i);
        grid.appendChild(slot);
    }

    document.getElementById('lucky-block').onclick = function() {
        if (money >= blockCost) {
            money -= blockCost;
            blockCost = Math.ceil(blockCost * 1.12);
            
            const rand = Math.random();
            let cumulative = 0;
            let wonItem = buildings[0];

            for (const b of buildings) {
                cumulative += b.chance;
                if (rand < cumulative) {
                    wonItem = { ...b, id: Date.now() };
                    break;
                }
            }
            
            inventory.push(wonItem);
            showMessage(`LUCKY! Du fick: ${wonItem.name} (${wonItem.icon})`);
            renderInventory();
            updateUI();
        } else {
            showMessage("⚠️ Du behöver mer pengar för att köpa ett block!");
        }
    };

    function showMessage(text) {
        const msg = document.getElementById('game-msg');
        msg.innerText = text;
        msg.classList.add('show-msg');
        setTimeout(() => msg.classList.remove('show-msg'), 2000);
    }

    function renderInventory() {
        const invEl = document.getElementById('inventory');
        invEl.innerHTML = '';
        inventory.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'inv-item';
            div.style.borderLeft = `5px solid ${item.color}`;
            div.innerHTML = `
                <div>
                    <span style="font-size: 1.2rem;">${item.icon}</span> <b>${item.name}</b><br>
                    <small style="color:${item.color}">${item.rarity} (+${item.income}/s)</small>
                </div>
                <button class="place-btn" onclick="preparePlacement(${index})">BYGG</button>
            `;
            invEl.appendChild(div);
        });
    }

    function preparePlacement(index) {
        selectedInvIndex = index;
        showMessage("Klicka på en ledig yta i staden för att bygga!");
        const slots = document.getElementsByClassName('slot');
        for (let s of slots) { if (!s.dataset.occupied) s.classList.add('highlight'); }
    }

    function placeBuilding(slotIndex) {
        if (selectedInvIndex !== null && !cityData[slotIndex]) {
            cityData[slotIndex] = inventory[selectedInvIndex];
            inventory.splice(selectedInvIndex, 1);
            selectedInvIndex = null;
            
            const slots = document.getElementsByClassName('slot');
            for (let s of slots) s.classList.remove('highlight');
            
            renderCity();
            renderInventory();
            calculateIncome();
        }
    }

    function renderCity() {
        const slots = document.getElementsByClassName('slot');
        cityData.forEach((data, i) => {
            if (data) {
                slots[i].innerHTML = `
                    <div class="slot-icon">${data.icon}</div>
                    <div class="income-tag">+${data.income}/s</div>
                `;
                slots[i].dataset.occupied = "true";
                slots[i].style.background = "rgba(255,255,255,0.08)";
            } else {
                slots[i].innerHTML = "";
                delete slots[i].dataset.occupied;
                slots[i].style.background = "";
            }
        });
    }

    function calculateIncome() {
        incomePerSecond = cityData.reduce((total, b) => total + (b ? b.income : 0), 0);
        document.getElementById('pps').innerText = incomePerSecond;
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(money).toLocaleString();
        document.getElementById('block-cost').innerText = blockCost.toLocaleString();
    }

    setInterval(() => {
        money += incomePerSecond;
        updateUI();
    }, 1000);

    updateUI();
</script>

</body>
</html>
