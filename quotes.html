<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimmie Quotes</title>
    <style>
        body {
            font-family: 'Arial Black', sans-serif;
            background-color: #005293; /* SD-Blå */
            color: white;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            background-image: linear-gradient(45deg, #004a85 25%, transparent 25%, transparent 50%, #004a85 50%, #004a85 75%, transparent 75%, transparent);
            background-size: 80px 80px;
        }

        /* Den kodade flaggan högst upp */
        .flag-box {
            width: 80px; height: 50px;
            background-color: #005293;
            position: relative;
            margin: 0 auto 20px auto;
            border: 2px solid white;
        }
        .f-y-v { position: absolute; width: 12px; height: 100%; background: #fecc00; left: 25px; }
        .f-y-h { position: absolute; width: 100%; height: 12px; background: #fecc00; top: 19px; }

        .quote-container {
            background: white;
            color: #005293;
            padding: 50px 30px;
            border: 10px solid #fecc00;
            max-width: 700px;
            margin: 30px auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 250px;
        }

        #quote-text {
            font-size: 2.2rem;
            line-height: 1.2;
            margin-bottom: 30px;
            font-style: italic;
        }

        .btn-next {
            background: #fecc00;
            color: #005293;
            border: 4px solid #005293;
            padding: 20px 45px;
            font-size: 1.4rem;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn-next:hover {
            background: #005293;
            color: #fecc00;
            border-color: #fecc00;
            transform: scale(1.05);
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: white;
            text-decoration: none;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border: 2px solid #fecc00;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="flag-box">
        <div class="f-y-h"></div>
        <div class="f-y-v"></div>
    </div>

    <h1>JIMMIE QUOTES</h1>

    <div class="quote-container">
        <div id="quote-text">
            "Jag ska va helt rak och ärlig."
        </div>
        <button class="btn-next" onclick="newQuote()">NÄSTA CITAT</button>
    </div>

    <a href="games.html" class="back-link">← TILLBAKA TILL SPELEN</a>

    <script>
        // Här är citaten du bad om plus några extra kända
        const quotes = [
            "Jag ska va helt rak och ärlig.",
            "Om man tar hit mellanöstern, så blir Sverige mer som mellanöstern.",
            "Vilken planet bor du på? Har du inte sett hur Sverige ser ut?",
            "Vem är brun? Vem är brun frågar jag.",
            "Nu är det min tur att prata nu, du har pratat tillräkligt med strunt.",
            "Mitt Europa bygger murar.",
            "Sverige ska bli bra igen.",
            "Vi säger vad du tänker.",
        ];

        function newQuote() {
            const quoteElement = document.getElementById('quote-text');
            // Slumpar ett citat
            const randomIndex = Math.floor(Math.random() * quotes.length);
            
            // Enkel animation: ändra texten
            quoteElement.style.opacity = 0;
            setTimeout(() => {
                quoteElement.innerText = '"' + quotes[randomIndex] + '"';
                quoteElement.style.opacity = 1;
            }, 100);
        }
        
        // Sätt ett citat direkt när man laddar sidan
        window.onload = newQuote;
    </script>
</body>
</html>
