<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimmie Doom - Satirisk 3D Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; }
        canvas { display: block; }
        
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content:空间-between;
        }

        .hud-element {
            background: rgba(0, 0, 100, 0.7);
            border: 4px solid #febd11;
            padding: 10px;
            color: #fff;
            pointer-events: auto;
        }

        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        #weapon-sprite {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            font-size: 120px;
            transition: transform 0.1s;
        }

        .bobbing {
            animation: bob 0.5s infinite alternate;
        }

        @keyframes bob {
            from { transform: translateX(-50%) translateY(0); }
            to { transform: translateX(-50%) translateY(10px); }
        }

        .damage-flash {
            position: fixed;
            inset: 0;
            background: red;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
    </style>
</head>
<body>
    <div id="damage-flash" class="damage-flash"></div>
    
    <div id="ui-layer">
        <!-- Top Stats -->
        <div class="flex justify-between p-4">
            <div class="hud-element">
                <div class="text-[10px]">OPINION</div>
                <div id="opinion-val" class="text-xl">18.2%</div>
            </div>
            <div class="hud-element">
                <div class="text-[10px]">ENERGI</div>
                <div id="energy-val" class="text-xl">100</div>
            </div>
        </div>

        <!-- Center Crosshair -->
        <div class="crosshair"></div>

        <!-- Messages -->
        <div id="msg-box" class="text-center text-yellow-400 text-sm mb-48 drop-shadow-lg">
            ANVÄND WASD FÖR ATT GÅ - MUSEN FÖR ATT SE DIG OMKRING
        </div>

        <!-- Bottom HUD -->
        <div class="flex justify-center items-end pb-4">
            <div id="weapon-sprite">🌭</div>
            <div class="hud-element mx-4">
                <div class="text-[10px]">OBJEKTIV</div>
                <div class="text-[8px]">Hämta falukorv, undvik motståndare.</div>
            </div>
        </div>
    </div>

    <div id="instructions" class="fixed inset-0 bg-blue-900 bg-opacity-90 flex flex-center items-center justify-center text-white z-50 p-10 text-center cursor-pointer">
        <div>
            <h1 class="text-3xl mb-4">JIMMIE DOOM</h1>
            <p class="mb-6">Klicka för att starta simulatorn</p>
            <p class="text-xs text-yellow-400 uppercase">W-A-S-D: Gå<br>Mus: Sikta<br>Klick: "Debattera"</p>
        </div>
    </div>

    <script>
        let scene, camera, renderer, clock;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let objects = [];
        let items = [];
        let enemies = [];
        let isLocked = false;

        let state = {
            opinion: 18.2,
            energy: 100,
            lastAttack: 0
        };

        const instr = document.getElementById('instructions');
        const weapon = document.getElementById('weapon-sprite');

        // Initialisera scenen
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x001122);
            scene.fog = new THREE.FogExp2(0x001122, 0.05);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.PointLight(0xffffff, 1, 100);
            light.position.set(0, 5, 0);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // Mark (Riksdagstapet-ish)
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Skapa väggar (Labyrint)
            createMaze();

            clock = new THREE.Clock();

            // Kontroller
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousedown', onMouseDown);
            
            instr.addEventListener('click', () => {
                document.body.requestPointerLock();
            });

            document.addEventListener('pointerlockchange', () => {
                isLocked = document.pointerLockElement === document.body;
                instr.style.display = isLocked ? 'none' : 'flex';
            });

            document.addEventListener('mousemove', (e) => {
                if (isLocked) {
                    camera.rotation.y -= e.movementX * 0.002;
                }
            });

            spawnItems();
            spawnEnemies();
            animate();
        }

        function createMaze() {
            const wallGeo = new THREE.BoxGeometry(4, 8, 4);
            const wallMat = new THREE.MeshPhongMaterial({ color: 0x005293 });

            for (let i = 0; i < 50; i++) {
                const wall = new THREE.Mesh(wallGeo, wallMat);
                wall.position.x = Math.floor(Math.random() * 20 - 10) * 8;
                wall.position.z = Math.floor(Math.random() * 20 - 10) * 8;
                wall.position.y = 4;
                scene.add(wall);
                objects.push(wall);
            }
        }

        function spawnItems() {
            // Falukorvar (Powerups)
            const spriteMaterial = new THREE.SpriteMaterial({ 
                map: createTextTexture("🌭", 64),
                color: 0xffffff 
            });

            for (let i = 0; i < 15; i++) {
                const sprite = new THREE.Sprite(spriteMaterial);
                sprite.position.set(Math.random() * 100 - 50, 1, Math.random() * 100 - 50);
                sprite.scale.set(2, 2, 1);
                scene.add(sprite);
                items.push(sprite);
            }
        }

        function spawnEnemies() {
            // "Politiska motståndare" (Röda logotyper/emojis)
            const enemyMat = new THREE.SpriteMaterial({ 
                map: createTextTexture("🌹", 64),
                color: 0xffffff 
            });

            for (let i = 0; i < 10; i++) {
                const sprite = new THREE.Sprite(enemyMat);
                sprite.position.set(Math.random() * 100 - 50, 1.5, Math.random() * 100 - 50);
                sprite.scale.set(3, 3, 1);
                scene.add(sprite);
                enemies.push({ mesh: sprite, health: 100 });
            }
        }

        function createTextTexture(text, size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.font = `${size/1.5}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, size/2, size/2);
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        function onKeyDown(e) {
            switch (e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
            }
        }

        function onKeyUp(e) {
            switch (e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
            }
        }

        function onMouseDown() {
            if (!isLocked) return;
            
            // Animera "attack"
            weapon.style.transform = 'translateX(-50%) translateY(-20px) scale(1.2)';
            setTimeout(() => weapon.style.transform = 'translateX(-50%)', 100);

            // Kolla träff (Enkel raycasting)
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            
            const intersects = raycaster.intersectObjects(enemies.map(e => e.mesh));
            if (intersects.length > 0) {
                const enemyObj = enemies.find(e => e.mesh === intersects[0].object);
                if (enemyObj) {
                    state.opinion += 0.5;
                    updateHUD();
                    showMsg("Du vann debatten!");
                    
                    // Flytta bort fienden temporärt (som om den blev besegrad)
                    enemyObj.mesh.position.set(Math.random() * 100 - 50, 1.5, Math.random() * 100 - 50);
                }
            }
        }

        function showMsg(txt) {
            const msg = document.getElementById('msg-box');
            msg.innerText = txt;
            setTimeout(() => { if(msg.innerText === txt) msg.innerText = ""; }, 2000);
        }

        function updateHUD() {
            document.getElementById('opinion-val').innerText = state.opinion.toFixed(1) + "%";
            document.getElementById('energy-val').innerText = Math.round(state.energy);
            
            if (state.energy <= 0) {
                alert("Energikris! Du behöver mer falukorv. Spelet startar om.");
                location.reload();
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (isLocked) {
                // Rörelse
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 100.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 100.0 * delta;

                camera.translateX(-velocity.x * delta);
                camera.translateZ(velocity.z * delta);
                camera.position.y = 1.6; // Ögonhöjd

                // Bobbing-effekt vid gång
                if (moveForward || moveBackward || moveLeft || moveRight) {
                    weapon.classList.add('bobbing');
                } else {
                    weapon.classList.remove('bobbing');
                }

                // Kolla falukorv-pickups
                items.forEach((item, index) => {
                    if (camera.position.distanceTo(item.position) < 2) {
                        state.energy = Math.min(100, state.energy + 20);
                        scene.remove(item);
                        items.splice(index, 1);
                        showMsg("Smaskigt! +20 Energi");
                        updateHUD();
                    }
                });

                // Fiende AI (Gå mot spelaren)
                enemies.forEach(enemy => {
                    const dir = new THREE.Vector3().subVectors(camera.position, enemy.mesh.position).normalize();
                    enemy.mesh.position.addScaledVector(dir, 0.05);

                    if (camera.position.distanceTo(enemy.mesh.position) < 1.5) {
                        state.energy -= 0.5;
                        updateHUD();
                        document.getElementById('damage-flash').style.opacity = "0.3";
                        setTimeout(() => document.getElementById('damage-flash').style.opacity = "0", 50);
                    }
                });
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
