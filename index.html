<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimmie.Fun - För Sverige</title>
    <style>
        body {
            font-family: 'Arial Black', sans-serif;
            background-color: #005293;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: linear-gradient(45deg, #004a85 25%, transparent 25%, transparent 50%, #004a85 50%, #004a85 75%, transparent 75%, transparent);
            background-size: 100px 100px;
        }

        .flag-box {
            width: 60px;
            height: 40px;
            background-color: #005293;
            position: relative;
            margin: 0 auto 20px auto;
            border: 1px solid #ddd;
        }
        .flag-yellow-v {
            position: absolute;
            width: 10px;
            height: 100%;
            background-color: #fecc00;
            left: 20px;
        }
        .flag-yellow-h {
            position: absolute;
            width: 100%;
            height: 10px;
            background-color: #fecc00;
            top: 15px;
        }

        .container {
            padding: 50px;
            background: white;
            border: 8px solid #fecc00;
            box-shadow: 0 0 0 10px #005293, 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 450px;
        }

        h1 {
            font-size: 4rem;
            color: #005293;
            margin: 0;
            text-shadow: 3px 3px #fecc00;
            letter-spacing: -2px;
        }

        p {
            font-size: 1.5rem;
            color: #333;
            font-weight: bold;
            margin: 10px 0 30px;
        }

        .btn-enter, .btn-game {
            display: block;
            padding: 15px;
            margin-bottom: 10px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.2rem;
            border: 4px solid #005293;
            transition: 0.2s;
            cursor: pointer;
        }

        .btn-enter {
            background-color: #fecc00;
            color: #005293;
        }

        .btn-game {
            background-color: #005293;
            color: #fecc00;
            border-color: #fecc00;
        }

        .btn-enter:hover, .btn-game:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="flag-box">
            <div class="flag-yellow-h"></div>
            <div class="flag-yellow-v"></div>
        </div>
        <h1>JIMMIE.FUN</h1>
        <p>Gjord av Wille</p>
        <a href="games.html" class="btn-enter">TILL KLASSIKERNA</a>
        <a href="valfard.html" class="btn-game">VÄLFÄRDSBYGGAREN 🇸🇪</a>
    </div>
</body>
</html>
