<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sverige-Byggaren: Lucky Blocks</title>
    <style>
        :root {
            --common: #b5b5b5;
            --rare: #4facfe;
            --epic: #a335ee;
            --legendary: #ff8000;
            --sd-blue: #005293;
            --sd-gold: #fecc00;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #001a33;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* TOP BAR MED LUCKY BLOCK I MITTEN */
        .header {
            background: linear-gradient(to bottom, var(--sd-blue), #003d6e);
            padding: 10px 30px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-bottom: 4px solid var(--sd-gold);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .stats-left { font-size: 1.2rem; }
        .stats-left span { color: var(--sd-gold); font-weight: bold; }

        /* LUCKY BLOCK CENTER */
        .block-center {
            text-align: center;
            position: relative;
        }

        #lucky-block {
            width: 80px; height: 80px;
            background: var(--sd-gold);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            color: var(--sd-blue);
            cursor: pointer;
            margin: 0 auto;
            box-shadow: 0 6px 0 #b38f00, 0 0 20px rgba(254, 204, 0, 0.4);
            transition: 0.1s;
            user-select: none;
        }

        #lucky-block:active { transform: translateY(4px); box-shadow: 0 2px 0 #b38f00; }
        .block-price { font-size: 0.9rem; margin-top: 5px; font-weight: bold; }

        /* MAIN CONTENT */
        .game-area {
            display: flex;
            flex: 1;
            overflow: hidden;
            background: #00264d;
        }

        /* CITY GRID */
        #city-grid {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            padding: 20px;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .slot {
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(254, 204, 0, 0.1);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .slot:hover { border-color: var(--sd-gold); background: rgba(254, 204, 0, 0.05); }
        .slot.highlight { border-color: #00ff99; box-shadow: 0 0 15px #00ff99; }

        /* INVENTORY SIDEBAR */
        .sidebar {
            flex: 1;
            background: #001f3f;
            border-left: 2px solid rgba(254, 204, 0, 0.3);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .inventory-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .inv-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--common);
            transition: 0.2s;
        }

        .inv-item:hover { transform: translateX(5px); background: rgba(255,255,255,0.1); }

        .place-btn {
            background: var(--sd-gold);
            color: var(--sd-blue);
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* NOTIFICATIONS & OVERLAYS */
        #game-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px solid var(--sd-gold);
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: 0.3s;
        }

        .show-msg { opacity: 1 !important; }

        .rarity-tag { font-size: 0.7rem; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="header">
    <div class="stats-left">
        <div>KONTO: <span id="money">500</span> KR</div>
        <div style="font-size: 0.9rem;">INKOMST: <span id="pps">0</span> KR/S</div>
    </div>

    <div class="block-center">
        <div id="lucky-block">?</div>
        <div class="block-price">KOSTNAD: <span id="block-cost">250</span> KR</div>
    </div>

    <div style="text-align: right;">
        <a href="games.html" style="color: white; text-decoration: none; font-weight: bold;">[ AVSLUTA ]</a>
    </div>
</div>

<div class="game-area">
    <div id="city-grid"></div>

    <div class="sidebar">
        <h2 style="margin-top: 0; color: var(--sd-gold);">DITT INVENTORY</h2>
        <div class="inventory-list" id="inventory"></div>
    </div>
</div>

<div id="game-msg">Meddelande här</div>

<script>
    let money = 500;
    let blockCost = 250;
    let selectedInvIndex = null;
    let incomePerSecond = 0;
    let inventory = [];
    let cityData = Array(36).fill(null);

    const buildings = [
        { name: "Röd Stuga", icon: "🏠", rarity: "common", income: 5, chance: 0.6, color: "#b5b5b5" },
        { name: "Hyreshus", icon: "🏢", rarity: "rare", income: 25, chance: 0.3, color: "#4facfe" },
        { name: "Kärnkraftverk", icon: "⚛️", rarity: "epic", income: 150, chance: 0.08, color: "#a335ee" },
        { name: "Guld-Slott", icon: "🏰", rarity: "legendary", income: 1000, chance: 0.02, color: "#ff8000" }
    ];

    // Skapa stadens yta
    const grid = document.getElementById('city-grid');
    for (let i = 0; i < 36; i++) {
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.onclick = () => placeBuilding(i);
        grid.appendChild(slot);
    }

    // Lucky Block Klick
    document.getElementById('lucky-block').onclick = function() {
        if (money >= blockCost) {
            money -= blockCost;
            blockCost = Math.ceil(blockCost * 1.15);
            
            // Slumpa byggnad
            const rand = Math.random();
            let cumulative = 0;
            let wonItem = buildings[0];

            for (const b of buildings) {
                cumulative += b.chance;
                if (rand < cumulative) {
                    wonItem = { ...b, id: Date.now() };
                    break;
                }
            }
            
            inventory.push(wonItem);
            showMessage(`LUCKY! Du fick: ${wonItem.icon} ${wonItem.name}`);
            renderInventory();
            updateUI();
        } else {
            showMessage("⚠️ Du har inte råd med ett Lucky Block!");
        }
    };

    function showMessage(text) {
        const msg = document.getElementById('game-msg');
        msg.innerText = text;
        msg.classList.add('show-msg');
        setTimeout(() => msg.classList.remove('show-msg'), 2500);
    }

    function renderInventory() {
        const invEl = document.getElementById('inventory');
        invEl.innerHTML = '';
        inventory.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'inv-item';
            div.style.borderLeftColor = item.color;
            div.innerHTML = `
                <div>
                    <strong>${item.icon} ${item.name}</strong><br>
                    <span class="rarity-tag" style="background:${item.color}">${item.rarity}</span>
                </div>
                <button class="place-btn" onclick="preparePlacement(${index})">SÄTT UT</button>
            `;
            invEl.appendChild(div);
        });
    }

    function preparePlacement(index) {
        selectedInvIndex = index;
        showMessage("📍 Klicka på en ledig ruta i staden!");
        
        // Highlighta lediga rutor
        const slots = document.getElementsByClassName('slot');
        for (let s of slots) {
            if (!s.innerHTML) s.classList.add('highlight');
        }
    }

    function placeBuilding(slotIndex) {
        const slots = document.getElementsByClassName('slot');
        
        if (selectedInvIndex !== null) {
            if (cityData[slotIndex] === null) {
                cityData[slotIndex] = inventory[selectedInvIndex];
                inventory.splice(selectedInvIndex, 1);
                selectedInvIndex = null;
                
                // Ta bort highlights
                for (let s of slots) s.classList.remove('highlight');
                
                renderCity();
                renderInventory();
                calculateIncome();
                showMessage("✅ Byggnad placerad!");
            } else {
                showMessage("❌ Där är det redan upptaget!");
            }
        }
    }

    function renderCity() {
        const slots = document.getElementsByClassName('slot');
        cityData.forEach((data, i) => {
            slots[i].innerHTML = data ? data.icon : "";
            if (data) slots[i].style.background = "rgba(255,255,255,0.1)";
        });
    }

    function calculateIncome() {
        incomePerSecond = cityData.reduce((total, b) => total + (b ? b.income : 0), 0);
        document.getElementById('pps').innerText = incomePerSecond;
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(money).toLocaleString();
        document.getElementById('block-cost').innerText = blockCost;
    }

    // Gameloop för pengar
    setInterval(() => {
        money += incomePerSecond;
        updateUI();
    }, 1000);

    updateUI();
</script>

</body>
</html>
