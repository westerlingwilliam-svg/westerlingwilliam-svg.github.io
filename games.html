<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimmie.Fun - Spel och Saker</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            border-top: 15px solid #fecc00; /* Gul kant högst upp */
        }

        header {
            background-color: #005293;
            padding: 30px;
            color: white;
            margin-bottom: 40px;
            border-bottom: 5px solid #fecc00;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 3rem;
            text-shadow: 2px 2px #333;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .game-card {
            background: white;
            border: 3px solid #005293;
            padding: 20px;
            text-decoration: none;
            color: #005293;
            font-weight: bold;
            text-align: center;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        /* Hover-effekt med gult och blått */
        .game-card:hover {
            background-color: #fecc00;
            border-color: #005293;
            transform: translateY(-10px);
        }

        .game-card h3 {
            margin: 10px 0;
            font-size: 1.4rem;
            z-index: 2;
        }

        /* En liten Sverigeflagga-detalj på varje kort */
        .game-card::before {
            content: "🇸🇪";
            font-size: 1.5rem;
            display: block;
            margin-bottom: 10px;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: white;
            text-decoration: none;
            background: #333;
            padding: 10px 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🇸🇪 JIMMIE.FUN 🇸🇪</h1>
        <p>Sveriges roligaste grid - Gjord av Wille</p>
    </header>

    <div class="game-grid">
        <a href="#" class="game-card"><h3>Sverige-quiz</h3></a>
        <a href="#" class="game-card"><h3>Bygg Folkhemmet</h3></a>
        <a href="#" class="game-card"><h3>SD-Clicker</h3></a>
        <a href="#" class="game-card"><h3>Hitta Jimmie</h3></a>
        <a href="#" class="game-card"><h3>Ordning & Reda</h3></a>
        <a href="#" class="game-card"><h3>Svenska Milstolpar</h3></a>
    </div>

    <center>
        <a href="index.html" class="back-btn">Tillbaka till start</a>
    </center>

</body>
</html>
