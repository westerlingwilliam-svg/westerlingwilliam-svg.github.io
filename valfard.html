<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky City: Pro Architect</title>
    <style>
        :root {
            --common: #b5b5b5;
            --uncommon: #1eff00;
            --rare: #0070dd;
            --epic: #a335ee;
            --legendary: #ff8000;
            --mythic: #ff003c;
            --sd-blue: #005293;
            --sd-gold: #fecc00;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at center, #001a33 0%, #000b18 100%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background: rgba(0, 30, 60, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: grid;
            grid-template-columns: 250px 1fr 220px;
            align-items: center;
            border-bottom: 3px solid var(--sd-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 100;
        }

        .stats-left b { color: var(--sd-gold); font-size: 1.4rem; }

        .blocks-container { 
            display: flex; 
            justify-content: center;
            align-items: center;
        }
        
        .blocks-row {
            display: flex;
            gap: 15px;
        }

        .block-wrapper { text-align: center; width: 130px; }

        .lucky-block {
            width: 115px; height: 115px;
            background: var(--sd-gold);
            border-radius: 22px;
            display: flex;
            justify-content: center; align-items: center;
            font-size: 4.5rem; color: var(--sd-blue);
            cursor: pointer;
            box-shadow: 0 10px 0 #b38f00;
            transition: 0.1s;
            user-select: none;
            margin: 0 auto;
            position: relative;
        }
        
        .block-1 { background: var(--common); color: #333; box-shadow: 0 10px 0 #888; }
        .block-2 { background: var(--uncommon); color: #000; box-shadow: 0 10px 0 #158000; }
        .block-3 { background: var(--rare); color: #fff; box-shadow: 0 10px 0 #004a94; }
        .block-4 { background: var(--epic); color: #fff; box-shadow: 0 10px 0 #6d20a1; }
        .block-5 { background: var(--legendary); color: #fff; box-shadow: 0 10px 0 #b35900; }

        .lucky-block.disabled { 
            opacity: 0.3; 
            filter: grayscale(1); 
            transform: translateY(6px);
            box-shadow: none !important;
        }

        .cooldown-text {
            position: absolute;
            font-size: 2rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 15px black;
        }

        .drop-info {
            background: rgba(0,0,0,0.5);
            margin-top: 8px;
            padding: 5px;
            border-radius: 8px;
            font-size: 0.7rem;
            min-height: 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .game-area { display: flex; flex: 1; overflow: hidden; }
        
        #city-grid {
            flex: 3; display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(4, 1fr); /* Ändrat till 4 på höjden */
            gap: 12px; padding: 20px;
        }
        
        .slot {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .building-icon { 
            font-size: 2.8rem; 
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .sidebar {
            flex: 1; background: rgba(0, 15, 30, 0.9);
            border-left: 2px solid var(--sd-blue);
            padding: 20px; display: flex; flex-direction: column;
        }
        
        .inv-item {
            background: rgba(255,255,255,0.05); padding: 10px;
            border-radius: 8px; margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; gap: 5px;
        }

        .inv-buttons { display: flex; gap: 5px; }

        .sell-btn {
            background: #ff4444; color: white; border: none;
            padding: 5px 10px; border-radius: 5px; cursor: pointer;
            font-weight: bold; font-size: 0.7rem; flex: 1;
        }

        .place-btn {
            background: var(--sd-gold); color: var(--sd-blue); border: none;
            padding: 5px 10px; border-radius: 5px; cursor: pointer;
            font-weight: bold; font-size: 0.7rem; flex: 1;
        }

        #game-msg {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%); background: var(--sd-gold);
            color: #001a33; padding: 12px 30px; border-radius: 50px;
            opacity: 0; transition: 0.3s; z-index: 1000;
            font-weight: bold; text-align: center;
        }
        .show-msg { opacity: 1 !important; }
        .highlight { border-color: #00ff99 !important; box-shadow: 0 0 20px rgba(0,255,153,0.3); }
        .mythic-glow { box-shadow: inset 0 0 25px #ff003c, 0 0 15px #ff003c; }
        
        .income-tag { 
            background: rgba(0,0,0,0.6);
            padding: 2px 6px; border-radius: 10px;
            font-size: 0.7rem; color: #00ff99; font-weight: bold; margin-top: 4px; 
        }
    </style>
</head>
<body>

<div class="header">
    <div class="stats-left">
        <div>💰 <b id="money">500</b> KR</div>
        <div style="font-size: 0.9rem; opacity: 0.8;">PROD: <span id="pps">0</span>/S</div>
        <button id="upg-luck-btn" onclick="upgradeBlocks()" style="background:#00ff99; border:none; padding:8px 12px; border-radius:15px; cursor:pointer; font-weight:bold; margin-top:10px;">
            LÅS UPP NÄSTA BLOCK: <span id="upg-cost">2500</span> KR
        </button>
    </div>

    <div class="blocks-container">
        <div class="blocks-row" id="blocks-row"></div>
    </div>

    <div style="text-align: right;">
        <button onclick="resetGame()" style="background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer;">[ Reset ]</button>
        <a href="games.html" style="color: white; text-decoration: none; margin-left:10px; font-weight: bold;">[ AVSLUTA ]</a>
    </div>
</div>

<div class="game-area">
    <div id="city-grid"></div>
    <div class="sidebar">
        <h2 style="margin:0 0 15px 0; font-size: 1.2rem; color: var(--sd-gold); text-align: center;">INVENTORY</h2>
        <div id="inventory" style="overflow-y: auto;"></div>
    </div>
</div>

<div id="game-msg">Meddelande</div>

<script>
    let money = 500;
    let currentMaxBlock = 1; 
    let inventory = [];
    let cityData = Array(24).fill(null); // 6x4 = 24 rutor
    let selectedInvIndex = null;
    let cooldowns = [0, 0, 0, 0, 0];

    const upgCosts = [0, 2500, 15000, 75000, 300000];
    const blockPrices = [250, 1500, 7500, 35000, 150000];

    const buildings = [
        { name: "Stuga", icon: "🏠", rarity: "Common", income: 10, color: "#b5b5b5", sellPrice: 100 },
        { name: "Bod", icon: "🛖", rarity: "Common", income: 8, color: "#b5b5b5", sellPrice: 80 },
        { name: "Garage", icon: "🚗", rarity: "Common", income: 12, color: "#b5b5b5", sellPrice: 120 },
        { name: "Kiosk", icon: "🏪", rarity: "Common", income: 15, color: "#b5b5b5", sellPrice: 150 },
        
        { name: "Länga", icon: "🏡", rarity: "Uncommon", income: 35, color: "#1eff00", sellPrice: 600 },
        { name: "Pizzeria", icon: "🍕", rarity: "Uncommon", income: 45, color: "#1eff00", sellPrice: 750 },
        { name: "Macken", icon: "⛽", rarity: "Uncommon", income: 50, color: "#1eff00", sellPrice: 800 },
        { name: "Skola", icon: "🏫", rarity: "Uncommon", income: 40, color: "#1eff00", sellPrice: 700 },

        { name: "Hyreshus", icon: "🏢", rarity: "Rare", income: 120, color: "#0070dd", sellPrice: 3000 },
        { name: "Gallerian", icon: "🛍️", rarity: "Rare", income: 150, color: "#0070dd", sellPrice: 4000 },
        { name: "Sjukhus", icon: "🏥", rarity: "Rare", income: 180, color: "#0070dd", sellPrice: 4500 },
        { name: "Banken", icon: "🏦", rarity: "Rare", income: 200, color: "#0070dd", sellPrice: 5000 },

        { name: "Fabrik", icon: "🏭", rarity: "Epic", income: 550, color: "#a335ee", sellPrice: 15000 },
        { name: "Kraftverk", icon: "⚛️", rarity: "Epic", income: 700, color: "#a335ee", sellPrice: 20000 },
        { name: "Skyskrapa", icon: "🏙️", rarity: "Epic", income: 900, color: "#a335ee", sellPrice: 25000 },
        { name: "Arena", icon: "🏟️", rarity: "Epic", income: 1100, color: "#a335ee", sellPrice: 30000 },

        { name: "Slott", icon: "🏰", rarity: "Legendary", income: 3500, color: "#ff8000", sellPrice: 60000 },
        { name: "Oljerigg", icon: "🛢️", rarity: "Legendary", income: 5000, color: "#ff8000", sellPrice: 85000 },
        { name: "Casino", icon: "🎰", rarity: "Legendary", income: 7000, color: "#ff8000", sellPrice: 110000 },

        { name: "Imperium", icon: "💎", rarity: "Mythic", income: 18000, color: "#ff003c", sellPrice: 500000 },
        { name: "Future City", icon: "🛸", rarity: "Mythic", income: 30000, color: "#ff003c", sellPrice: 800000 },
        { name: "Mega-Bank", icon: "💰", rarity: "Mythic", income: 60000, color: "#ff003c", sellPrice: 1500000 }
    ];

    function buyBlock(tier) {
        if (cooldowns[tier-1] > 0) return;
        let price = blockPrices[tier-1];
        if (money < price) { showMessage("⚠️ För lite pengar!"); return; }

        money -= price;
        startCooldown(tier);
        
        let pool = [];
        if (tier === 1) pool = buildings.filter(b => b.rarity !== "Mythic");
        if (tier === 2) pool = buildings.filter(b => b.rarity !== "Common");
        if (tier === 3) pool = buildings.filter(b => b.rarity !== "Common" && b.rarity !== "Uncommon");
        if (tier === 4) pool = buildings.filter(b => b.rarity !== "Common" && b.rarity !== "Uncommon" && b.rarity !== "Rare");
        if (tier === 5) pool = buildings.filter(b => b.rarity === "Legendary" || b.rarity === "Mythic");

        const rand = Math.random() * 100;
        let wonItem;
        
        // Svårare odds: Mythic 1%, Legendary 7%, resten fördelat
        if (rand < 1) wonItem = pool.filter(b => b.rarity === "Mythic")[0] || pool[pool.length-1];
        else if (rand < 8) wonItem = pool.filter(b => b.rarity === "Legendary")[0] || pool[pool.length-1];
        else wonItem = pool[Math.floor(Math.random() * pool.length)];

        inventory.push({ ...wonItem, id: Date.now() });
        renderInventory(); updateUI(); saveGame();
    }

    function sellItem(index) {
        let item = inventory[index];
        money += item.sellPrice;
        inventory.splice(index, 1);
        showMessage(`💰 Sålde ${item.name} för ${item.sellPrice} kr`);
        renderInventory(); updateUI(); saveGame();
    }

    function renderInventory() {
        const invEl = document.getElementById('inventory');
        invEl.innerHTML = '';
        inventory.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'inv-item';
            div.style.borderLeft = `5px solid ${item.color}`;
            div.innerHTML = `
                <div><b>${item.icon}</b> ${item.name} (${item.rarity})</div>
                <div class="inv-buttons">
                    <button class="place-btn" onclick="preparePlacement(${index})">BYGG</button>
                    <button class="sell-btn" onclick="sellItem(${index})">SÄLJ (${item.sellPrice})</button>
                </div>`;
            invEl.appendChild(div);
        });
    }

    function renderCity() {
        const grid = document.getElementById('city-grid');
        grid.innerHTML = '';
        cityData.forEach((data, i) => {
            const slot = document.createElement('div');
            slot.className = 'slot';
            if (data) {
                // Sätt ramens färg baserat på sällsynthet
                slot.style.borderColor = data.color;
                slot.style.boxShadow = `inset 0 0 10px ${data.color}44`;
                slot.innerHTML = `<div class="building-icon">${data.icon}</div><div class="income-tag">+${data.income}/s</div>`;
                if(data.rarity === "Mythic") slot.classList.add('mythic-glow');
            } else {
                slot.style.borderColor = "rgba(255,255,255,0.05)";
                slot.style.boxShadow = "none";
            }
            slot.onclick = () => handleSlotClick(i);
            grid.appendChild(slot);
        });
    }

    function startCooldown(tier) {
        cooldowns[tier-1] = 5;
        renderBlocks();
        let t = setInterval(() => {
            cooldowns[tier-1]--;
            const cdDisplay = document.getElementById(`cd-${tier}`);
            if(cdDisplay) cdDisplay.innerText = cooldowns[tier-1];
            if (cooldowns[tier-1] <= 0) { clearInterval(t); renderBlocks(); }
        }, 1000);
    }

    function upgradeBlocks() {
        let cost = upgCosts[currentMaxBlock];
        if (money >= cost) {
            money -= cost;
            currentMaxBlock++;
            renderBlocks(); updateUI(); saveGame();
            showMessage("NYTT BLOCK UPPLÅST!");
        } else { showMessage("⚠️ För lite pengar!"); }
    }

    function renderBlocks() {
        const row = document.getElementById('blocks-row');
        row.innerHTML = '';
        const names = ["COMMON", "UNCOMMON", "RARE", "EPIC", "LEGEND"];
        const icons = ["?", "★", "◆", "✦", "👑"];
        for (let i = 1; i <= currentMaxBlock; i++) {
            const wrap = document.createElement('div');
            wrap.className = 'block-wrapper';
            const isCd = cooldowns[i-1] > 0;
            wrap.innerHTML = `
                <div id="block-${i}" class="lucky-block block-${i} ${isCd ? 'disabled' : ''}" onclick="buyBlock(${i})">
                    ${isCd ? '' : icons[i-1]}
                    <div id="cd-${i}" class="cooldown-text" style="display:${isCd?'block':'none'}">${cooldowns[i-1]}</div>
                </div>
                <div id="info-${i}" class="drop-info">${names[i-1]}<br>(${blockPrices[i-1]} KR)</div>`;
            row.appendChild(wrap);
        }
    }

    function handleSlotClick(i) {
        if (selectedInvIndex !== null) placeBuilding(i);
        else if (cityData[i]) pickUpBuilding(i);
    }

    function pickUpBuilding(i) {
        inventory.push(cityData[i]);
        cityData[i] = null;
        renderCity(); renderInventory(); updateUI(); saveGame();
    }

    function placeBuilding(slotIndex) {
        if (!cityData[slotIndex]) {
            cityData[slotIndex] = inventory[selectedInvIndex];
            inventory.splice(selectedInvIndex, 1);
            selectedInvIndex = null;
            renderCity(); renderInventory(); updateUI(); saveGame();
        }
    }

    function preparePlacement(index) {
        selectedInvIndex = index;
        const slots = document.getElementsByClassName('slot');
        for (let s of Array.from(slots)) { if (!s.innerHTML.includes('building-icon')) s.classList.add('highlight'); }
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(money).toLocaleString();
        const income = cityData.reduce((t, b) => t + (b ? b.income : 0), 0);
        document.getElementById('pps').innerText = income.toLocaleString();
        const upgBtn = document.getElementById('upg-luck-btn');
        if (currentMaxBlock >= 5) upgBtn.style.display = 'none';
        else document.getElementById('upg-cost').innerText = upgCosts[currentMaxBlock].toLocaleString();
    }

    function showMessage(h) {
        const m = document.getElementById('game-msg'); m.innerHTML = h;
        m.classList.add('show-msg'); setTimeout(() => m.classList.remove('show-msg'), 2000);
    }

    function saveGame() {
        localStorage.setItem('valfard_pro_v3', JSON.stringify({money, currentMaxBlock, inventory, cityData}));
    }

    function loadGame() {
        const s = localStorage.getItem('valfard_pro_v3');
        if (s) {
            const d = JSON.parse(s);
            money = d.money; currentMaxBlock = d.currentMaxBlock;
            inventory = d.inventory; cityData = d.cityData;
        }
    }

    function resetGame() {
        if(confirm("Nollställa staden?")) { localStorage.removeItem('valfard_pro_v3'); location.reload(); }
    }

    setInterval(() => {
        const inc = cityData.reduce((t, b) => t + (b ? b.income : 0), 0);
        money += inc; updateUI();
    }, 1000);

    loadGame(); renderCity(); renderInventory(); renderBlocks(); updateUI();
</script>
</body>
</html>
