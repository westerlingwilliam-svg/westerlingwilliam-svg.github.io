<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Westerling Williams Hemsida</title>
    <style>
        /* Här lägger vi CSS - designen på din sida */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a; /* Mörkgrå bakgrund */
            color: #f0f0f0; /* Ljus text */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
            border-radius: 15px;
            background: #252525;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-top: 5px solid #007bff; /* Blå kant högst upp */
        }

        h1 {
            color: #007bff;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            color: #bbb;
        }

        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Välkommen till min värld</h1>
        <p>Den här sidan drivs av GitHub Pages och kodas av mig.</p>
        <a href="#" class="button">Klicka här</a>
    </div>

</body>
</html>
