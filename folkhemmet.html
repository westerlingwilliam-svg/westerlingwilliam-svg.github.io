<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bygg Folkhemmet - Stabil Version</title>
    <style>
        * {
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
            font-family: 'Arial Black', sans-serif;
        }

        body {
            background-color: #005293;
            color: #333;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #fecc00;
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid #005293;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 20px;
            padding: 20px;
            flex-grow: 1;
        }

        .panel {
            background: white;
            padding: 15px;
            border: 5px solid #fecc00;
            min-height: 550px;
        }

        .center-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Huvudknappen */
        .main-clicker {
            background: #fff;
            border: 10px solid #fecc00;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 0 #b38f00;
            transition: transform 0.05s;
        }

        .main-clicker:active { transform: translateY(5px); box-shadow: 0 5px 0 #b38f00; }

        /* ALLA KÖPKNAPPAR ÄR IDENTISKA */
        .buy-button {
            background: #f0f0f0;
            border: 3px solid #005293;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            font-size: 1rem;
            transition: 0.1s;
        }

        .buy-button.disabled {
            background: #ccc !important;
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #999;
        }

        .buy-button:hover:not(.disabled) { background: #ddd; transform: scale(1.02); }

        .ach-card { padding: 10px; margin: 5px 0; border: 2px solid #ddd; background: #eee; font-size: 0.8rem; }
        .ach-card.unlocked { background: #fecc00; border-color: #005293; }

        .bottom-controls { text-align: center; padding: 40px; }
        .btn-reset { background: #ff4444; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }

        .plus-one {
            position: absolute;
            color: #fecc00;
            font-weight: bold;
            font-size: 2rem;
            pointer-events: none;
            animation: fly 0.8s forwards;
            text-shadow: 2px 2px 0px #005293;
        }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>BYGG FOLKHEMMET 🇸🇪</h1>
        <div style="font-size: 2rem;">Välfärd: <span id="money">0</span> kr</div>
        <div style="font-size: 1rem;">+<span id="pps">0</span>/sek | +<span id="mpc">1</span>/klick</div>
    </div>

    <div class="main-layout">
        <div class="panel">
            <h3>BUTIK</h3>
            <button class="buy-button" id="hammer-btn" onclick="buyHammer()">
                <b>Bättre Hammare</b>
                <span><span id="hammer-cost">15</span> kr</span>
            </button>
            <hr>
            <button class="buy-button" id="build-0" onclick="buyBuilding(0)">
                <b>Röd Stuga (<span id="count-0">0</span>)</b>
                <span><span id="cost-0">15</span> kr</span>
            </button>
            <button class="buy-button" id="build-1" onclick="buyBuilding(1)">
                <b>Hyreshus (<span id="count-1">0</span>)</b>
                <span><span id="cost-1">100</span> kr</span>
            </button>
            <button class="buy-button" id="build-2" onclick="buyBuilding(2)">
                <b>Sjukhus (<span id="count-2">0</span>)</b>
                <span><span id="cost-2">500</span> kr</span>
            </button>
            <button class="buy-button" id="build-3" onclick="buyBuilding(3)">
                <b>Svensk Industri (<span id="count-3">0</span>)</b>
                <span><span id="cost-3">2000</span> kr</span>
            </button>
        </div>

        <div class="center-area">
            <div class="main-clicker" onclick="doClick(event)">
                <span style="font-size: 5rem;">🏠</span>
                <b>BYGG!</b>
            </div>
            <br>
            <a href="games.html" style="background:#333; color:white; padding:10px; text-decoration:none; border:2px solid #fecc00;">TILLBAKA</a>
        </div>

        <div class="panel">
            <h3>PRESTATIONER</h3>
            <button class="buy-button" id="lic-btn" onclick="buyLicense()" style="background:#fecc00;">
                KÖP LICENS (1000 kr)
            </button>
            <div id="ach-list"></div>
        </div>
    </div>

    <div class="bottom-controls">
        <button class="btn-reset" onclick="hardReset()">NOLLSTÄLL SPELET</button>
    </div>

    <script>
        // SPEL-DATA
        let data = {
            money: 0,
            clicks: 0,
            mpc: 1,
            hammerPrice: 15,
            hasLicense: false,
            unlockedAch: [],
            bCounts: [0, 0, 0, 0],
            bCosts: [15, 100, 500, 2000]
        };

        const bIncomes = [1, 5, 20, 100];
        const achs = [
            { id: 0, t: "Flitig", d: "100 klick", c: () => data.clicks >= 100 },
            { id: 1, t: "Stugägare", d: "10 stugor", c: () => data.bCounts[0] >= 10 },
            { id: 2, t: "Rik", d: "5000 kr", c: () => data.money >= 5000 }
        ];

        function doClick(e) {
            data.money += data.mpc;
            data.clicks++;
            const t = document.createElement("div");
            t.className = "plus-one";
            t.innerText = "+" + data.mpc;
            t.style.left = e.pageX + "px"; t.style.top = e.pageY + "px";
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 800);
            update();
        }

        function buyHammer() {
            if (data.money >= data.hammerPrice) {
                data.money -= data.hammerPrice;
                data.mpc += 1;
                data.hammerPrice = Math.round(data.hammerPrice * 2.2);
                update();
            }
        }

        function buyBuilding(id) {
            if (data.money >= data.bCosts[id]) {
                data.money -= data.bCosts[id];
                data.bCounts[id]++;
                data.bCosts[id] = Math.round(data.bCosts[id] * 1.15);
                update();
            }
        }

        function buyLicense() {
            if (data.money >= 1000) {
                data.money -= 1000;
                data.hasLicense = true;
                update();
            }
        }

        function update() {
            // Siffror i header
            document.getElementById("money").innerText = Math.floor(data.money);
            document.getElementById("mpc").innerText = data.mpc;
            
            let pps = 0;
            for(let i=0; i<4; i++) pps += data.bCounts[i] * bIncomes[i];
            document.getElementById("pps").innerText = pps;

            // Uppdatera Hammare
            document.getElementById("hammer-cost").innerText = data.hammerPrice;
            document.getElementById("hammer-btn").className = "buy-button" + (data.money < data.hammerPrice ? " disabled" : "");

            // Uppdatera Byggnader (Priser och Antal)
            for(let i=0; i<4; i++) {
                document.getElementById("count-" + i).innerText = data.bCounts[i];
                document.getElementById("cost-" + i).innerText = data.bCosts[i];
                document.getElementById("build-" + i).className = "buy-button" + (data.money < data.bCosts[i] ? " disabled" : "");
            }

            // Licens & Achievements
            document.getElementById("lic-btn").style.display = data.hasLicense ? "none" : "block";
            document.getElementById("lic-btn").className = "buy-button" + (data.money < 1000 ? " disabled" : "");

            let alist = document.getElementById("ach-list");
            alist.innerHTML = "";
            if (data.hasLicense) {
                achs.forEach(a => {
                    if (!data.unlockedAch.includes(a.id) && a.c()) data.unlockedAch.push(a.id);
                    let done = data.unlockedAch.includes(a.id);
                    alist.innerHTML += `<div class="ach-card ${done ? 'unlocked' : ''}">
                        <b>${done ? '🏆' : '🔒'} ${a.t}</b><br><small>${a.d}</small>
                    </div>`;
                });
            }

            localStorage.setItem('folkhem_save_v5', JSON.stringify(data));
        }

        function hardReset() {
            if (confirm("Är du helt säker? Allt raderas!")) {
                localStorage.clear();
                location.reload();
            }
        }

        // Loop för inkomst per sekund
        setInterval(() => {
            let pps = 0;
            for(let i=0; i<4; i++) pps += data.bCounts[i] * bIncomes[i];
            data.money += pps / 10;
            update();
        }, 100);

        // Ladda vid start
        window.onload = () => {
            let s = localStorage.getItem('folkhem_save_v5');
            if (s) {
                let loaded = JSON.parse(s);
                // Koppla ihop sparad data med spelet
                Object.assign(data, loaded);
            }
            update();
        };
    </script>
</body>
</html>
