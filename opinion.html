<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riksdags Opinion Tycoon - ELITE EDITION</title>
    <style>
        :root {
            --sd-blue: #005293;
            --sd-yellow: #fecc00;
            --dark-blue: #001a33;
        }

        body {
            font-family: 'Segoe UI', Impact, sans-serif;
            background: var(--dark-blue);
            color: white;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Bakgrundsanimation */
        .bg-glow {
            position: fixed;
            top: 50%; left: 50%;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(0,82,147,0.3) 0%, rgba(0,0,0,0) 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }

        .stats-header {
            background: linear-gradient(180deg, var(--sd-blue), #003d6e);
            width: 100%;
            padding: 25px 0;
            display: flex;
            justify-content: center;
            gap: 50px;
            border-bottom: 5px solid var(--sd-yellow);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .stat-item { text-align: center; }
        .stat-label { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; }
        .stat-num { font-size: 2.2rem; font-weight: 900; color: var(--sd-yellow); text-shadow: 0 0 15px rgba(254, 204, 0, 0.5); }

        /* Opinion Bar */
        .progress-wrapper {
            width: 90%;
            max-width: 1000px;
            margin: 40px 0;
            position: relative;
        }

        .bar-container {
            height: 45px;
            background: rgba(255,255,255,0.1);
            border-radius: 25px;
            border: 4px solid #fff;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #opinion-bar {
            height: 100%;
            width: 20%;
            background: linear-gradient(90deg, #ffcc00, #fff700, #ffcc00);
            background-size: 200% 100%;
            animation: shine 2s linear infinite;
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes shine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .milestone-marker {
            position: absolute;
            top: -10px;
            height: 65px;
            width: 4px;
            background: red;
            z-index: 5;
        }

        /* Dashboard grid */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            width: 95%;
            max-width: 1200px;
            padding-bottom: 100px;
        }

        .upgrade-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .upgrade-card:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-5px);
            border-color: var(--sd-yellow);
        }

        .upgrade-card h3 { color: var(--sd-yellow); margin-top: 0; font-size: 1.4rem; }
        .price-tag { font-weight: bold; font-size: 1.1rem; margin: 10px 0; }

        .buy-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--sd-yellow);
            color: var(--dark-blue);
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 5px 0 #b38f00;
        }

        .buy-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b38f00; }
        .buy-btn:disabled { background: #555; box-shadow: none; cursor: not-allowed; color: #888; }

        /* Victory */
        #victory-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 82, 147, 0.98);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5000;
            text-align: center;
        }

        /* Popups */
        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: #fff; color: #222;
            padding: 40px; border-radius: 30px;
            z-index: 1000; display: none;
            text-align: center; width: 450px;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
            border: 10px solid var(--sd-blue);
        }
        .modal.active { display: block; animation: popIn 0.3s forwards; }

        @keyframes popIn { to { transform: translate(-50%, -50%) scale(1); } }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 999; display: none;
        }
    </style>
</head>
<body>

    <div id="victory-screen">
        <h1>50.0%</h1>
        <h2>VI HAR MAJORITET!</h2>
        <p style="font-size: 1.5rem;">Sverige har valt sin väg. Folkhemmet 2.0 är här.</p>
        <a href="games.html" class="buy-btn" style="text-decoration:none; padding: 20px 50px; display:inline-block; width: auto;">TILLBAKA TILL START</a>
    </div>

    <div class="bg-glow"></div>

    <div class="stats-header">
        <div class="stat-item">
            <div class="stat-label">Budget</div>
            <div class="stat-num" id="money">0 kr</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Opinion</div>
            <div class="stat-num" id="opinion-val">20.00%</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Väljare/sek</div>
            <div class="stat-num" id="growth-val">0.00%</div>
        </div>
    </div>

    <div class="progress-wrapper">
        <div class="bar-container">
            <div id="opinion-bar"></div>
        </div>
        <div class="milestone-marker" style="left: 4%;"></div> 
        <div style="position:absolute; left: 4%; top: 55px; font-size: 0.7rem;">4% SPÄRREN</div>
        
        <div class="milestone-marker" style="left: 50.1%; border-color: gold;"></div>
        <div style="position:absolute; left: 48%; top: 55px; font-size: 0.7rem; color: gold;">MAJORITET (50%)</div>
    </div>

    <div class="dashboard" id="shop"></div>

    <div class="overlay" id="overlay"></div>
    <div class="modal" id="event-modal">
        <h2 id="ev-title">TITEL</h2>
        <p id="ev-desc">BESKRIVNING</p>
        <div id="ev-choices"></div>
    </div>

    <center style="padding: 40px;">
        <a href="games.html" style="color: white; text-transform: uppercase; letter-spacing: 2px;">Tillbaka till huvudmenyn</a>
    </center>

    <script>
        let state = {
            money: 100000, 
            opinion: 20.0,
            moneyRate: 500, // Mycket snabbare pengar
            opinionRate: 0.005, // Mycket långsammare opinion (per 0.1s)
            gameActive: true
        };

        const upgrades = [
            { id: 0, name: "Snyggare Kostym", desc: "Jimmie ser fräschare ut i TV.", cost: 5000, oRate: 0.002, mRate: 100 },
            { id: 1, name: "Meme-fabrik", desc: "Dank memes för att nå ungdomarna.", cost: 15000, oRate: 0.008, mRate: 250 },
            { id: 2, name: "Eget Flygblad", desc: "Information direkt i brevlådan.", cost: 35000, oRate: 0.015, mRate: 600 },
            { id: 3, name: "YouTube-shorts", desc: "Klipp som aldrig tar slut.", cost: 80000, oRate: 0.035, mRate: 1500 },
            { id: 4, name: "Korv-turné", desc: "Mätta väljare är glada väljare.", cost: 180000, oRate: 0.08, mRate: 100 },
            { id: 5, name: "Kärnkraft-merch", desc: "T-shirts som lyser i mörkret.", cost: 400000, oRate: 0.15, mRate: 5000 },
            { id: 6, name: "Blågult Flygplan", desc: "Hela himlen blir blågul.", cost: 1000000, oRate: 0.3, mRate: 10000 },
            { id: 7, name: "Sanningens Hus", desc: "Eget mediehus vid Sergels Torg.", cost: 3500000, oRate: 0.7, mRate: 25000 },
            { id: 8, name: "AI-Strateg", desc: "En dator som förutspår varje röst.", cost: 10000000, oRate: 1.5, mRate: 70000 },
            { id: 9, name: "Statsminister-svit", desc: "Förberedelserna är klara.", cost: 25000000, oRate: 4.0, mRate: 200000 }
        ];

        const events = [
            { 
                t: "SVT-DEBATT", 
                d: "Du blir avbruten av programledaren. Vad gör du?", 
                choices: [
                    { t: "Säg 'Låt mig tala till punkt!'", o: 0.5, m: 0 },
                    { t: "Le och vänta på din tur", o: 0.1, m: 10000 }
                ]
            },
            { 
                t: "MATLAGNINGS-TV", 
                d: "Du ska laga mat i TV4. Vad bjuder du på?", 
                choices: [
                    { t: "Klassisk falukorv i ugn", o: 0.8, m: 0 },
                    { t: "En lyxig hummersoppa", o: -0.2, m: 50000 }
                ]
            },
            { 
                t: "TWITTER-STORM", 
                d: "Ett gammalt klipp sprids igen. Hur svarar du?", 
                choices: [
                    { t: "Gör en 're-make' av klippet", o: 1.2, m: 0 },
                    { t: "Ignorera totalt", o: 0, m: 20000 }
                ]
            },
            { 
                t: "DONATION", 
                d: "En anonym supporter vill skänka pengar.", 
                choices: [
                    { t: "Tacka och ta emot", o: -0.1, m: 150000 },
                    { t: "Be dem köpa merch istället", o: 0.4, m: 30000 }
                ]
            },
            { 
                t: "SKANDAL HOS MOTSTÅNDAREN", 
                d: "Oppositionen har gjort bort sig rejält. Hur reagerar du?", 
                choices: [
                    { t: "Lägg ut en hånfull meme", o: 1.5, m: 0 },
                    { t: "Var den 'vuxne i rummet'", o: 0.3, m: 100000 }
                ]
            }
        ];

        function initShop() {
            const shop = document.getElementById('shop');
            shop.innerHTML = "";
            upgrades.forEach(u => {
                shop.innerHTML += `
                    <div class="upgrade-card" id="card-${u.id}">
                        <div>
                            <h3>${u.name}</h3>
                            <p>${u.desc}</p>
                        </div>
                        <div>
                            <div class="price-tag">${u.cost.toLocaleString()} kr</div>
                            <button class="buy-btn" id="btn-${u.id}" onclick="buyUpgrade(${u.id})">KÖP</button>
                        </div>
                    </div>
                `;
            });
        }

        function buyUpgrade(id) {
            const idx = upgrades.findIndex(x => x.id === id);
            const u = upgrades[idx];
            if (state.money >= u.cost) {
                state.money -= u.cost;
                state.opinionRate += u.oRate;
                state.moneyRate += u.mRate;
                upgrades.splice(idx, 1);
                document.getElementById(`card-${id}`).remove();
                updateUI();
            }
        }

        function updateUI() {
            if (!state.gameActive) return;
            document.getElementById('money').innerText = Math.floor(state.money).toLocaleString() + " kr";
            document.getElementById('opinion-val').innerText = state.opinion.toFixed(2) + "%";
            document.getElementById('growth-val').innerText = "+" + (state.opinionRate * 10).toFixed(3) + "%";
            
            let barWidth = (state.opinion / 50) * 100;
            document.getElementById('opinion-bar').style.width = Math.min(barWidth, 100) + "%";

            if (state.opinion >= 50.0) winGame();

            upgrades.forEach(u => {
                const btn = document.getElementById(`btn-${u.id}`);
                if (btn) btn.disabled = state.money < u.cost;
            });
        }

        function winGame() {
            state.gameActive = false;
            document.getElementById('victory-screen').style.display = 'flex';
        }

        function triggerEvent() {
            if (!state.gameActive) return;
            const ev = events[Math.floor(Math.random() * events.length)];
            document.getElementById('ev-title').innerText = ev.t;
            document.getElementById('ev-desc').innerText = ev.d;
            const choiceBox = document.getElementById('ev-choices');
            choiceBox.innerHTML = "";
            
            ev.choices.forEach(c => {
                const b = document.createElement('button');
                b.className = "buy-btn";
                b.style.margin = "10px 0";
                b.innerText = c.t;
                b.onclick = () => {
                    state.opinion += c.o;
                    state.money += c.m;
                    closeModal();
                };
                choiceBox.appendChild(b);
            });

            document.getElementById('overlay').style.display = 'block';
            document.getElementById('event-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('event-modal').classList.remove('active');
            updateUI();
        }

        // Loop - 10 gånger i sekunden
        setInterval(() => {
            if (state.gameActive) {
                state.money += state.moneyRate / 10;
                state.opinion += state.opinionRate;
                updateUI();
            }
        }, 100);

        setInterval(triggerEvent, 25000); // Popup var 25:e sekund

        initShop();
        updateUI();
    </script>
</body>
</html>
