<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky City: Mega Blocks Update</title>
    <style>
        :root {
            --common: #b5b5b5;
            --uncommon: #1eff00;
            --rare: #0070dd;
            --epic: #a335ee;
            --legendary: #ff8000;
            --mythic: #ff003c;
            --sd-blue: #005293;
            --sd-gold: #fecc00;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at center, #001a33 0%, #000b18 100%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            background: rgba(0, 30, 60, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: grid;
            grid-template-columns: 220px 1fr 220px;
            align-items: center;
            border-bottom: 3px solid var(--sd-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 100;
        }

        .stats-left b { color: var(--sd-gold); font-size: 1.4rem; }

        /* MULTI-BLOCKS SYSTEM */
        .blocks-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            width: 100%;
        }
        
        .blocks-row {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding: 10px;
            width: 100%;
        }

        .block-wrapper { text-align: center; min-width: 150px; position: relative; }

        .lucky-block {
            width: 130px; height: 130px; /* Större blocks */
            background: var(--sd-gold);
            border-radius: 25px;
            display: flex;
            justify-content: center; align-items: center;
            font-size: 5rem; color: var(--sd-blue);
            cursor: pointer;
            box-shadow: 0 10px 0 #b38f00, 0 0 30px rgba(254, 204, 0, 0.2);
            transition: 0.1s;
            user-select: none;
            margin: 0 auto;
            position: relative;
        }
        
        /* Färger för olika blocks */
        .block-com { background: var(--common); color: #333; box-shadow: 0 10px 0 #888; }
        .block-unc { background: var(--uncommon); color: #000; box-shadow: 0 10px 0 #158000; }
        .block-rar { background: var(--rare); color: #fff; box-shadow: 0 10px 0 #004a94; }
        .block-epi { background: var(--epic); color: #fff; box-shadow: 0 10px 0 #6d20a1; }
        .block-leg { background: var(--legendary); color: #fff; box-shadow: 0 10px 0 #b35900; }

        .lucky-block.disabled { 
            opacity: 0.3; 
            cursor: not-allowed; 
            filter: grayscale(1); 
            transform: translateY(6px);
            box-shadow: none !important;
        }

        .cooldown-text {
            position: absolute;
            font-size: 2rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 15px black;
            pointer-events: none;
            display: none;
        }

        .drop-info {
            background: rgba(0,0,0,0.5);
            margin-top: 8px;
            padding: 5px;
            border-radius: 8px;
            font-size: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* GAME AREA */
        .game-area { display: flex; flex: 1; overflow: hidden; }
        #city-grid {
            flex: 3; display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(4, 1fr); /* Borttagen en rad */
            gap: 15px; padding: 25px;
        }
        
        .slot {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.05);
            border-radius: 15px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: 0.3s;
            cursor: pointer;
        }
        .slot:hover { background: rgba(255,255,255,0.08); border-color: var(--sd-gold); }

        .building-icon { 
            font-size: 3.5rem; 
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .sidebar {
            flex: 1; background: rgba(0, 15, 30, 0.9);
            border-left: 2px solid var(--sd-blue);
            padding: 20px; display: flex; flex-direction: column;
        }
        .inv-item {
            background: rgba(255,255,255,0.05); padding: 12px;
            border-radius: 10px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }

        #game-msg {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%); background: var(--sd-gold);
            color: #001a33; padding: 12px 30px; border-radius: 50px;
            opacity: 0; transition: 0.3s; z-index: 1000;
            font-weight: bold; text-align: center;
        }
        .show-msg { opacity: 1 !important; }
        .highlight { border-color: #00ff99 !important; box-shadow: 0 0 20px rgba(0,255,153,0.3); }
        .mythic-glow { box-shadow: inset 0 0 25px #ff003c, 0 0 15px #ff003c; border-color: #ff003c !important; }
        
        .income-tag { 
            background: rgba(0,0,0,0.6);
            padding: 2px 8px; border-radius: 10px;
            font-size: 0.75rem; color: #00ff99; font-weight: bold; margin-top: 5px; 
        }
    </style>
</head>
<body>

<div class="header">
    <div class="stats-left">
        <div>💰 <b id="money">500</b> KR</div>
        <div style="font-size: 0.9rem; opacity: 0.8;">PROD: <span id="pps">0</span>/S</div>
        <button id="upg-luck-btn" onclick="upgradeBlocks()" style="background:#00ff99; border:none; padding:8px 12px; border-radius:15px; cursor:pointer; font-weight:bold; margin-top:10px;">
            LÅS UPP NÄSTA BLOCK: <span id="upg-cost">2500</span> KR
        </button>
    </div>

    <div class="blocks-container">
        <div class="blocks-row" id="blocks-row">
            </div>
    </div>

    <div style="text-align: right;">
        <button onclick="resetGame()" style="background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer;">[ Reset ]</button>
        <a href="games.html" style="color: white; text-decoration: none; margin-left:10px; font-weight: bold;">[ AVSLUTA ]</a>
    </div>
</div>

<div class="game-area">
    <div id="city-grid"></div>
    <div class="sidebar">
        <h2 style="margin:0 0 15px 0; font-size: 1.2rem; color: var(--sd-gold); text-align: center;">INVENTORY</h2>
        <div id="inventory" style="overflow-y: auto;"></div>
    </div>
</div>

<div id="game-msg">Meddelande</div>

<script>
    let money = 500;
    let currentMaxBlock = 1; // 1 = Common, 2 = Uncommon, etc.
    let inventory = [];
    let cityData = Array(24).fill(null); // Ändrat till 24 rutor (6x4)
    let selectedInvIndex = null;
    let cooldowns = [0, 0, 0, 0, 0];

    const upgCosts = [0, 2500, 10000, 50000, 250000];
    const blockPrices = [250, 1250, 5000, 25000, 100000];

    // Väldigt många fler saker
    const buildings = [
        { name: "Röd Stuga", icon: "🏠", rarity: "Common", income: 10, color: "#b5b5b5" },
        { name: "Liten Bod", icon: "🛖", rarity: "Common", income: 8, color: "#b5b5b5" },
        { name: "Garage", icon: "🚗", rarity: "Common", income: 12, color: "#b5b5b5" },
        { name: "Växthus", icon: "🌿", rarity: "Common", income: 15, color: "#b5b5b5" },
        
        { name: "Skånelänga", icon: "🏡", rarity: "Uncommon", income: 35, color: "#1eff00" },
        { name: "Pizzeria", icon: "🍕", rarity: "Uncommon", income: 45, color: "#1eff00" },
        { name: "Bensinstation", icon: "⛽", rarity: "Uncommon", income: 50, color: "#1eff00" },
        { name: "Lager", icon: "📦", rarity: "Uncommon", income: 40, color: "#1eff00" },

        { name: "Hyreshus", icon: "🏢", rarity: "Rare", income: 120, color: "#0070dd" },
        { name: "Köpcentrum", icon: "🛍️", rarity: "Rare", income: 150, color: "#0070dd" },
        { name: "Sjukhus", icon: "🏥", rarity: "Rare", income: 180, color: "#0070dd" },
        { name: "Bank", icon: "🏦", rarity: "Rare", income: 200, color: "#0070dd" },

        { name: "Fabrik", icon: "🏭", rarity: "Epic", income: 500, color: "#a335ee" },
        { name: "Kärnkraft", icon: "⚛️", rarity: "Epic", income: 650, color: "#a335ee" },
        { name: "Skyskrapa", icon: "🏙️", rarity: "Epic", income: 800, color: "#a335ee" },
        { name: "Raketbas", icon: "🚀", rarity: "Epic", income: 1000, color: "#a335ee" },

        { name: "Guldslott", icon: "🏰", rarity: "Legendary", income: 3000, color: "#ff8000" },
        { name: "Oljeplattform", icon: "🛢️", rarity: "Legendary", income: 4500, color: "#ff8000" },
        { name: "Casino", icon: "🎰", rarity: "Legendary", income: 6000, color: "#ff8000" },

        { name: "Jimmies Slott", icon: "💎", rarity: "Mythic", income: 15000, color: "#ff003c" },
        { name: "Framtidsstad", icon: "🛸", rarity: "Mythic", income: 25000, color: "#ff003c" },
        { name: "Gudatempel", icon: "⛩️", rarity: "Mythic", income: 50000, color: "#ff003c" }
    ];

    function upgradeBlocks() {
        let cost = upgCosts[currentMaxBlock];
        if (money >= cost) {
            money -= cost;
            currentMaxBlock++;
            renderBlocks();
            updateUI();
            saveGame();
            showMessage("NYTT BLOCK UPPLÅST!");
        } else { showMessage("⚠️ För lite pengar!"); }
    }

    function buyBlock(tier) {
        if (cooldowns[tier-1] > 0) return;
        let price = blockPrices[tier-1];
        if (money < price) { showMessage("⚠️ För lite pengar!"); return; }

        money -= price;
        startCooldown(tier);
        
        let pool = [];
        if (tier === 1) pool = buildings.filter(b => b.rarity !== "Mythic");
        if (tier === 2) pool = buildings.filter(b => b.rarity !== "Common");
        if (tier === 3) pool = buildings.filter(b => b.rarity !== "Common" && b.rarity !== "Uncommon");
        if (tier === 4) pool = buildings.filter(b => b.rarity === "Epic" || b.rarity === "Legendary" || b.rarity === "Mythic");
        if (tier === 5) pool = buildings.filter(b => b.rarity === "Legendary" || b.rarity === "Mythic");

        const rand = Math.random() * 100;
        let wonItem;
        // Enkel viktning baserat på poolen
        if (rand < 2) wonItem = pool.filter(b => b.rarity === "Mythic")[0] || pool[pool.length-1];
        else if (rand < 10) wonItem = pool.filter(b => b.rarity === "Legendary")[0] || pool[pool.length-1];
        else wonItem = pool[Math.floor(Math.random() * pool.length)];

        inventory.push({ ...wonItem, id: Date.now() });
        document.getElementById(`info-${tier}`).innerHTML = `<b style="color:${wonItem.color}">${wonItem.name}</b><br>${wonItem.rarity}`;
        renderInventory(); updateUI(); saveGame();
    }

    function startCooldown(tier) {
        cooldowns[tier-1] = 5;
        renderBlocks();
        let t = setInterval(() => {
            cooldowns[tier-1]--;
            if(document.getElementById(`cd-${tier}`)) document.getElementById(`cd-${tier}`).innerText = cooldowns[tier-1];
            if (cooldowns[tier-1] <= 0) { clearInterval(t); renderBlocks(); }
        }, 1000);
    }

    function renderBlocks() {
        const row = document.getElementById('blocks-row');
        row.innerHTML = '';
        const names = ["COM", "UNC", "RAR", "EPI", "LEG"];
        const classes = ["block-com", "block-unc", "block-rar", "block-epi", "block-leg"];

        for (let i = 1; i <= currentMaxBlock; i++) {
            const wrap = document.createElement('div');
            wrap.className = 'block-wrapper';
            const isCd = cooldowns[i-1] > 0;
            wrap.innerHTML = `
                <div id="block-${i}" class="lucky-block ${classes[i-1]} ${isCd ? 'disabled' : ''}" onclick="buyBlock(${i})">
                    ${isCd ? '' : '?'}
                    <div id="cd-${i}" class="cooldown-text" style="display:${isCd?'block':'none'}">${cooldowns[i-1]}</div>
                </div>
                <div id="info-${i}" class="drop-info">${names[i-1]} (${blockPrices[i-1]} KR)</div>
            `;
            row.appendChild(wrap);
        }
    }

    function handleSlotClick(i) {
        if (selectedInvIndex !== null) placeBuilding(i);
        else if (cityData[i]) pickUpBuilding(i);
    }

    function pickUpBuilding(i) {
        inventory.push(cityData[i]);
        cityData[i] = null;
        renderCity(); renderInventory(); updateUI(); saveGame();
    }

    function placeBuilding(slotIndex) {
        if (!cityData[slotIndex]) {
            cityData[slotIndex] = inventory[selectedInvIndex];
            inventory.splice(selectedInvIndex, 1);
            selectedInvIndex = null;
            renderCity(); renderInventory(); updateUI(); saveGame();
        }
    }

    function renderCity() {
        const grid = document.getElementById('city-grid');
        grid.innerHTML = '';
        cityData.forEach((data, i) => {
            const slot = document.createElement('div');
            slot.className = 'slot';
            if (data) {
                slot.innerHTML = `<div class="building-icon">${data.icon}</div><div class="income-tag">+${data.income}/s</div>`;
                if(data.rarity === "Mythic") slot.classList.add('mythic-glow');
            }
            slot.onclick = () => handleSlotClick(i);
            grid.appendChild(slot);
        });
    }

    function renderInventory() {
        const invEl = document.getElementById('inventory');
        invEl.innerHTML = '';
        inventory.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'inv-item';
            div.style.borderLeft = `5px solid ${item.color}`;
            div.innerHTML = `<div><b>${item.icon}</b> ${item.name}<br><small>${item.rarity}</small></div>
            <button class="place-btn" onclick="event.stopPropagation(); preparePlacement(${index})">BYGG</button>`;
            invEl.appendChild(div);
        });
    }

    function preparePlacement(index) {
        selectedInvIndex = index;
        const slots = document.getElementsByClassName('slot');
        for (let s of Array.from(slots)) { if (!s.innerHTML.includes('building-icon')) s.classList.add('highlight'); }
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(money).toLocaleString();
        const income = cityData.reduce((t, b) => t + (b ? b.income : 0), 0);
        document.getElementById('pps').innerText = income.toLocaleString();
        const upgBtn = document.getElementById('upg-luck-btn');
        if (currentMaxBlock >= 5) upgBtn.style.display = 'none';
        else document.getElementById('upg-cost').innerText = upgCosts[currentMaxBlock].toLocaleString();
    }

    function showMessage(h) {
        const m = document.getElementById('game-msg'); m.innerHTML = h;
        m.classList.add('show-msg'); setTimeout(() => m.classList.remove('show-msg'), 2000);
    }

    function saveGame() {
        localStorage.setItem('valfard_mega_save', JSON.stringify({money, currentMaxBlock, inventory, cityData}));
    }

    function loadGame() {
        const s = localStorage.getItem('valfard_mega_save');
        if (s) {
            const d = JSON.parse(s);
            money = d.money; currentMaxBlock = d.currentMaxBlock;
            inventory = d.inventory; cityData = d.cityData;
        }
    }

    setInterval(() => {
        const inc = cityData.reduce((t, b) => t + (b ? b.income : 0), 0);
        money += inc; updateUI();
    }, 1000);

    loadGame(); renderCity(); renderInventory(); renderBlocks(); updateUI();
</script>
</body>
</html>
