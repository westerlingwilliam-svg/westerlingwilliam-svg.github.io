<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bygg Folkhemmet - Total Edition</title>
    <style>
        * { 
            user-select: none; 
            -webkit-user-select: none; 
            box-sizing: border-box; 
            font-family: 'Arial Black', sans-serif; 
        }
        
        @keyframes bgScroll { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }

        body { 
            background: linear-gradient(-45deg, #005293, #003d6e, #001f3f, #003d6e);
            background-size: 400% 400%;
            animation: bgScroll 15s ease infinite;
            color: #333; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        .header { 
            background: #fecc00; 
            padding: 20px 10px; 
            text-align: center; 
            border-bottom: 8px solid #005293; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
            z-index: 100; 
            flex-shrink: 0; 
            position: relative;
        }

        .upgrade-shop-btn {
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: #005293; 
            color: white;
            border: 3px solid white; 
            padding: 10px 20px; 
            border-radius: 12px; 
            cursor: pointer;
            box-shadow: 0 4px 0 #002b4d; 
            transition: 0.1s;
        }

        .money-display {
            background: #005293; 
            color: #fecc00; 
            padding: 12px 40px; 
            border-radius: 50px;
            border: 4px solid white; 
            display: inline-block; 
            font-size: 2.5rem; 
            margin-bottom: 10px;
        }

        .stat-container { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            flex-wrap: wrap; 
        }

        .stat-box { 
            background: #005293; 
            color: #fecc00; 
            padding: 8px 15px; 
            border-radius: 12px; 
            border: 2px solid white; 
            font-size: 1.1rem; 
        }

        .main-layout { 
            display: grid; 
            grid-template-columns: 450px 1fr 450px; 
            gap: 20px; 
            padding: 20px; 
            flex-grow: 1; 
            height: calc(100vh - 200px); 
            max-width: 1900px; 
            margin: 0 auto; 
            width: 100%;
        }

        .panel { 
            background: rgba(255,255,255,0.95); 
            padding: 20px; 
            border-radius: 25px; 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .scroll-content { 
            overflow-y: auto; 
            flex-grow: 1; 
            padding-right: 10px; 
        }

        .buy-button { 
            background: #fff; 
            border: 2px solid #ddd; 
            padding: 15px; 
            cursor: pointer; 
            width: 100%; 
            border-radius: 15px; 
            margin-bottom: 10px; 
            transition: 0.2s;
            text-align: left;
        }

        .buy-button:hover:not(.disabled) { 
            border-color: #fecc00; 
            background: #fffdf0; 
            transform: translateY(-2px); 
        }

        .buy-button.disabled { 
            opacity: 0.4; 
            cursor: not-allowed; 
            filter: grayscale(1); 
        }

        .btn-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .price-tag { 
            background: #fecc00; 
            color: #005293; 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-weight: 900; 
        }

        .center-area { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }

        .main-clicker { 
            background: #fff; 
            border: 15px solid #fecc00; 
            width: 350px; 
            height: 350px; 
            border-radius: 50%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            box-shadow: 0 15px 0 #b38f00; 
            transition: 0.1s;
            position: relative;
        }

        .main-clicker:active { 
            transform: translateY(8px); 
            box-shadow: 0 7px 0 #b38f00; 
        }

        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(5px); 
        }

        .modal-content { 
            background: white; 
            width: 700px; 
            margin: 5% auto; 
            border-radius: 30px; 
            border: 10px solid #fecc00; 
            max-height: 85vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        .tab-menu { 
            display: flex; 
            background: #005293; 
            padding: 10px; 
        }

        .tab-btn { 
            flex: 1; 
            padding: 15px; 
            border: none; 
            background: rgba(255,255,255,0.1); 
            color: white; 
            cursor: pointer; 
            font-weight: bold; 
            margin: 0 5px;
            border-radius: 10px;
        }

        .tab-btn.active { 
            background: #fecc00; 
            color: #005293; 
        }

        .tab-body { 
            padding: 25px; 
            overflow-y: auto; 
            flex-grow: 1; 
        }

        .ach-card { 
            background: #fdfdfd; 
            border: 4px solid #005293; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 15px; 
        }

        .progress-container { 
            background: #ddd; 
            height: 25px; 
            width: 100%; 
            border-radius: 12px; 
            margin: 10px 0; 
            overflow: hidden; 
            position: relative; 
            border: 2px solid #005293; 
        }

        .progress-bar { 
            background: #fecc00; 
            height: 100%; 
            transition: width 0.3s; 
        }

        .progress-text { 
            position: absolute; 
            width: 100%; 
            text-align: center; 
            top: 0; 
            font-size: 0.9rem; 
            font-weight: 900; 
            color: #005293; 
            line-height: 21px; 
        }

        .claim-btn { 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: not-allowed; 
            background: #999; 
            border: none; 
            color: white; 
        }

        .claim-btn.ready { 
            background: #28a745; 
            cursor: pointer; 
            border-bottom: 4px solid #1e7e34; 
        }

        .plus-one { 
            position: absolute; 
            color: #fecc00; 
            font-weight: bold; 
            font-size: 2.5rem; 
            pointer-events: none; 
            animation: fly 0.8s forwards; 
            text-shadow: 3px 3px 0px #005293; 
            z-index: 1000; 
        }

        @keyframes fly { 
            0% { opacity: 1; transform: translateY(0); } 
            100% { opacity: 0; transform: translateY(-150px); } 
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>BYGG FOLKHEMMET: ELITE</h1>
        <button class="upgrade-shop-btn" onclick="toggleModal(true)">💎 UPPGRADERINGAR</button>
        <div class="money-display">💰 <span id="money">0</span> kr</div>
        <div class="stat-container">
            <div class="stat-box">📈 <span id="pps">0</span> /s</div>
            <div class="stat-box">🖱️ <span id="mpc">1</span> /klick</div>
            <div class="stat-box" style="background: #fecc00; color: #005293;">🏆 Bonus: <span id="bonus-val">0</span>%</div>
        </div>
    </div>

    <div id="upgradeModal" class="modal">
        <div class="modal-content">
            <div class="tab-menu">
                <button class="tab-btn active" onclick="switchTab(event, 'tech-list')">TEKNIK</button>
                <button class="tab-btn" onclick="switchTab(event, 'boost-list')">BOOSTS</button>
                <button class="tab-btn" onclick="switchTab(event, 'skin-list')">UTSEENDE</button>
                <button class="tab-btn" onclick="toggleModal(false)" style="background:#cc0000; flex:0.3;">STÄNG</button>
            </div>
            <div id="tech-list" class="tab-body" style="display:block;"></div>
            <div id="boost-list" class="tab-body" style="display:none;"></div>
            <div id="skin-list" class="tab-body" style="display:none;"></div>
        </div>
    </div>

    <div class="main-layout">
        <div class="panel">
            <h3>BYGGNADSMARKNAD</h3>
            <div class="scroll-content">
                <button class="buy-button" id="hammer-btn" onclick="buyHammer()">
                    <div class="btn-header"><b>Svensk Hammare</b> <div class="price-tag"><span id="hammer-cost">15</span> kr</div></div>
                    <div style="font-size:0.8rem;">Gör dina klick starkare baserat på din ekonomi.</div>
                </button>
                <button class="buy-button" id="auto-btn" onclick="buyAuto()">
                    <div class="btn-header"><b>Automatisering</b> <div class="price-tag"><span id="auto-cost">100</span> kr</div></div>
                    <div style="font-size:0.8rem;">En robot som klickar åt dig varje sekund.</div>
                </button>
                <hr style="border: 2px solid #fecc00; margin: 15px 0;">
                <div id="building-list"></div>
            </div>
        </div>

        <div class="center-area">
            <div id="clicker-visual" class="main-clicker" onmousedown="startHold()" onmouseup="endHold()" onmouseleave="endHold()" onclick="doClick(event)">
                <span id="clicker-icon" style="font-size: 10rem;">🏠</span>
                <b id="clicker-text" style="font-size: 2rem; margin-top: 10px;">BYGG!</b>
            </div>
            <div style="margin-top: 20px;">
                 <button onclick="saveGame()" style="background:#444; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">Spara Spel</button>
            </div>
        </div>

        <div class="panel">
            <h3>STATLIGA UPPDRAG</h3>
            <div class="scroll-content">
                <div id="ach-license-area">
                    <div style="background:#eee; padding:20px; border-radius:15px; text-align:center;">
                        <p><b>Jimmie-licens krävs</b></p>
                        <p style="font-size:0.8rem;">Du måste ha tillstånd från ledningen för att utföra uppdrag.</p>
                        <button class="buy-button" onclick="buyLicense()" style="background:#fecc00; border:3px solid #005293; text-align:center;">
                            <b>KÖP LICENS (1 500 kr)</b>
                        </button>
                    </div>
                </div>
                <div id="ach-container"></div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'folkhem_ultra_v11_full';
        
        let data = {
            money: 0,
            clicks: 0,
            mpc: 1,
            autoClicks: 0,
            hammerPrice: 15,
            autoPrice: 100,
            hasLicense: false,
            questsDone: 0,
            hammerLevel: 0,
            hasHeld5s: false,
            shopDiscount: 0,
            achLevels: { click: 0, money: 0, b0: 0, total: 0, secret: 0, challenges: 0 },
            bCounts: Array(11).fill(0),
            bCosts: [50, 400, 2000, 10000, 60000, 400000, 2500000, 15000000, 100000000, 1000000000, 10000000000],
            eff: Array(11).fill(1),
            ownedUpgrades: []
        };

        const buildings = [
            { name: "Röd Stuga", inc: 1 },
            { name: "Hyreshus", inc: 8 },
            { name: "Sjukhus", inc: 45 },
            { name: "Industri", inc: 180 },
            { name: "Universitet", inc: 750 },
            { name: "Kärnkraft", inc: 3500 },
            { name: "Välfärdsstat", inc: 15000 },
            { name: "Rymdprogram", inc: 65000 },
            { name: "AI-Myndighet", inc: 250000 },
            { name: "Sverige 2.0", inc: 1200000 },
            { name: "SD-Högkvarteret 🌸", inc: 10000000 }
        ];

        const specialUpgrades = [
            { id: "t1", tab: "tech-list", name: "Bygglovs-rabatt", desc: "Minskar priset i butiken med 10%", cost: 10000, type: "disc", val: 0.1 },
            { id: "t2", tab: "tech-list", name: "Treglasfönster", desc: "Röd Stuga producerar 2x mer", cost: 5000, type: "eff", target: 0, val: 2 },
            { id: "t3", tab: "tech-list", name: "Snabbhissar", desc: "Hyreshus producerar 2x mer", cost: 25000, type: "eff", target: 1, val: 2 },
            { id: "t4", tab: "tech-list", name: "Digital Journal", desc: "Sjukhus producerar 2x mer", cost: 150000, type: "eff", target: 2, val: 2 },
            { id: "b1", tab: "boost-list", name: "Svensk Export", desc: "Ökar ALL produktion med 25%", cost: 50000, type: "global", val: 0.25 },
            { id: "b2", tab: "boost-list", name: "Högkonjunktur", desc: "Ökar ALL produktion med 50%", cost: 500000, type: "global", val: 0.5 },
            { id: "b3", tab: "boost-list", name: "Välfärds-boom", desc: "Ökar ALL produktion med 100%", cost: 5000000, type: "global", val: 1.0 },
            { id: "s1", tab: "skin-list", name: "Guld-Fasad", desc: "Gör klicker-huset gyllene", cost: 100000, type: "skin", icon: "🪙", color: "#FFD700" },
            { id: "s2", tab: "skin-list", name: "Cyber-Sverige", desc: "Framtidens klicker", cost: 1000000, type: "skin", icon: "⚡", color: "#00f2ff" },
            { id: "s3", tab: "skin-list", name: "Kungligt Slott", desc: "Den ultimata klickern", cost: 50000000, type: "skin", icon: "👑", color: "#6a0dad" }
        ];

        const achChains = {
            click: [
                { t: "Nybörjare", target: 10, reward: 50, req: "10 klick" },
                { t: "Slitvarg", target: 100, reward: 500, req: "100 klick" },
                { t: "Klick-Kungen", target: 1000, reward: 10000, req: "1 000 klick" },
                { t: "Klick-Gud", target: 100000, reward: 50000000, req: "100 000 klick" }
            ],
            money: [
                { t: "Fickpengar", target: 100, reward: 50, req: "Ha 100 kr" },
                { t: "Månadslön", target: 25000, reward: 5000, req: "Ha 25 000 kr" },
                { t: "Miljonär", target: 1000000, reward: 250000, req: "Ha 1 milj kr" },
                { t: "Statsskassan", target: 1000000000, reward: 200000000, req: "Ha 1 miljard" }
            ],
            b0: [
                { t: "Första stugan", target: 1, reward: 100, req: "1 Röd Stuga" },
                { t: "Sommarstugeområde", target: 25, reward: 5000, req: "25 Röda Stugor" },
                { t: "Stug-imperiet", target: 100, reward: 1000000, req: "100 Röda Stugor" }
            ],
            total: [
                { t: "Byggstart", target: 1, reward: 50, req: "1 byggnad totalt" },
                { t: "Samhällsbyggare", target: 100, reward: 100000, req: "100 byggnader totalt" },
                { t: "Storstad", target: 500, reward: 5000000, req: "500 byggnader totalt" }
            ],
            secret: [
                { t: "Miljonprogrammet", target: 5, targetType: "b1", reward: 2500, req: "Bygg 5 Hyreshus" },
                { t: "Vårdköer borta", target: 10, targetType: "b2", reward: 100000, req: "Bygg 10 Sjukhus" },
                { t: "Akademiker", target: 15, targetType: "b4", reward: 5000000, req: "Bygg 15 Universitet" },
                { t: "Sverigevän", target: 1, targetType: "b10", reward: 25000000, req: "Bygg 1 SD-Högkvarter" }
            ],
            challenges: [
                { t: "Tålamodstest", target: 1, targetType: "hold5", reward: 5000, req: "Håll inne klickern i 5 sekunder" }
            ]
        };

        function switchTab(evt, tabName) {
            let content = document.getElementsByClassName("tab-body");
            for (let i = 0; i < content.length; i++) content[i].style.display = "none";
            let btns = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < btns.length; i++) btns[i].classList.remove("active");
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.classList.add("active");
        }

        function toggleModal(show) { 
            document.getElementById("upgradeModal").style.display = show ? "block" : "none"; 
            if(show) renderUpgrades(); 
        }

        function getQuestBonus() { return 1 + (data.questsDone * 0.10); }

        function getGlobalMulti() { 
            let m = 1; 
            specialUpgrades.forEach(u => { 
                if(u.type === "global" && data.ownedUpgrades.includes(u.id)) m += u.val; 
            });
            return m;
        }

        function getTotalPPS() {
            let pps = 0;
            buildings.forEach((b, i) => { 
                pps += data.bCounts[i] * (b.inc * data.eff[i]); 
            });
            return pps * getQuestBonus() * getGlobalMulti();
        }

        function calculateMPC() {
            let bonus = (getTotalPPS() * 0.0016) * data.hammerLevel;
            return Math.max(1, Math.floor((1 + data.hammerLevel) + bonus));
        }

        function doClick(e) {
            let mpc = calculateMPC();
            data.money += mpc; 
            data.clicks++;
            
            const t = document.createElement("div"); 
            t.className = "plus-one"; 
            t.innerText = "+" + mpc.toLocaleString();
            t.style.left = e.pageX + "px"; 
            t.style.top = e.pageY + "px";
            document.body.appendChild(t); 
            setTimeout(() => t.remove(), 800);
            
            updateNumbersOnly();
        }

        function getDiscounted(p) { return Math.round(p * (1 - data.shopDiscount)); }

        function buyHammer() { 
            let p = getDiscounted(data.hammerPrice);
            if(data.money >= p) { 
                data.money -= p; 
                data.hammerLevel++; 
                data.hammerPrice *= 2.1; 
                renderEverything(); 
            }
        }

        function buyAuto() {
            let p = getDiscounted(data.autoPrice);
            if(data.money >= p) { 
                data.money -= p; 
                data.autoClicks++; 
                data.autoPrice *= 2.5; 
                renderEverything(); 
            }
        }

        function buyBuilding(i) {
            let p = getDiscounted(data.bCosts[i]);
            if(data.money >= p) { 
                data.money -= p; 
                data.bCounts[i]++; 
                data.bCosts[i] *= 1.35; 
                renderEverything(); 
            }
        }

        function buyUpgrade(id) {
            const u = specialUpgrades.find(x => x.id === id);
            if(data.money >= u.cost && !data.ownedUpgrades.includes(id)) {
                data.money -= u.cost; 
                data.ownedUpgrades.push(id);
                if(u.type === "disc") data.shopDiscount += u.val;
                if(u.type === "eff") data.eff[u.target] *= u.val;
                if(u.type === "skin") {
                    document.getElementById("clicker-icon").innerText = u.icon;
                    document.getElementById("clicker-visual").style.borderColor = u.color;
                    document.getElementById("clicker-visual").style.color = u.color;
                }
                renderUpgrades(); 
                renderEverything();
            }
        }

        function renderUpgrades() {
            ["tech-list", "boost-list", "skin-list"].forEach(tabId => {
                let html = "";
                specialUpgrades.filter(u => u.tab === tabId).forEach(u => {
                    const owned = data.ownedUpgrades.includes(u.id);
                    html += `<button class="buy-button ${owned ? 'disabled' : ''}" onclick="buyUpgrade('${u.id}')">
                        <div class="btn-header">
                            <b>${u.name}</b> 
                            ${owned ? '<span style="color:green">KÖPT</span>' : `<div class="price-tag">${u.cost.toLocaleString()} kr</div>`}
                        </div>
                        <div style="font-size:0.8rem;">${u.desc}</div>
                    </button>`;
                });
                document.getElementById(tabId).innerHTML = html;
            });
        }

        let holdTimer;
        function startHold() { 
            holdTimer = setTimeout(() => { 
                if(!data.hasHeld5s) {
                    data.hasHeld5s = true; 
                    renderEverything(); 
                }
            }, 5000); 
        }
        function endHold() { clearTimeout(holdTimer); }

        function buyLicense() { 
            if(data.money >= 1500) { 
                data.money -= 1500; 
                data.hasLicense = true; 
                renderEverything(); 
            }
        }

        function getValByType(type, level) {
            const ach = achChains[type][level];
            if (!ach) return 0;
            if (type === 'secret') return data.bCounts[parseInt(ach.targetType.substring(1))];
            if (type === 'challenges') return data.hasHeld5s ? 1 : 0;
            if (type === 'click') return data.clicks;
            if (type === 'money') return data.money;
            if (type === 'b0') return data.bCounts[0];
            if (type === 'total') return data.bCounts.reduce((a,b)=>a+b,0);
            return 0;
        }

        function claimAch(type) {
            const level = data.achLevels[type];
            const val = getValByType(type, level);
            if(val >= achChains[type][level].target) {
                data.money += achChains[type][level].reward;
                data.achLevels[type]++; 
                data.questsDone++;
                renderEverything();
            }
        }

        function updateNumbersOnly() {
            document.getElementById("money").innerText = Math.floor(data.money).toLocaleString();
            document.getElementById("pps").innerText = Math.floor(getTotalPPS()).toLocaleString();
            document.getElementById("mpc").innerText = calculateMPC().toLocaleString();
            document.getElementById("bonus-val").innerText = Math.round((getQuestBonus() * getGlobalMulti() - 1) * 100);
        }

        function saveGame() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            // ALERT BORTTAGEN ENLIGT ÖNSKEMÅL
        }

        function renderEverything() {
            document.getElementById("hammer-cost").innerText = getDiscounted(data.hammerPrice).toLocaleString();
            document.getElementById("auto-cost").innerText = getDiscounted(data.autoPrice).toLocaleString();
            
            let bHtml = "";
            buildings.forEach((b, i) => {
                let cost = getDiscounted(data.bCosts[i]);
                if(data.money >= cost * 0.5 || data.bCounts[i] > 0) {
                    bHtml += `<button class="buy-button" onclick="buyBuilding(${i})">
                        <div class="btn-header">
                            <b>${b.name} (${data.bCounts[i]})</b> 
                            <div class="price-tag">${Math.floor(cost).toLocaleString()} kr</div>
                        </div>
                        <div style="font-size:0.75rem;">Ger: ${Math.floor(b.inc * data.eff[i] * getGlobalMulti() * getQuestBonus()).toLocaleString()}/s</div>
                    </button>`;
                }
            });
            document.getElementById("building-list").innerHTML = bHtml;
            
            document.getElementById("ach-license-area").style.display = data.hasLicense ? "none" : "block";
            
            if(data.hasLicense) {
                let achHtml = "";
                Object.keys(achChains).forEach(type => {
                    const lvl = data.achLevels[type];
                    if(lvl < achChains[type].length) {
                        const a = achChains[type][lvl]; 
                        const v = getValByType(type, lvl); 
                        const ready = v >= a.target;
                        achHtml += `<div class="ach-card">
                            <div style="display:flex; justify-content:space-between;"><b>${a.t}</b> <span style="color:#28a745;">+${a.reward.toLocaleString()} kr</span></div>
                            <div style="font-size:0.7rem; margin:5px 0;">${a.req}</div>
                            <div class="progress-container">
                                <div class="progress-bar" style="width:${Math.min(100, (v/a.target)*100)}%"></div>
                                <div class="progress-text">${Math.floor(v).toLocaleString()} / ${a.target.toLocaleString()}</div>
                            </div>
                            <button class="claim-btn ${ready?'ready':''}" onclick="claimAch('${type}')">${ready?'HÄMTA BELÖNING':'LÅST'}</button>
                        </div>`;
                    }
                });
                document.getElementById("ach-container").innerHTML = achHtml;
            }
            updateNumbersOnly();
        }

        setInterval(() => {
            data.money += getTotalPPS() / 10;
            if(data.autoClicks > 0) {
                data.money += (data.autoClicks * calculateMPC()) / 10;
            }
            updateNumbersOnly();
        }, 100);

        setInterval(saveGame, 30000);

        window.onload = () => {
            const saved = localStorage.getItem(STORAGE_KEY);
            if(saved) { 
                const parsed = JSON.parse(saved);
                data = {...data, ...parsed};
                const currentSkin = specialUpgrades.find(u => u.type === 'skin' && data.ownedUpgrades.includes(u.id));
                if(currentSkin) {
                    document.getElementById("clicker-icon").innerText = currentSkin.icon;
                    document.getElementById("clicker-visual").style.borderColor = currentSkin.color;
                }
            }
            renderEverything();
        };
    </script>
</body>
</html>
