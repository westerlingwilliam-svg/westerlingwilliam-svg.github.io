<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bygg Folkhemmet - Premium Edition</title>
    <style>
        * { user-select: none; -webkit-user-select: none; box-sizing: border-box; font-family: 'Segoe UI', 'Arial Black', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #005293 0%, #003d6e 100%); 
            color: #333; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }

        .header { 
            background: #fecc00; 
            padding: 15px; 
            text-align: center; 
            border-bottom: 6px solid #e5b800; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 10;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 10px;
            background: rgba(0,0,0,0.1);
            padding: 10px;
            border-radius: 50px;
        }

        .main-layout { 
            display: grid; 
            grid-template-columns: 350px 1fr 350px; 
            gap: 25px; 
            padding: 20px; 
            flex-grow: 1;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        .panel { 
            background: #f8f9fa; 
            padding: 20px; 
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-top: 8px solid #fecc00;
            overflow-y: auto;
            max-height: 80vh;
        }

        .center-area { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 20px; /* Flyttar upp klickaren */
        }

        .main-clicker { 
            background: radial-gradient(circle, #fff 0%, #f0f0f0 100%); 
            border: 12px solid #fecc00; 
            width: 260px; 
            height: 260px; 
            border-radius: 50%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            box-shadow: 0 15px 0 #b38f00, 0 20px 40px rgba(0,0,0,0.4); 
            transition: 0.1s; 
            margin-bottom: 30px;
        }
        .main-clicker:active { transform: translateY(8px); box-shadow: 0 7px 0 #b38f00; }
        .main-clicker span { font-size: 6rem; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); }

        .buy-button { 
            background: white; 
            border: 2px solid #ddd; 
            padding: 15px; 
            margin: 10px 0; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 100%; 
            border-radius: 10px; 
            transition: 0.2s;
        }
        .buy-button:hover:not(.disabled) { border-color: #fecc00; background: #fffdf0; transform: scale(1.02); }
        .buy-button.disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .buy-button b { color: #005293; font-size: 1.1rem; }

        .ach-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .progress-container { background: #eee; height: 12px; width: 100%; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #005293, #fecc00); height: 100%; width: 0%; transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .claim-btn { width: 100%; padding: 12px; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: not-allowed; background: #bbb; }
        .claim-btn.ready { background: #28a745; cursor: pointer; animation: pulse 1.5s infinite; }
        .claimed { background: #005293 !important; cursor: default; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(40, 167, 69, 0); } 100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); } }

        .plus-one { position: absolute; color: #fecc00; font-weight: bold; font-size: 2rem; pointer-events: none; animation: fly 0.8s forwards; text-shadow: 3px 3px 0px #005293; z-index: 1000; }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-120px) scale(1.5); } }

        .nav-btn { background: #333; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; border: 2px solid #fecc00; font-weight: bold; transition: 0.3s; }
        .nav-btn:hover { background: #fecc00; color: #333; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; letter-spacing: 2px;">BYGG FOLKHEMMET 🇸🇪</h1>
        <div class="stats-bar">
            <div>💰 <b><span id="money">0</span></b> kr</div>
            <div>⚡ <b><span id="pps">0</span></b>/sek</div>
            <div>👆 <b><span id="mpc">1</span></b>/klick</div>
        </div>
    </div>

    <div class="main-layout">
        <div class="panel">
            <h2 style="text-align:center; border-bottom: 2px solid #eee; padding-bottom: 10px;">BUTIKEN</h2>
            <button class="buy-button" id="hammer-btn" onclick="buyHammer()">
                <div><b>Jimmies Hammare</b><br><small>Fler kr per klick</small></div>
                <span id="hammer-cost">15</span>
            </button>
            <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
            
            <div id="building-list">
                </div>
        </div>

        <div class="center-area">
            <div class="main-clicker" onclick="doClick(event)">
                <span>🏠</span>
                <b style="color:#005293; font-size: 1.2rem;">KLICKA!</b>
            </div>
            <a href="games.html" class="nav-btn">TILLBAKA MENYN</a>
        </div>

        <div class="panel">
            <h2 style="text-align:center; border-bottom: 2px solid #eee; padding-bottom: 10px;">UPPDRAG</h2>
            <div id="ach-license-area">
                <p style="text-align:center; font-size: 0.9rem;">Lås upp Jimmie för att få tillgång till speciella uppdrag och bonusar.</p>
                <button class="buy-button" onclick="buyLicense()" style="background:#fecc00; justify-content:center; font-weight:bold;">LÅS UPP JIMMIE (1 000 kr)</button>
            </div>
            <div id="ach-container"></div>
        </div>
    </div>

    <div style="text-align:center; padding: 20px;">
        <button onclick="hardReset()" style="color:white; background:none; border:none; text-decoration:underline; cursor:pointer; opacity:0.3;">Nollställ Allt</button>
    </div>

    <script>
        let data = {
            money: 0, clicks: 0, mpc: 1, hammerPrice: 15,
            hasLicense: false, claimedAchs: [],
            bCounts: [0, 0, 0, 0, 0, 0, 0],
            bCosts: [15, 100, 500, 2000, 10000, 50000, 250000]
        };

        const buildings = [
            { name: "Röd Stuga", inc: 1, icon: "🏡" },
            { name: "Hyreshus", inc: 5, icon: "🏢" },
            { name: "Sjukhus", inc: 20, icon: "🏥" },
            { name: "Industri", inc: 100, icon: "🏭" },
            { name: "Universitet", inc: 450, icon: "🎓" },
            { name: "Kärnkraftverk", inc: 2000, icon: "☢️" },
            { name: "Välfärdsstaten", inc: 10000, icon: "👑" }
        ];

        const achs = [
            { id: 0, t: "Jimmies Debut", d: "Klicka 50 gånger", target: 50, reward: 500, check: () => data.clicks },
            { id: 1, t: "Stugägare", d: "Bygg 10 Röda Stugor", target: 10, reward: 1200, check: () => data.bCounts[0] },
            { id: 2, t: "Stadsplanerare", d: "Bygg 5 Hyreshus", target: 5, reward: 3000, check: () => data.bCounts[1] },
            { id: 3, t: "Miljonär", d: "Ha 10 000 kr på kontot", target: 10000, reward: 5000, check: () => data.money },
            { id: 4, t: "Utbildningssatsning", d: "Bygg 3 Universitet", target: 3, reward: 25000, check: () => data.bCounts[4] },
            { id: 5, t: "Energi-Jimmie", d: "Bygg ett Kärnkraftverk", target: 1, reward: 100000, check: () => data.bCounts[5] }
        ];

        function doClick(e) {
            data.money += data.mpc; data.clicks++;
            const t = document.createElement("div"); t.className = "plus-one"; t.innerText = "+" + data.mpc;
            t.style.left = (e.pageX - 20) + "px"; t.style.top = (e.pageY - 40) + "px";
            document.body.appendChild(t); setTimeout(() => t.remove(), 800);
            updateNumbersOnly();
        }

        function buyHammer() {
            if (data.money >= data.hammerPrice) {
                data.money -= data.hammerPrice; data.mpc += 1;
                data.hammerPrice = Math.round(data.hammerPrice * 2.3);
                renderEverything();
            }
        }

        function buyBuilding(id) {
            if (data.money >= data.bCosts[id]) {
                data.money -= data.bCosts[id]; data.bCounts[id]++;
                data.bCosts[id] = Math.round(data.bCosts[id] * 1.2);
                renderEverything();
            }
        }

        function buyLicense() {
            if (data.money >= 1000) { data.money -= 1000; data.hasLicense = true; renderEverything(); }
        }

        function claimReward(id) {
            const a = achs.find(x => x.id === id);
            if (a.check() >= a.target && !data.claimedAchs.includes(id)) {
                data.money += a.reward; data.claimedAchs.push(id);
                renderEverything();
            }
        }

        function updateNumbersOnly() {
            document.getElementById("money").innerText = Math.floor(data.money).toLocaleString();
            document.getElementById("mpc").innerText = data.mpc;
            document.getElementById("hammer-btn").classList.toggle("disabled", data.money < data.hammerPrice);
            
            for(let i=0; i<buildings.length; i++) {
                const btn = document.getElementById("build-"+i);
                if(btn) btn.classList.toggle("disabled", data.money < data.bCosts[i]);
            }

            if(data.hasLicense) {
                achs.forEach(a => {
                    const val = a.check();
                    const bar = document.getElementById("bar-" + a.id);
                    if(bar) bar.style.width = Math.min(100, (val / a.target) * 100) + "%";
                    const btn = document.getElementById("btn-ach-" + a.id);
                    if(val >= a.target && btn && !btn.classList.contains('ready') && !data.claimedAchs.includes(a.id)) {
                        renderEverything();
                    }
                });
            }
            localStorage.setItem('folkhem_save_v3', JSON.stringify(data));
        }

        function renderEverything() {
            document.getElementById("hammer-cost").innerText = data.hammerPrice.toLocaleString() + " kr";
            
            // Rendera Byggnader
            let bHtml = "";
            let pps = 0;
            buildings.forEach((b, i) => {
                pps += data.bCounts[i] * b.inc;
                bHtml += `
                    <button class="buy-button" id="build-${i}" onclick="buyBuilding(${i})">
                        <div><b>${b.icon} ${b.name} (${data.bCounts[i]})</b><br><small>+${b.inc}/sek</small></div>
                        <span>${data.bCosts[i].toLocaleString()} kr</span>
                    </button>`;
            });
            document.getElementById("building-list").innerHTML = bHtml;
            document.getElementById("pps").innerText = pps.toLocaleString();

            // Rendera Achievements
            document.getElementById("ach-license-area").style.display = data.hasLicense ? "none" : "block";
            if (data.hasLicense) {
                let html = "";
                achs.forEach(a => {
                    const val = a.check();
                    const isDone = val >= a.target;
                    const isClaimed = data.claimedAchs.includes(a.id);
                    html += `
                        <div class="ach-card">
                            <b>${a.t}</b><br><small>${a.d}</small>
                            <div class="progress-container"><div id="bar-${a.id}" class="progress-bar" style="width: ${Math.min(100, (val/a.target)*100)}%"></div></div>
                            <button id="btn-ach-${a.id}" class="claim-btn ${isDone && !isClaimed ? 'ready' : ''} ${isClaimed ? 'claimed' : ''}" onclick="claimReward(${a.id})">
                                ${isClaimed ? 'KLART ✓' : (isDone ? 'HÄMTA ' + a.reward + ' kr' : 'LÅST')}
                            </button>
                        </div>`;
                });
                document.getElementById("ach-container").innerHTML = html;
            }
            updateNumbersOnly();
        }

        function hardReset() { if(confirm("Vill du verkligen börja om från noll?")) { localStorage.clear(); location.reload(); } }

        setInterval(() => {
            let pps = 0;
            buildings.forEach((b, i) => pps += data.bCounts[i] * b.inc);
            data.money += pps / 10;
            updateNumbersOnly();
        }, 100);

        window.onload = () => {
            let s = localStorage.getItem('folkhem_save_v3');
            if (s) Object.assign(data, JSON.parse(s));
            renderEverything();
        };
    </script>
</body>
</html>
