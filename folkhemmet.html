<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bygg Folkhemmet - Fixad Version</title>
    <style>
        body {
            font-family: 'Arial Black', sans-serif;
            background-color: #005293;
            color: #333;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #fecc00;
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid #005293;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 20px;
            padding: 20px;
            flex-grow: 1;
        }

        .panel {
            background: white;
            padding: 15px;
            border: 5px solid #fecc00;
            min-height: 500px;
        }

        .panel h3 { color: #005293; text-align: center; border-bottom: 3px solid #005293; }

        .center-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .main-clicker {
            background: #fff;
            border: 10px solid #fecc00;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 10px 0 #b38f00;
        }

        .main-clicker:active { transform: translateY(10px); box-shadow: 0 0px 0 #b38f00; }

        .upgrade-btn {
            background: #f0f0f0;
            border: 2px solid #005293;
            padding: 10px;
            margin: 8px 0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }
        .upgrade-btn.disabled { 
            background: #ccc !important;
            color: #777 !important;
            cursor: not-allowed;
            border-color: #999;
        }

        .ach-card {
            padding: 10px;
            margin: 5px 0;
            border: 2px solid #ddd;
            background: #eee;
            font-size: 0.8rem;
        }
        .ach-card.unlocked { background: #fecc00; border-color: #005293; }

        .bottom-controls { text-align: center; padding: 20px; margin-top: auto; }

        .btn-reset { 
            background: rgba(255, 68, 68, 0.4); 
            color: white; 
            border: none; 
            padding: 5px 10px; 
            cursor: pointer; 
            font-size: 0.7rem;
            margin-top: 50px;
            border-radius: 3px;
        }

        .plus-one {
            position: absolute;
            color: #fecc00;
            font-weight: bold;
            font-size: 1.5rem;
            pointer-events: none;
            animation: fly 1s forwards;
            z-index: 999;
        }
        @keyframes fly { 0% { opacity: 1; } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>BYGG FOLKHEMMET 🇸🇪</h1>
        <div style="font-size: 2.5rem; color: #005293;"><span id="money">0</span> kr</div>
        <div>Inkomst: <span id="pps">0</span> kr/sek | Per klick: <span id="mpc">1</span> kr</div>
    </div>

    <div class="main-layout">
        <div class="panel">
            <h3>BUTIK</h3>
            <div id="click-upgrades">
                <div class="upgrade-btn" id="click-btn" onclick="buyClickUpgrade()">
                    <div><b>Bättre Hammare</b><br><small>+1 kr per klick</small></div>
                    <div id="click-cost">20 kr</div>
                </div>
            </div>
            <hr>
            <div id="building-list"></div>
        </div>

        <div class="center-area">
            <div class="main-clicker" onclick="clickMoney(event)">
                <span style="font-size: 6rem;">🏠</span>
                <b style="color:#005293">BYGG!</b>
            </div>
            <div style="margin-top: 30px;">
                <a href="games.html" style="color: white; text-decoration: none; background: #333; padding: 10px 20px; border: 2px solid #fecc00;">TILLBAKA</a>
            </div>
        </div>

        <div class="panel">
            <h3>PRESTATIONER</h3>
            <div id="ach-license">
                <button class="upgrade-btn" id="license-btn" onclick="unlockAchievements()" style="width:100%; background: #fecc00;">
                    LÅS UPP LICENS (1000 kr)
                </button>
                <p style="font-size: 0.7rem; text-align: center;">Köp licensen för att börja klara utmaningar!</p>
            </div>
            <div id="ach-list"></div>
        </div>
    </div>

    <div class="bottom-controls">
        <button class="btn-reset" onclick="resetGame()">Nollställ all progress (Reset)</button>
    </div>

    <script>
        let state = {
            money: 0,
            totalClicks: 0,
            mpc: 1,
            clickCost: 20, // Billigare startpris!
            pps: 0,
            hasLicense: false,
            unlockedAch: [],
            buildings: [
                { name: "Röd Stuga", cost: 15, income: 1, count: 0 },
                { name: "Hyreshus", cost: 100, income: 5, count: 0 },
                { name: "Sjukhus", cost: 500, income: 20, count: 0 },
                { name: "Svensk Industri", cost: 2000, income: 100, count: 0 }
            ]
        };

        const achievements = [
            { id: 0, title: "Flitig Arbetare", desc: "Klicka 100 gånger", check: () => state.totalClicks >= 100 },
            { id: 1, title: "Småföretagare", desc: "Äg 10 Röda Stugor", check: () => state.buildings[0].count >= 10 },
            { id: 2, title: "Rikeman", desc: "Ha 5000 kr på kontot", check: () => state.money >= 5000 },
            { id: 3, title: "Industrimagnat", desc: "Äg 5 Svenska Industrier", check: () => state.buildings[3].count >= 5 }
        ];

        function clickMoney(e) {
            state.money += state.mpc;
            state.totalClicks++;
            spawnText(e);
            updateUI();
        }

        function spawnText(e) {
            const t = document.createElement("div");
            t.className = "plus-one";
            t.innerText = "+" + state.mpc;
            t.style.left = e.pageX + "px"; t.style.top = e.pageY + "px";
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 1000);
        }

        function buyClickUpgrade() {
            if (state.money >= state.clickCost) {
                state.money -= state.clickCost;
                state.mpc += 1;
                state.clickCost = Math.round(state.clickCost * 2.2);
                updateUI();
            }
        }

        function buyBuilding(i) {
            let b = state.buildings[i];
            if (state.money >= b.cost) {
                state.money -= b.cost;
                b.count++;
                b.cost = Math.round(b.cost * 1.15);
                calculatePPS();
                updateUI();
            }
        }

        function unlockAchievements() {
            if (state.money >= 1000) {
                state.money -= 1000;
                state.hasLicense = true;
                updateUI();
            }
        }

        function calculatePPS() {
            state.pps = state.buildings.reduce((sum, b) => sum + (b.count * b.income), 0);
        }

        function updateUI() {
            document.getElementById("money").innerText = Math.floor(state.money);
            document.getElementById("pps").innerText = state.pps.toFixed(0);
            document.getElementById("mpc").innerText = state.mpc;
            document.getElementById("click-cost").innerText = state.clickCost + " kr";

            // Fixad hammare knapp
            const cBtn = document.getElementById("click-btn");
            if(state.money < state.clickCost) cBtn.classList.add("disabled");
            else cBtn.classList.remove("disabled");

            // Fixad bygglista
            let bList = document.getElementById("building-list");
            bList.innerHTML = "";
            state.buildings.forEach((b, i) => {
                let canAfford = state.money >= b.cost;
                bList.innerHTML += `
                    <div class="upgrade-btn ${canAfford ? '' : 'disabled'}" onclick="buyBuilding(${i})">
                        <div><b>${b.name}</b> (${b.count})<br><small>+${b.income} kr/s</small></div>
                        <div>${b.cost} kr</div>
                    </div>`;
            });

            document.getElementById("ach-license").style.display = state.hasLicense ? "none" : "block";
            const lBtn = document.getElementById("license-btn");
            if(state.money < 1000) lBtn.classList.add("disabled");
            else lBtn.classList.remove("disabled");

            if (state.hasLicense) {
                achievements.forEach(a => {
                    if (!state.unlockedAch.includes(a.id) && a.check()) {
                        state.unlockedAch.push(a.id);
                    }
                });
            }

            let aList = document.getElementById("ach-list");
            aList.innerHTML = "";
            achievements.forEach(a => {
                let isDone = state.unlockedAch.includes(a.id);
                aList.innerHTML += `
                    <div class="ach-card ${isDone ? 'unlocked' : ''}">
                        <b>${isDone ? '🏆 ' + a.title : '🔒 ???'}</b><br>
                        <small>${a.desc}</small>
                    </div>`;
            });

            localStorage.setItem('folkhem_save_final', JSON.stringify(state));
        }

        function loadGame() {
            let saved = localStorage.getItem('folkhem_save_final');
            if (saved) {
                state = JSON.parse(saved);
                // Säkerställ att startpriset korrigeras om man startar om
                if(state.totalClicks === 0 && state.money === 0 && state.mpc === 1) {
                    state.clickCost = 20;
                }
                calculatePPS();
            }
            updateUI();
        }

        function resetGame() {
            if(confirm("RENSA ALLT?")) {
                localStorage.removeItem('folkhem_save_final');
                location.reload();
            }
        }

        setInterval(() => {
            state.money += state.pps / 10;
            updateUI();
        }, 100);

        loadGame();
    </script>
</body>
</html>
