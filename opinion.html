<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riksdags Opinion Tycoon - ELITE EDITION</title>
    <style>
        :root {
            --sd-blue: #005293;
            --sd-yellow: #fecc00;
            --dark-blue: #001a33;
        }

        body {
            font-family: 'Segoe UI', Impact, sans-serif;
            background: var(--dark-blue);
            color: white;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Bakgrundsanimation */
        .bg-glow {
            position: fixed;
            top: 50%; left: 50%;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(0,82,147,0.3) 0%, rgba(0,0,0,0) 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }

        .stats-header {
            background: linear-gradient(180deg, var(--sd-blue), #003d6e);
            width: 100%;
            padding: 25px 0;
            display: flex;
            justify-content: center;
            gap: 50px;
            border-bottom: 5px solid var(--sd-yellow);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .stat-item { text-align: center; }
        .stat-label { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; }
        .stat-num { font-size: 2.2rem; font-weight: 900; color: var(--sd-yellow); text-shadow: 0 0 15px rgba(254, 204, 0, 0.5); }

        /* Opinion Bar */
        .progress-wrapper {
            width: 90%;
            max-width: 1000px;
            margin: 40px 0;
            position: relative;
        }

        .bar-container {
            height: 45px;
            background: rgba(255,255,255,0.1);
            border-radius: 25px;
            border: 4px solid #fff;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #opinion-bar {
            height: 100%;
            width: 20%;
            background: linear-gradient(90deg, #ffcc00, #fff700, #ffcc00);
            background-size: 200% 100%;
            animation: shine 2s linear infinite;
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes shine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .milestone-marker {
            position: absolute;
            top: -10px;
            height: 65px;
            width: 4px;
            background: red;
            z-index: 5;
        }

        /* Spelyta */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1200px;
            padding-bottom: 100px;
        }

        .upgrade-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .upgrade-card:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-5px);
            border-color: var(--sd-yellow);
        }

        .upgrade-card h3 { color: var(--sd-yellow); margin-top: 0; font-size: 1.4rem; }
        .price-tag { font-weight: bold; font-size: 1.1rem; margin: 10px 0; }

        .buy-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--sd-yellow);
            color: var(--dark-blue);
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 5px 0 #b38f00;
        }

        .buy-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b38f00; }
        .buy-btn:disabled { background: #555; box-shadow: none; cursor: not-allowed; color: #888; }

        /* Popups */
        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: #fff; color: #222;
            padding: 40px; border-radius: 30px;
            z-index: 1000; display: none;
            text-align: center; width: 400px;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
            border: 10px solid var(--sd-blue);
        }

        .modal.active { display: block; animation: popIn 0.3s forwards; }

        @keyframes popIn { to { transform: translate(-50%, -50%) scale(1); } }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 999; display: none;
        }

        .particle {
            position: absolute; pointer-events: none;
            animation: fly 1s forwards; color: var(--sd-yellow);
            font-weight: bold; z-index: 200;
        }

        @keyframes fly {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body onclick="spawnText(event)">

    <div class="bg-glow"></div>

    <div class="stats-header">
        <div class="stat-item">
            <div class="stat-label">Budget</div>
            <div class="stat-num" id="money">10 000 kr</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Opinion</div>
            <div class="stat-num" id="opinion-val">20.00%</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Väljare/sek</div>
            <div class="stat-num" id="growth-val">0.05%</div>
        </div>
    </div>

    <div class="progress-wrapper">
        <div class="bar-container">
            <div id="opinion-bar"></div>
        </div>
        <div class="milestone-marker" style="left: 4%;"></div> 
        <div style="position:absolute; left: 4%; top: 55px; font-size: 0.7rem;">4% SPÄRREN</div>
        
        <div class="milestone-marker" style="left: 50.1%; border-color: gold;"></div>
        <div style="position:absolute; left: 48%; top: 55px; font-size: 0.7rem; color: gold;">MAJORITET (50.1%)</div>
    </div>

    <div class="dashboard" id="shop">
        </div>

    <div class="overlay" id="overlay"></div>
    <div class="modal" id="event-modal">
        <h2 id="ev-title">DEBATT I SVT!</h2>
        <p id="ev-desc">Motståndaren säger att du har fel om allt. Vad gör du?</p>
        <div id="ev-choices"></div>
    </div>

    <center style="padding: 40px;">
        <a href="games.html" style="color: white; text-transform: uppercase; letter-spacing: 2px;">Tillbaka till huvudmenyn</a>
    </center>

    <script>
        // --- SPEL-DATA ---
        let state = {
            money: 25000, // VI BÖRJAR MED MER!
            opinion: 20.0,
            moneyRate: 50,
            opinionRate: 0.05,
            level: 1
        };

        const upgrades = [
            { id: 0, name: "Snyggare Kostym", desc: "Jimmie ser fräschare ut i TV.", cost: 1000, oRate: 0.02, mRate: 5 },
            { id: 1, name: "Meme-fabrik", desc: "Anställ ungdomar för att göra dank memes.", cost: 5000, oRate: 0.15, mRate: 0 },
            { id: 2, name: "Eget Flygblad", desc: "Dela ut papper till hela orten.", cost: 15000, oRate: 0.50, mRate: 100 },
            { id: 3, name: "YouTube-Imperium", desc: "Riks 2.0 - dygnet runt sändningar.", cost: 50000, oRate: 2.50, mRate: 500 },
            { id: 4, name: "Korv-turné", desc: "Gratis falukorv till alla väljare!", cost: 150000, oRate: 8.00, mRate: -200 },
            { id: 5, name: "Kärnkraftverk", desc: "Bygg ett personligt verk i trädgården.", cost: 500000, oRate: 25.00, mRate: 2000 }
        ];

        const events = [
            { 
                t: "INTERVJU I AFTONBLADET", 
                d: "De ställer en vinklad fråga om klimatet.", 
                choices: [
                    { t: "Svara logiskt", o: 2, m: 5000 },
                    { t: "Gå därifrån", o: -1, m: 0 }
                ]
            },
            { 
                t: "TRENDAR PÅ TIKTOK", 
                d: "En video på Jimmie som dansar går viralt!", 
                choices: [
                    { t: "Följ upp med en till!", o: 5, m: 0 },
                    { t: "Radera videon", o: -2, m: 0 }
                ]
            }
        ];

        // --- LOGIK ---

        function initShop() {
            const shop = document.getElementById('shop');
            upgrades.forEach(u => {
                shop.innerHTML += `
                    <div class="upgrade-card" id="card-${u.id}">
                        <h3>${u.name}</h3>
                        <p>${u.desc}</p>
                        <div class="price-tag">Pris: <span id="cost-${u.id}">${u.cost.toLocaleString()}</span> kr</div>
                        <button class="buy-btn" id="btn-${u.id}" onclick="buyUpgrade(${u.id})">Investera</button>
                    </div>
                `;
            });
        }

        function buyUpgrade(id) {
            const u = upgrades[id];
            if (state.money >= u.cost) {
                state.money -= u.cost;
                state.opinionRate += u.oRate;
                state.moneyRate += u.mRate;
                u.cost = Math.floor(u.cost * 1.6);
                
                // Cool effekt
                document.getElementById(`card-${id}`).style.borderColor = "#fff";
                setTimeout(() => document.getElementById(`card-${id}`).style.borderColor = "rgba(255,255,255,0.1)", 200);
                
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('money').innerText = Math.floor(state.money).toLocaleString() + " kr";
            document.getElementById('opinion-val').innerText = state.opinion.toFixed(2) + "%";
            document.getElementById('growth-val').innerText = "+" + state.opinionRate.toFixed(2) + "%";
            document.getElementById('opinion-bar').style.width = Math.min(state.opinion, 100) + "%";

            upgrades.forEach(u => {
                const btn = document.getElementById(`btn-${u.id}`);
                const costSpan = document.getElementById(`cost-${u.id}`);
                costSpan.innerText = u.cost.toLocaleString();
                btn.disabled = state.money < u.cost;
            });

            if(state.opinion >= 50.1) {
                document.body.style.background = "linear-gradient(to bottom, #005293, #fecc00)";
            }
        }

        function spawnText(e) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = "+1 röst";
            p.style.left = e.pageX + "px";
            p.style.top = e.pageY + "px";
            document.body.appendChild(p);
            state.opinion += 0.001;
            setTimeout(() => p.remove(), 1000);
        }

        function triggerEvent() {
            const ev = events[Math.floor(Math.random() * events.length)];
            document.getElementById('ev-title').innerText = ev.t;
            document.getElementById('ev-desc').innerText = ev.d;
            const choiceBox = document.getElementById('ev-choices');
            choiceBox.innerHTML = "";
            
            ev.choices.forEach(c => {
                const b = document.createElement('button');
                b.className = "buy-btn";
                b.style.margin = "10px 0";
                b.innerText = c.t;
                b.onclick = () => {
                    state.opinion += c.o;
                    state.money += c.m;
                    closeModal();
                };
                choiceBox.appendChild(b);
            });

            document.getElementById('overlay').style.display = 'block';
            document.getElementById('event-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('event-modal').classList.remove('active');
            updateUI();
        }

        // Loopar
        setInterval(() => {
            state.money += state.moneyRate / 10;
            if(state.opinion < 100) state.opinion += state.opinionRate / 10;
            updateUI();
        }, 100);

        setInterval(triggerEvent, 40000); // Händelse var 40:e sek

        initShop();
        updateUI();
    </script>
</body>
</html>
