<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky City</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f5c842;--gold-glow:rgba(245,200,66,0.4);--gold-dark:#8a6d10;
  --bg:#060810;--bg2:#0c1022;--bg3:#111528;--bg4:#181d32;
  --border:#ffffff12;--border2:#ffffff22;--border3:#ffffff35;
  --text:#e8eaf6;--muted:#6b7099;--muted2:#9196bb;
  --hdr: 210px;
  --slot: clamp(100px, 10.5vw, 155px);
  --sbar: clamp(260px, 22vw, 380px);
  --fxs:  clamp(0.6rem,  0.85vw, 0.82rem);
  --fsm:  clamp(0.65rem, 1.0vw,  0.9rem);
  --fmd:  clamp(0.75rem, 1.1vw,  1rem);
  --fxl:  clamp(1.5rem,  2.5vw,  2.6rem);
  --gap:  clamp(6px, 0.8vw, 14px);
  --pad:  clamp(8px, 1.2vw, 20px);
  --r:    clamp(8px, 1vw, 16px);
  --blk:  clamp(68px, 6.5vw, 92px);
}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column}

/* ── HEADER ── */
#header{
  display:grid;
  grid-template-columns:clamp(220px,24vw,340px) 1fr clamp(140px,14vw,200px);
  align-items:center;
  padding:12px var(--pad);
  height:var(--hdr);
  min-height:var(--hdr);
  max-height:var(--hdr);
  background:linear-gradient(180deg, #0f1428 0%, #0c1022 100%);
  border-bottom:2px solid var(--border2);
  position:relative;z-index:10;
  box-shadow:0 4px 40px rgba(0,0,0,0.8);
  gap:var(--gap);
}
#header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#f5c842cc,var(--gold),#f5c842cc,transparent);filter:blur(0.5px)}
.header-left{display:flex;flex-direction:column;justify-content:center;gap:0;padding-left:4px}
.stat-label{font-size:var(--fxs);text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:2px}
.stat-money{font-size:var(--fxl);font-weight:800;background:linear-gradient(135deg,#ffd84d,#f5a623);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;line-height:1.1}
.stat-money .unit{font-size:var(--fsm);color:var(--muted2);font-weight:400}
.stat-pps{font-size:var(--fsm);color:var(--muted2);margin-top:4px}
.stat-pps span{color:#5affa0;font-weight:700;text-shadow:0 0 8px #4ade8066}
#upg-luck-btn{margin-top:7px;display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#1a2a1a,#0d1f0d);border:2px solid #4ade8055;color:#4ade80;padding:10px 22px;border-radius:30px;cursor:pointer;font-size:var(--fsm);font-weight:800;transition:background 0.2s,border-color 0.2s;text-transform:uppercase;white-space:nowrap}
#upg-luck-btn:hover{border-color:#4ade80;background:linear-gradient(135deg,#223a22,#122612)}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;justify-content:center;height:100%}
.menu-link-btn{background:rgba(255,255,255,0.06);border:1px solid #ffffff28;color:var(--text);text-decoration:none;padding:8px 16px;border-radius:var(--r);font-weight:800;font-size:var(--fxs);text-transform:uppercase;letter-spacing:1px;transition:background 0.2s,color 0.2s;white-space:nowrap;box-shadow:inset 0 1px 0 rgba(255,255,255,0.08)}
.menu-link-btn:hover{background:var(--text);color:#000}
.reset-btn{background:transparent;color:#ff4444;border:1px solid #ff444444;padding:4px 10px;border-radius:8px;cursor:pointer;font-weight:bold;font-size:var(--fxs);transition:background 0.2s,opacity 0.2s;opacity:0.6}
.reset-btn:hover{opacity:1;background:#ff444411}

/* ── LUCKY BLOCKS ── */
.blocks-row{display:flex;gap:var(--gap);justify-content:center;align-items:center;flex-wrap:nowrap;height:100%}
.block-wrapper{display:flex;flex-direction:column;align-items:center;gap:4px;width:calc(var(--blk) + 12px)}
.lucky-block{width:var(--blk);height:var(--blk);border-radius:clamp(12px,1.8vw,20px);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;position:relative;transition:transform 0.12s,box-shadow 0.12s;border:2px solid rgba(255,255,255,0.15);flex-shrink:0}
.lucky-block:hover{transform:translateY(-2px)}
.lucky-block:active{transform:scale(0.93) translateY(4px)}
.bt1{background:linear-gradient(145deg,#3a3a3e,#1f1f23);box-shadow:0 5px 0 #0e0e10}
.bt2{background:linear-gradient(145deg,#2a5a2e,#0d3b10);box-shadow:0 5px 0 #081a0a}
.bt3{background:linear-gradient(145deg,#1d2e4a,#0d1a2d);box-shadow:0 5px 0 #090f18}
.bt4{background:linear-gradient(145deg,#2e1d4a,#180d2d);box-shadow:0 5px 0 #0e0818}
.bt5{background:linear-gradient(145deg,#4a321d,#2d1a0d);box-shadow:0 5px 0 #140a02}
.bt6{background:linear-gradient(145deg,#4a1d1d,#2d0d0d);box-shadow:0 5px 0 #140202;border-color:#f44336aa !important}
.block-icon{font-size:clamp(1.4rem,2.2vw,2.5rem);line-height:1}
.block-stars{display:flex;gap:2px;margin-top:2px}
.bstar{font-size:clamp(7px,0.65vw,10px)}
.bstar.on{color:var(--gold)}.bstar.off{color:#2a2a3a}
.block-meta{text-align:center;width:100%;margin-top:3px}
.block-name{font-size:clamp(0.5rem,0.7vw,0.68rem);font-weight:800;color:var(--muted2);text-transform:uppercase}
.block-price{font-size:clamp(0.55rem,0.72vw,0.7rem);color:var(--gold);font-weight:800;margin:1px 0}
.upg-bl-btn{width:100%;padding:3px 0;border-radius:5px;cursor:pointer;font-size:clamp(0.5rem,0.65vw,0.62rem);font-weight:800;border:1px solid var(--border2);background:rgba(255,255,255,0.06);color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#autobuy-container{margin-left:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.autobuy-btn{background:#131629;border:2px solid var(--border3);color:var(--muted);padding:7px;border-radius:10px;cursor:pointer;font-size:var(--fxs);font-weight:800;text-transform:uppercase;width:55px;text-align:center;transition:border-color 0.2s,color 0.2s}
.autobuy-btn.active{border-color:#4ade80;color:#4ade80;box-shadow:0 0 10px #4ade8033}

/* ── GAME AREA ── */
#game-area{display:flex;flex:1;overflow:hidden}
#city-grid{
  flex:1;
  display:grid;
  grid-template-columns:repeat(6,var(--slot));
  grid-auto-rows:var(--slot);
  gap:var(--gap);
  padding:var(--gap);
  justify-content:center;
  align-content:start;
  background:radial-gradient(ellipse at 50% 0%, #0e1830 0%, #080b18 60%, var(--bg) 100%);
  overflow-y:auto;
}

/* ── CITY SLOTS ── */
.slot{border-radius:var(--r);border:2px solid var(--border);background:linear-gradient(145deg,#141829,#0f1322);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:transform 0.2s,border-color 0.2s;width:var(--slot);height:var(--slot);overflow:hidden}
.slot:hover{border-color:#ffffff30;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.5)}
.slot-icon{font-size:clamp(1.6rem,2.8vw,3.2rem);margin-bottom:2px;animation:flt 3s ease-in-out infinite;position:relative;z-index:1}
.slot-lvl{position:absolute;top:5px;left:5px;background:rgba(0,0,0,0.8);padding:2px 5px;border-radius:5px;font-size:var(--fxs);font-weight:800;color:var(--gold);border:1px solid var(--border2);z-index:2}
.slot-rarity-text{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.7);padding:1px 5px;border-radius:4px;font-size:clamp(0.42rem,0.55vw,0.52rem);font-weight:900;text-transform:uppercase;letter-spacing:0.5px;z-index:2}
.slot-income{font-size:var(--fxs);font-weight:800;color:#5affa0;background:rgba(0,20,10,0.6);padding:2px 6px;border-radius:8px;position:relative;z-index:1;border:1px solid #4ade8030}
.upg-btn{margin-top:4px;width:88%;padding:4px 0;border-radius:7px;background:linear-gradient(135deg,#f7d050,#e8a000);color:#000;font-size:clamp(0.55rem,0.75vw,0.75rem);font-weight:900;border:none;cursor:pointer;transition:background 0.15s,color 0.15s;position:relative;z-index:1;box-shadow:0 2px 6px rgba(0,0,0,0.35)}
.upg-btn:hover{background:#ffe060}
.upg-btn.no-funds{background:var(--gold-dark);color:rgba(0,0,0,0.45)}
.highlight-empty{border-color:#4ade80 !important;box-shadow:0 0 12px rgba(74,222,128,0.3) !important;animation:pulse-green 1.5s infinite}
@keyframes pulse-green{0%{background:var(--bg3)}50%{background:rgba(74,222,128,0.12)}100%{background:var(--bg3)}}

/* Rarity background sheen inside slot */
.slot-sheen{position:absolute;inset:0;opacity:0.06;pointer-events:none;border-radius:inherit}

/* ── SIDEBAR ── */
#sidebar{width:var(--sbar);flex-shrink:0;background:linear-gradient(180deg,#0d1124 0%,#0b0f1e 100%);border-left:2px solid #ffffff1a;display:flex;flex-direction:column}
.sidebar-tabs{display:flex;padding:var(--pad);gap:var(--gap)}
.tab-btn{flex:1;padding:clamp(7px,1.1vh,13px);border-radius:var(--r);border:2px solid var(--border2);background:var(--bg3);color:var(--muted);font-size:var(--fsm);font-weight:800;text-transform:uppercase;cursor:pointer;transition:border-color 0.2s}
.tab-btn.active{background:linear-gradient(135deg,#f7d050,#e8a800);color:#000;border-color:var(--gold);box-shadow:0 0 22px var(--gold-glow),0 2px 8px rgba(0,0,0,0.4)}
.sidebar-content{flex:1;overflow-y:auto;padding:var(--pad)}
#inventory{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);overflow-y:auto;padding-bottom:30px}
#shop-ui{display:flex;flex-direction:column;gap:var(--gap);overflow-y:auto;padding-bottom:40px}
.inv-card{border-radius:var(--r);padding:clamp(8px,1vh,14px) 8px;background:linear-gradient(160deg,#1c2240,#131829);border:2px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;overflow:hidden;transition:transform 0.15s}
.inv-card:hover{transform:translateY(-2px)}
.inv-card-sheen{position:absolute;inset:0;opacity:0.07;pointer-events:none}
.inv-icon{font-size:clamp(1.8rem,2.4vw,2.8rem);position:relative;z-index:1}
.inv-name{font-size:var(--fxs);font-weight:800;text-align:center;position:relative;z-index:1}
.inv-btns{display:flex;flex-direction:column;gap:4px;width:92%;position:relative;z-index:1}
.inv-btns button{width:100%;padding:5px;border-radius:7px;font-size:var(--fxs);font-weight:800;cursor:pointer;border:none;transition:background 0.15s}
.bld-btn{background:linear-gradient(135deg,#4ade80,#22c55e);color:#000;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
.bld-btn:hover{background:#6aee9a}
.sll-btn{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid #f8717155 !important}
.sll-btn:hover{background:rgba(239,68,68,0.3)}
.shop-card{border-radius:var(--r);padding:clamp(10px,1.2vh,14px);background:linear-gradient(135deg,#191f38,#111528);border:2px solid var(--border2);display:flex;align-items:center;gap:10px;flex-shrink:0;transition:border-color 0.2s}
.shop-card:hover{border-color:var(--border3)}
.shop-ico{font-size:clamp(1.5rem,1.9vw,2.2rem)}
.shop-info{flex:1;min-width:0}
.shop-n{font-size:var(--fsm);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.shop-d{font-size:var(--fxs);color:var(--muted2)}
.buy-btn2{padding:7px 10px;border-radius:8px;font-weight:800;font-size:var(--fxs);background:#4ade80;color:#000;border:none;cursor:pointer;white-space:nowrap;min-width:78px;text-align:center;transition:background 0.15s}
.buy-btn2:hover{background:#6aee9a}
.buy-btn2:disabled{background:#1e2e1e;color:#3a5a3a;cursor:not-allowed}

/* ── TOAST ── */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#f7d050,#e8a000);color:#000;padding:12px 28px;border-radius:40px;font-size:var(--fmd);font-weight:800;z-index:1000;opacity:0;pointer-events:none;transition:all 0.3s;white-space:nowrap;box-shadow:0 8px 30px rgba(232,160,0,0.4)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(-12px)}

@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.sidebar-content::-webkit-scrollbar,#inventory::-webkit-scrollbar,#shop-ui::-webkit-scrollbar,#city-grid::-webkit-scrollbar{width:4px}
.sidebar-content::-webkit-scrollbar-thumb,#inventory::-webkit-scrollbar-thumb,#shop-ui::-webkit-scrollbar-thumb,#city-grid::-webkit-scrollbar-thumb{background:var(--border3);border-radius:10px}

/* ══════════════════════════════════════════════
   RARITY VISUAL EFFECTS — upgraded & beautiful
   ══════════════════════════════════════════════ */

/* Mythic — fiery red pulse */
@keyframes mythic-glow{
  0%,100%{box-shadow:0 0 8px #f44336, 0 0 20px #f4433650}
  50%{box-shadow:0 0 18px #f44336, 0 0 40px #f4433680, 0 0 60px #ff7043aa}
}
.rarity-Mythic{border-color:#f44336 !important;animation:mythic-glow 2s infinite ease-in-out}

/* Celestial — cyan shimmer */
@keyframes celestial-glow{
  0%,100%{box-shadow:0 0 10px #00bcd4aa, 0 0 22px #00bcd455}
  50%{box-shadow:0 0 22px #00bcd4, 0 0 44px #00bcd4aa, 0 0 70px #00e5ff44}
}
.rarity-Celestial{border-color:#00bcd4 !important;animation:celestial-glow 2.5s infinite ease-in-out}

/* Godly — pure white holy fade */
@keyframes godly-glow{
  0%,100%{box-shadow:0 0 8px #ffffff99, 0 0 18px #ffffff33, 0 0 30px #ffffff15}
  50%{box-shadow:0 0 20px #ffffffcc, 0 0 45px #ffffff55, 0 0 70px #ffffff22}
}
.rarity-Godly{border-color:#ddddff !important;animation:godly-glow 3s infinite ease-in-out}

/* Divine — warm golden-cream */
@keyframes divine-glow{
  0%,100%{box-shadow:0 0 10px #fff59dcc, 0 0 25px #fff59d66}
  50%{box-shadow:0 0 24px #fff59d, 0 0 55px #fff59daa, 0 0 80px #ffe08244}
}
.rarity-Divine{border-color:#fff59d !important;animation:divine-glow 2.2s infinite ease-in-out}

/* Cosmic — deep ice blue, big corona */
@keyframes cosmic-glow{
  0%,100%{box-shadow:0 0 12px #b3e5fccc, 0 0 28px #b3e5fc66, 0 0 50px #81d4fa33}
  50%{box-shadow:0 0 28px #b3e5fc, 0 0 60px #b3e5fcaa, 0 0 100px #4fc3f766}
}
.rarity-Cosmic{border-color:#b3e5fc !important;animation:cosmic-glow 3s infinite ease-in-out}

/* Ultimate — rainbow shifting legendary */
@keyframes ultimate-glow{
  0%  {box-shadow:0 0 15px #ffeb3b, 0 0 35px #f44336aa; border-color:#ffeb3b !important; filter:hue-rotate(0deg)}
  33% {box-shadow:0 0 20px #ff4081, 0 0 50px #aa00ffaa; border-color:#ff4081 !important; filter:hue-rotate(40deg)}
  66% {box-shadow:0 0 20px #00e5ff, 0 0 50px #00bcd4aa; border-color:#00e5ff !important; filter:hue-rotate(80deg)}
  100%{box-shadow:0 0 15px #ffeb3b, 0 0 35px #f44336aa; border-color:#ffeb3b !important; filter:hue-rotate(0deg)}
}
.rarity-Ultimate{border-width:3px !important;animation:ultimate-glow 3s infinite linear}

/* Exalted — blazing gold sovereign */
@keyframes exalted-glow{
  0%,100%{box-shadow:0 0 14px #fdd835dd, 0 0 32px #fdd83577, 0 0 55px #ff6f0033}
  50%{box-shadow:0 0 30px #fdd835, 0 0 65px #fdd835bb, 0 0 100px #ffca2877, inset 0 0 15px #fdd83522}
}
.rarity-Exalted{border-color:#fdd835 !important;border-width:3px !important;animation:exalted-glow 2s infinite ease-in-out}

/* Particle shimmer overlay for Godly+ */
.rarity-Godly .slot-sheen,.rarity-Divine .slot-sheen,.rarity-Cosmic .slot-sheen,
.rarity-Ultimate .slot-sheen,.rarity-Exalted .slot-sheen{
  background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), transparent 60%);
  animation:sheen-shift 4s ease-in-out infinite;
}
@keyframes sheen-shift{
  0%,100%{background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), transparent 60%)}
  50%{background:radial-gradient(circle at 70% 70%, rgba(255,255,255,0.12), transparent 60%)}
}

/* Inventory card rarity borders */
.inv-card.rarity-Common{border-color:#555566 !important}
.inv-card.rarity-Uncommon{border-color:#4caf5088 !important}
.inv-card.rarity-Rare{border-color:#2196f388 !important}
.inv-card.rarity-Epic{border-color:#9c27b088 !important}
.inv-card.rarity-Legendary{border-color:#ff980088 !important}
.inv-card.rarity-Mythic{border-color:#f4433688 !important}
.inv-card.rarity-Celestial{border-color:#00bcd4 !important}
.inv-card.rarity-Godly{border-color:#fff !important;box-shadow:0 0 15px #ffffff33}
.inv-card.rarity-Divine{border-color:#fff59d !important;box-shadow:0 0 12px #fff59d33}
.inv-card.rarity-Cosmic{border-color:#b3e5fc !important;box-shadow:0 0 15px #b3e5fc33}
.inv-card.rarity-Ultimate{border-color:#ffeb3b !important;box-shadow:0 0 18px #ffeb3b44;border-width:2px !important}
.inv-card.rarity-Exalted{border-color:#fdd835 !important;box-shadow:0 0 20px #fdd83555;border-width:2px !important}

/* ── CODE MODAL ── */
#code-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#code-overlay.open{display:flex}
#code-modal{background:var(--bg2);border:2px solid var(--border3);border-radius:20px;padding:28px 32px;width:320px;display:flex;flex-direction:column;align-items:center;gap:16px;box-shadow:0 20px 60px rgba(0,0,0,0.8)}
#code-display{width:100%;background:var(--bg);border:2px solid var(--border2);border-radius:12px;padding:14px 18px;font-size:1.8rem;font-weight:900;color:var(--gold);letter-spacing:10px;text-align:center;min-height:56px;font-family:monospace}
#code-display.shake{animation:shake 0.3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.code-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%}
.code-numpad button{padding:14px;border-radius:10px;border:2px solid var(--border2);background:var(--bg3);color:var(--text);font-size:1.1rem;font-weight:800;cursor:pointer;transition:all 0.12s}
.code-numpad button:hover{background:var(--bg4);border-color:var(--border3)}
.code-numpad button:active{transform:scale(0.93)}
.code-btn-del{background:rgba(255,100,100,0.1) !important;color:#f87171 !important;border-color:#f8717144 !important}
.code-btn-ok{background:var(--gold) !important;color:#000 !important;border-color:var(--gold) !important;font-size:0.85rem !important}
.code-btn-ok:hover{background:#ffe060 !important}
.code-open-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:4px 10px;border-radius:8px;cursor:pointer;font-size:var(--fxs);font-weight:800;opacity:0.5;transition:border-color 0.2s}
.code-open-btn:hover{opacity:1;border-color:var(--border3);color:var(--text)}
</style>
</head>
<body>

<div id="header">
  <div class="header-left">
    <div class="stat-label">Stadsbudget</div>
    <div class="stat-money">💰 <span id="money">500</span> <span class="unit">KR</span></div>
    <div class="stat-pps">Produktion: <span id="pps">0</span>/s</div>
    <button id="upg-luck-btn" onclick="upgradeBlocks()"><span id="upg-name">Uncommon</span> Luckyblock <span id="upg-cost">2500</span>kr</button>
  </div>
  <div class="blocks-row" id="blocks-row"></div>
  <div class="header-right">
    <a href="games.html" class="menu-link-btn">⬅ TILL MENYN</a>
    <button class="reset-btn" onclick="resetGame()">↺ ÅTERSTÄLL STADEN</button>
    <button class="code-open-btn" onclick="openCodeModal()">🔑 KOD</button>
  </div>
</div>

<div id="game-area">
  <div id="city-grid"></div>
  <div id="sidebar">
    <div class="sidebar-tabs">
      <button class="tab-btn active" id="inv-tab" onclick="switchTab('inv')">Lager</button>
      <button class="tab-btn" id="shop-tab" onclick="switchTab('shop')">Butik</button>
    </div>
    <div class="sidebar-content">
      <div id="inventory"></div>
      <div id="shop-ui" style="display:none"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Knapp-formatering (inga mellanslag)
function fmtBtn(n){
  return String(Math.round(Number(n)));
}

// ── Talformatering ─────────────────────────────────────────────────────────
// Suffix-tabell: inga k, börjar direkt på M
const SUFFIXES = [
  [1e63, 'Vi'], [1e60, 'No'], [1e57, 'Oc'], [1e54, 'Sp'],
  [1e51, 'Sx'], [1e48, 'Qi'], [1e45, 'Qa'], [1e42, 'Tr'],
  [1e39, 'Du'], [1e36, 'Un'], [1e33, 'Dc'], [1e30, 'No'],
  [1e27, 'Oc'], [1e24, 'Sp'], [1e21, 'Sx'], [1e18, 'Qi'],
  [1e15, 'Qa'], [1e12, 'T'],  [1e9,  'B'],  [1e6,  'M'],
];

function fmtS(n){
  if(n===null||n===undefined||isNaN(n)) return '?';
  n = Number(n);
  if(n < 0) return '0';
  for(const [val, sfx] of SUFFIXES){
    if(n >= val){
      const x = n / val;
      return (x >= 100 ? Math.round(x) : x >= 10 ? x.toFixed(1) : x.toFixed(2)) + ' ' + sfx;
    }
  }
  // Under 1 miljon: visa med tusentals-mellanrum men inga suffix
  return Math.round(n).toLocaleString('sv-SE');
}

function bUpgCost(t,l){
  const factor=(t===6)?5:4;
  return Math.floor([5000,25000,100000,400000,1500000,5000000][t-1]*Math.pow(factor,l));
}

function pick(a,f,t){return a[Math.min(f+Math.floor(Math.random()*(t-f)),a.length-1)]}

function getDrop(tier,bl){
  const r=Math.random()*100/luckBoost;
  // Jimmies Mästerverk: extremt sällsynt, bara block 5-6
  if((tier===5||tier===6)&&Math.random()<0.000005*luckBoost) return buildings[31];
  const mb=bl*0.04, eb=bl*0.2; // upgrade-bonus nedskalad

  if(tier===1){
    // Block 1 (Common): Legendary nästan omöjligt, Mythic+ existerar knappt
    if(r<0.000001)  return pick(buildings,36,40); // Exalted: 1 på 100 miljoner
    if(r<0.00001)   return pick(buildings,27,31); // Godly:   1 på 10 miljoner
    if(r<0.0001)    return pick(buildings,24,27); // Celestial:1 på 1 miljon
    if(r<0.002)     return pick(buildings,20,24); // Mythic:   1 på 50 000
    if(r<0.05+mb)   return pick(buildings,16,20); // Legendary: 1 på 2 000
    if(r<3+eb)      return pick(buildings,8,12);  // Rare: ~3%
    if(r<25)        return pick(buildings,4,8);   // Uncommon: ~22%
    return pick(buildings,0,4);                   // Common: ~75%

  }else if(tier===2){
    // Block 2 (Uncommon): fortfarande väldigt svårt
    if(r<0.00001)   return pick(buildings,36,40); // Exalted:  1 på 10 miljoner
    if(r<0.0001)    return pick(buildings,27,31); // Godly:    1 på 1 miljon
    if(r<0.001)     return pick(buildings,24,27); // Celestial:1 på 100 000
    if(r<0.01)      return pick(buildings,20,24); // Mythic:   1 på 10 000
    if(r<0.2+mb)    return pick(buildings,16,20); // Legendary: 1 på 500
    if(r<8+eb)      return pick(buildings,12,16); // Epic: ~8%
    if(r<35)        return pick(buildings,4,8);   // Uncommon: ~27%
    return pick(buildings,0,8);                   // Common+: ~65%

  }else if(tier===3){
    // Block 3 (Rare): Legendary ~1%, Mythic ~0.05%
    if(r<0.0001)    return pick(buildings,36,40); // Exalted:  1 på 1 miljon
    if(r<0.001)     return pick(buildings,27,31); // Godly:    1 på 100 000
    if(r<0.01)      return pick(buildings,24,27); // Celestial:1 på 10 000
    if(r<0.05)      return pick(buildings,20,24); // Mythic:   1 på 2 000
    if(r<1+mb)      return pick(buildings,16,20); // Legendary: ~1%
    if(r<15+eb)     return pick(buildings,8,12);  // Rare: ~14%
    if(r<50)        return pick(buildings,4,8);   // Uncommon: ~35%
    return pick(buildings,0,8);                   // Common: ~50%

  }else if(tier===4){
    // Block 4 (Epic): Legendary ~3%, Mythic ~0.2%
    if(r<0.001)     return pick(buildings,36,40); // Exalted:  1 på 100 000
    if(r<0.01)      return pick(buildings,27,31); // Godly:    1 på 10 000
    if(r<0.1)       return pick(buildings,24,27); // Celestial:1 på 1 000
    if(r<0.2)       return pick(buildings,20,24); // Mythic:   1 på 500
    if(r<3+mb)      return pick(buildings,16,20); // Legendary: ~3%
    if(r<20+eb)     return pick(buildings,12,16); // Epic: ~17%
    if(r<55)        return pick(buildings,8,12);  // Rare: ~35%
    return pick(buildings,4,12);                  // Common-Uncommon: ~45%

  }else if(tier===5){
    // Block 5 (Legendary): Mythic ~1%, Celestial ~0.5%
    if(r<0.01)      return pick(buildings,36,40); // Exalted:  1 på 10 000
    if(r<0.05)      return pick(buildings,34,36); // Divine:   1 på 2 000
    if(r<0.2)       return pick(buildings,32,34); // Ultimate: 1 på 500
    if(r<0.5)       return pick(buildings,27,31); // Godly:    1 på 200
    if(r<2)         return pick(buildings,24,27); // Celestial: ~1.5%
    if(r<5+mb)      return pick(buildings,20,24); // Mythic:   ~3%
    if(r<25+eb)     return pick(buildings,16,20); // Legendary: ~20%
    if(r<65)        return pick(buildings,12,16); // Epic: ~40%
    return pick(buildings,8,16);                  // Rare+: ~35%

  }else{
    // Block 6 (Mythic): det bästa blocket
    if(r<0.05)      return pick(buildings,36,40); // Exalted:  1 på 2 000
    if(r<0.2)       return pick(buildings,34,36); // Divine:   1 på 500
    if(r<0.8)       return pick(buildings,32,34); // Ultimate: 1 på 125
    if(r<3)         return pick(buildings,27,31); // Godly:    ~2.2%
    if(r<10)        return pick(buildings,24,27); // Celestial: ~7%
    if(r<25+mb)     return pick(buildings,20,24); // Mythic:   ~15%
    if(r<55+eb)     return pick(buildings,16,20); // Legendary: ~30%
    return pick(buildings,12,16);                 // Epic: ~45%
  }
}

function buyBlock(tier,silent=false){
  if(cooldowns[tier-1]>0) return;
  const price=blockPrices[tier-1];
  if(money<price){if(!silent)showToast('⚠️ För lite pengar!');return}
  money-=price; startCooldown(tier);
  const won=getDrop(tier,blockLevels[tier-1]);
  inventory.push({...won,level:1,id:Date.now()});
  if(!silent){
    if(won.name==='Jimmies Mästerverk') showToast('🏆 HELIGT! DU HITTADE JIMMIES MÄSTERVERK!!!');
    else showToast(won.icon+' '+won.name+' — '+won.rarity+'!');
  }
  renderInv();updateUI();save();
}

function toggleAutoBuy(){autoBuyActive=!autoBuyActive;renderBlocks();save();}

function upgBlockLevel(tier){
  const l=blockLevels[tier-1],maxL=(tier===6)?5:4;
  if(l>=maxL){showToast('Max odds uppnådda!');return}
  const cost=bUpgCost(tier,l);
  if(money<cost){showToast('Behöver '+fmtS(cost)+' KR');return}
  money-=cost;blockLevels[tier-1]++;
  showToast('✨ Block '+tier+' är nu ⭐'+blockLevels[tier-1]);
  renderBlocks();updateUI();save();
}

function switchTab(tab){
  document.getElementById('inventory').style.display=tab==='inv'?'grid':'none';
  document.getElementById('shop-ui').style.display=tab==='shop'?'flex':'none';
  document.getElementById('inv-tab').classList.toggle('active',tab==='inv');
  document.getElementById('shop-tab').classList.toggle('active',tab==='shop');
  if(tab==='shop') renderShop();
}

function renderShop(){
  const el=document.getElementById('shop-ui');
  el.innerHTML='';
  shopUpgrades.forEach((upg,i)=>{
    const l=Number(shopLevels[i])||0;
    const isMax=l>=upg.maxLevel;
    const rawCost=(!isMax&&l<upg.costs.length)?upg.costs[l]:undefined;
    const cost=(rawCost!==undefined&&!isNaN(rawCost))?Number(rawCost):null;
    const d=document.createElement('div');d.className='shop-card';
    d.innerHTML=`
      <div class="shop-ico">${upg.icon}</div>
      <div class="shop-info">
        <div class="shop-n"><strong>${upg.name}</strong> <span style="color:var(--muted2)">(${l}/${upg.maxLevel})</span></div>
        <div class="shop-d">${upg.desc}</div>
      </div>
      <div>
        <button class="buy-btn2" ${(isMax||cost===null)?'disabled':''} onclick="buyShopUpg(${i})">
          ${isMax?'MAX':(cost!==null?fmtS(cost)+' KR':'?')}
        </button>
      </div>`;
    el.appendChild(d);
  });
}

function buyShopUpg(i){
  const upg=shopUpgrades[i];
  const l=Number(shopLevels[i])||0;
  if(l>=upg.maxLevel){showToast('Max uppgraderad!');return}
  if(l>=upg.costs.length){showToast('Fel: kostnad saknas!');return}
  const cost=Number(upg.costs[l]);
  if(isNaN(cost)){showToast('⚠️ Ogiltig kostnad!');return}
  if(money<cost){showToast('⚠️ Behöver '+fmtS(cost)+' KR!');return}
  money-=cost;shopLevels[i]=l+1;upg.apply();
  showToast('✅ '+upg.name+' uppgraderad till nivå '+shopLevels[i]+'!');
  renderShop();updateUI();save();
}

function upgradeBuilding(i){
  const b=cityData[i];if(!b)return;
  if(b.level>=50){showToast('Maxnivå 50 uppnådd!');return}
  const base=Math.max(b.sellPrice,200);
  const cost=Math.floor(base*1.25*Math.pow(1.85,b.level-1));
  if(money>=cost){
    money-=cost;b.level++;
    let mult=1.05;
    if(b.rarity==='Uncommon') mult=1.15;
    else if(b.rarity==='Rare') mult=1.25;
    else if(b.rarity==='Legendary') mult=1.40;
    else mult=1.55;
    b.income=Math.floor(b.income*mult);
    showToast(b.icon+' '+b.name+' → Level '+b.level+'!');
    renderCity();updateUI();save();
  }else showToast('Behöver '+fmtS(cost)+' KR!');
}

function renderCity(){
  const grid=document.getElementById('city-grid');grid.innerHTML='';
  cityData.forEach((data,i)=>{
    const slot=document.createElement('div');
    const highlight=(selectedInvIndex!==null&&!data)?' highlight-empty':'';
    const rarityClass=data?'rarity-'+data.rarity:'';
    slot.className='slot'+(data?'':' empty')+highlight+' '+rarityClass;
    if(data){
      const c=data.color;
      slot.style.borderColor=c;
      slot.style.background='linear-gradient(135deg,'+c+'15,'+c+'05)';
      const base=Math.max(data.sellPrice,200);
      const uc=Math.floor(base*1.25*Math.pow(1.85,data.level-1));
      slot.innerHTML=`
        <div class="slot-sheen"></div>
        <div class="slot-lvl">LVL ${data.level}</div>
        <div class="slot-rarity-text" style="color:${c}">${data.rarity}</div>
        <div class="slot-icon">${data.icon}</div>
        <div class="slot-income">+${fmtS(Math.floor(data.income*globalMultiplier))}/s</div>
        <button class="upg-btn ${money>=uc?'':'no-funds'}" data-s="${i}">${data.level>=50?'MAX':'UPG ('+fmtS(uc)+')'}</button>`;
    }
    slot.addEventListener('click',e=>{
      if(e.target.dataset.s!==undefined){e.stopPropagation();upgradeBuilding(parseInt(e.target.dataset.s));}
      else handleSlotClick(i);
    });
    grid.appendChild(slot);
  });
}

function renderInv(){
  const el=document.getElementById('inventory');el.innerHTML='';
  inventory.forEach((item,idx)=>{
    const d=document.createElement('div');d.className='inv-card rarity-'+item.rarity;
    d.style.borderColor=item.color;
    if(selectedInvIndex===idx) d.style.background='rgba(74,222,128,0.1)';
    d.innerHTML=`
      <div class="inv-card-sheen"></div>
      <div class="slot-rarity-text" style="color:${item.color}">${item.rarity}</div>
      <div class="inv-icon">${item.icon}</div>
      <div class="inv-name" style="color:${item.color}">${item.name}</div>
      <div class="inv-btns">
        <button class="bld-btn" data-idx="${idx}">${selectedInvIndex===idx?'AVBRYT':'BYGG'}</button>
        <button class="sll-btn" data-idx="${idx}">SÄLJ</button>
      </div>`;
    el.appendChild(d);
  });
  el.querySelectorAll('.bld-btn').forEach(b=>b.addEventListener('click',()=>prepPlace(parseInt(b.dataset.idx))));
  el.querySelectorAll('.sll-btn').forEach(b=>b.addEventListener('click',()=>sellItem(parseInt(b.dataset.idx))));
}

function handleSlotClick(i){
  if(selectedInvIndex!==null) placeBuilding(i);
  else if(cityData[i]) pickUp(i);
}

function pickUp(i){
  inventory.push(cityData[i]);cityData[i]=null;
  showToast('📦 Byggnad i inventory');
  renderCity();renderInv();updateUI();save();
}

function placeBuilding(si){
  if(!cityData[si]){
    cityData[si]=inventory[selectedInvIndex];inventory.splice(selectedInvIndex,1);selectedInvIndex=null;
    renderCity();renderInv();updateUI();save();
  }else showToast('Platsen är redan tagen!');
}

function prepPlace(idx){
  selectedInvIndex=(selectedInvIndex===idx)?null:idx;
  renderInv();renderCity();
  if(selectedInvIndex!==null) showToast('Klicka på en lysande plats i staden!');
}

function sellItem(idx){
  const item=inventory[idx];
  const bonus=isNaN(sellBonus)?1:sellBonus;
  const price=Math.floor(item.sellPrice*bonus);
  if(!isNaN(price)){
    money+=price;inventory.splice(idx,1);selectedInvIndex=null;
    showToast('💰 Sålde '+item.name+' för '+fmtS(price)+' KR');
    renderInv();renderCity();updateUI();save();
  }
}

function startCooldown(tier){
  cooldowns[tier-1]=Math.max(1,5-cdReduction);renderBlocks();
  let t=setInterval(()=>{
    cooldowns[tier-1]--;
    const cdEl=document.getElementById('cd-'+tier);
    if(cdEl) cdEl.innerText=cooldowns[tier-1];
    if(cooldowns[tier-1]<=0){clearInterval(t);renderBlocks();}
  },1000);
}

function upgradeBlocks(){
  if(currentMaxBlock>=6){showToast('Alla block upplåsta!');return}
  const cost=upgCosts[currentMaxBlock];
  if(money>=cost){
    money-=cost;currentMaxBlock++;renderBlocks();updateUI();save();
    showToast('🎉 Nytt block upplåst!');
  }else showToast('⚠️ Behöver '+fmtS(cost)+' KR!');
}

function renderBlocks(){
  const row=document.getElementById('blocks-row');row.innerHTML='';
  for(let i=1;i<=currentMaxBlock;i++){
    const isCd=cooldowns[i-1]>0,bl=blockLevels[i-1];
    const maxStars=(i===6)?5:4;
    const nc=bl<maxStars?bUpgCost(i,bl):null;
    const stars=Array.from({length:maxStars},(_,s)=>'<span class="bstar '+(s<bl?'on':'off')+'">★</span>').join('');
    const w=document.createElement('div');w.className='block-wrapper';
    w.innerHTML='<div id="block-'+i+'" class="lucky-block bt'+i+'" onclick="buyBlock('+i+')">'
      +(isCd?'<div style="font-size:clamp(1.2rem,2vw,1.8rem);font-weight:900;color:var(--gold)"><span id="cd-'+i+'">'+cooldowns[i-1]+'</span></div>'
             :'<div class="block-icon">'+blockIcons[i-1]+'</div><div class="block-stars">'+stars+'</div>')
      +'</div><div class="block-meta"><div class="block-name">'+blockNames[i-1]+'</div>'
      +'<div class="block-price">'+fmtS(blockPrices[i-1])+' KR</div>'
      +(nc?'<button class="upg-bl-btn" onclick="event.stopPropagation();upgBlockLevel('+i+')">⬆ '+fmtS(nc)+'</button>'
          :'<div class="upg-bl-btn" style="opacity:0.4;cursor:default">MAX ★</div>')
      +'</div>';
    row.appendChild(w);
  }
  if(hasAutoBuy&&currentMaxBlock>=6){
    const ab=document.createElement('div');ab.id='autobuy-container';
    ab.innerHTML=`<div class="stat-label">AUTO</div><button class="autobuy-btn ${autoBuyActive?'active':''}" onclick="toggleAutoBuy()">${autoBuyActive?'PÅ':'AV'}</button>`;
    row.appendChild(ab);
  }
}

function updateUI(){
  document.getElementById('money').innerText=fmtS(Math.floor(money));
  const inc=cityData.reduce((t,b)=>t+(b&&b.income?b.income:0),0)*globalMultiplier;
  document.getElementById('pps').innerText=fmtS(Math.floor(inc));
  const btn=document.getElementById('upg-luck-btn');
  if(currentMaxBlock<6){
    if(btn){btn.style.display='inline-flex';const cs=document.getElementById('upg-cost');if(cs)cs.innerText=fmtS(upgCosts[currentMaxBlock]);const cn=document.getElementById('upg-name');if(cn)cn.innerText=blockNames[currentMaxBlock];if(cs)cs.innerText=fmtBtn(upgCosts[currentMaxBlock]);}
  }else{if(btn)btn.style.display='none';}
  cityData.forEach((data,i)=>{
    if(data){
      const b=document.querySelector('.upg-btn[data-s="'+i+'"]');
      if(b){
        const base=Math.max(data.sellPrice,200);
        const uc=Math.floor(base*1.25*Math.pow(1.85,data.level-1));
        b.classList.toggle('no-funds',money<uc);
        b.innerText=data.level>=50?'MAX':'UPG ('+fmtS(uc)+')';
      }
    }
  });
}

let _tt;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2500);
}

function save(){
  try{
    localStorage.setItem('lc_v6',JSON.stringify({
      money,currentMaxBlock,inventory,cityData,
      globalMultiplier,sellBonus,cdReduction,luckBoost,
      blockLevels,shopLevels,autoBuyActive,hasAutoBuy
    }));
  }catch(e){}
}

function loadGame(){
  try{
    const s=localStorage.getItem('lc_v6');
    if(!s) return;
    const d=JSON.parse(s);
    money=Number(d.money)||500;
    currentMaxBlock=Number(d.currentMaxBlock)||1;
    inventory=d.inventory||[];
    cityData=d.cityData||Array(24).fill(null);
    globalMultiplier=Number(d.globalMultiplier)||1;
    sellBonus=Number(d.sellBonus)||1;
    cdReduction=Number(d.cdReduction)||0;
    luckBoost=Number(d.luckBoost)||1;
    autoBuyActive=!!d.autoBuyActive;
    hasAutoBuy=!!d.hasAutoBuy;
    const bl=Array.isArray(d.blockLevels)?d.blockLevels:[];
    blockLevels=[0,1,2,3,4,5].map(i=>Number(bl[i])||0);
    const sl=Array.isArray(d.shopLevels)?d.shopLevels:[];
    shopLevels=shopUpgrades.map((upg,i)=>Math.min(Number(sl[i])||0,upg.maxLevel));
  }catch(e){console.warn('Spardata korrupt:',e);}
}

function resetGame(){
  if(confirm('Nollställa hela staden?')){localStorage.removeItem('lc_v6');location.reload();}
}

setInterval(()=>{
  const inc=cityData.reduce((t,b)=>t+(b&&b.income?b.income:0),0)*globalMultiplier;
  if(!isNaN(inc)){money+=inc;updateUI();}
  if(autoBuyActive&&hasAutoBuy&&currentMaxBlock>=6&&cooldowns[5]<=0&&money>=blockPrices[5]){
    buyBlock(6,true);
  }
},1000);


// ── Hemlig kod ──────────────────────────────────────────────────────────────
let _codeInput = '';
function openCodeModal(){ _codeInput=''; updateCodeDisplay(); document.getElementById('code-overlay').classList.add('open'); }
function closeCodeModal(){ document.getElementById('code-overlay').classList.remove('open'); }
function updateCodeDisplay(){
  const el = document.getElementById('code-display');
  el.textContent = _codeInput.length ? '*'.repeat(_codeInput.length) : '▮';
}
function codePress(d){
  if(_codeInput.length >= 6) return;
  _codeInput += d;
  updateCodeDisplay();
}
function codeDel(){
  _codeInput = _codeInput.slice(0,-1);
  updateCodeDisplay();
}
function codeSubmit(){
  const codes = {
    '90000': () => { inventory.push({...buildings[31], level:1, id:Date.now()}); renderInv(); updateUI(); save(); showToast('🌟 ??? ETT MIRAKEL INTRÄFFADE ???'); }
  };
  const fn = codes[_codeInput];
  if(fn){
    fn();
    closeCodeModal();
  } else {
    const el = document.getElementById('code-display');
    el.classList.remove('shake');
    void el.offsetWidth;
    el.classList.add('shake');
    _codeInput = '';
    setTimeout(()=>updateCodeDisplay(), 300);
  }
}

loadGame();renderCity();renderInv();renderBlocks();updateUI();
</script>
