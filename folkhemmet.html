<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bygg Folkhemmet - Slutgiltig Fix</title>
    <style>
        * {
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: #005293;
            color: #333;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #fecc00;
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid #005293;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 20px;
            padding: 20px;
            flex-grow: 1;
        }

        .panel {
            background: white;
            padding: 15px;
            border: 5px solid #fecc00;
        }

        .center-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .main-clicker {
            background: #fff;
            border: 10px solid #fecc00;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 0 #b38f00;
        }

        .main-clicker:active { transform: translateY(5px); box-shadow: 0 5px 0 #b38f00; }

        /* ALLA KNAPPAR ANVÄNDER DENNA KLASS */
        .buy-button {
            background: #f0f0f0;
            border: 3px solid #005293;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            font-family: inherit;
            font-size: 1rem;
        }

        .buy-button.disabled {
            background: #ccc !important;
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #999;
        }

        .buy-button:hover:not(.disabled) { background: #ddd; }

        .ach-card { padding: 10px; margin: 5px 0; border: 2px solid #ddd; background: #eee; font-size: 0.8rem; }
        .ach-card.unlocked { background: #fecc00; border-color: #005293; }

        .bottom-controls { text-align: center; padding: 40px; }
        .btn-reset { background: #ff4444; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }

        .plus-one {
            position: absolute;
            color: #fecc00;
            font-weight: bold;
            font-size: 2rem;
            pointer-events: none;
            animation: fly 0.8s forwards;
            text-shadow: 2px 2px 0px #005293;
        }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>BYGG FOLKHEMMET 🇸🇪</h1>
        <div style="font-size: 2rem;">Välfärd: <span id="money">0</span> kr</div>
        <div style="font-size: 1rem;">+<span id="pps">0</span>/sek | +<span id="mpc">1</span>/klick</div>
    </div>

    <div class="main-layout">
        <div class="panel">
            <h3>BUTIK</h3>
            <button class="buy-button" id="hammer-btn" onclick="buyHammer()">
                <b>Bättre Hammare</b>
                <span id="hammer-cost">15</span> kr
            </button>
            <hr>
            <div id="building-container"></div>
        </div>

        <div class="center-area">
            <div class="main-clicker" onclick="doClick(event)">
                <span style="font-size: 5rem;">🏠</span>
                <b>BYGG!</b>
            </div>
            <br>
            <a href="games.html" style="background:#333; color:white; padding:10px; text-decoration:none; border:2px solid #fecc00;">TILLBAKA</a>
        </div>

        <div class="panel">
            <h3>PRESTATIONER</h3>
            <button class="buy-button" id="lic-btn" onclick="buyLicense()" style="background:#fecc00;">
                KÖP LICENS (1000 kr)
            </button>
            <div id="ach-list"></div>
        </div>
    </div>

    <div class="bottom-controls">
        <button class="btn-reset" onclick="hardReset()">NOLLSTÄLL ALLT</button>
    </div>

    <script>
        let data = {
            money: 0,
            clicks: 0,
            mpc: 1,
            hammerPrice: 15,
            hasLicense: false,
            unlockedAch: [],
            buildings: [
                { id: 0, name: "Röd Stuga", cost: 15, income: 1, count: 0 },
                { id: 1, name: "Hyreshus", cost: 100, income: 5, count: 0 },
                { id: 2, name: "Sjukhus", cost: 500, income: 20, count: 0 },
                { id: 3, name: "Svensk Industri", cost: 2000, income: 100, count: 0 }
            ]
        };

        const achs = [
            { id: 0, t: "Flitig", d: "100 klick", c: () => data.clicks >= 100 },
            { id: 1, t: "Stugägare", d: "10 stugor", c: () => data.buildings[0].count >= 10 },
            { id: 2, t: "Rik", d: "5000 kr", c: () => data.money >= 5000 }
        ];

        function doClick(e) {
            data.money += data.mpc;
            data.clicks++;
            const t = document.createElement("div");
            t.className = "plus-one";
            t.innerText = "+" + data.mpc;
            t.style.left = e.pageX + "px"; t.style.top = e.pageY + "px";
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 800);
            update();
        }

        function buyHammer() {
            if (data.money >= data.hammerPrice) {
                data.money -= data.hammerPrice;
                data.mpc += 1;
                data.hammerPrice = Math.round(data.hammerPrice * 2);
                update();
            }
        }

        function buyB(id) {
            let b = data.buildings[id];
            if (data.money >= b.cost) {
                data.money -= b.cost;
                b.count++;
                b.cost = Math.round(b.cost * 1.15);
                update();
            }
        }

        function buyLicense() {
            if (data.money >= 1000) {
                data.money -= 1000;
                data.hasLicense = true;
                update();
            }
        }

        function update() {
            document.getElementById("money").innerText = Math.floor(data.money);
            document.getElementById("mpc").innerText = data.mpc;
            document.getElementById("hammer-cost").innerText = data.hammerPrice;
            
            let pps = data.buildings.reduce((s, b) => s + (b.count * b.income), 0);
            document.getElementById("pps").innerText = pps;

            // Hammer knapp
            document.getElementById("hammer-btn").className = "buy-button" + (data.money < data.hammerPrice ? " disabled" : "");

            // Byggnader
            let container = document.getElementById("building-container");
            container.innerHTML = "";
            data.buildings.forEach(b => {
                let dis = data.money < b.cost ? " disabled" : "";
                container.innerHTML += `<button class="buy-button${dis}" onclick="buyB(${b.id})">
                    <b>${b.name} (${b.count})</b> ${b.cost} kr
                </button>`;
            });

            // Licens & Ach
            document.getElementById("lic-btn").style.display = data.hasLicense ? "none" : "block";
            document.getElementById("lic-btn").className = "buy-button" + (data.money < 1000 ? " disabled" : "");

            let alist = document.getElementById("ach-list");
            alist.innerHTML = "";
            if (data.hasLicense) {
                achs.forEach(a => {
                    if (!data.unlockedAch.includes(a.id) && a.c()) data.unlockedAch.push(a.id);
                    let done = data.unlockedAch.includes(a.id);
                    alist.innerHTML += `<div class="ach-card ${done ? 'unlocked' : ''}">
                        <b>${done ? '🏆' : '🔒'} ${a.t}</b><br><small>${a.d}</small>
                    </div>`;
                });
            }

            localStorage.setItem('folkhem_save_v4', JSON.stringify(data));
        }

        function hardReset() {
            if (confirm("RENSA ALLT?")) {
                localStorage.clear();
                data = {
                    money: 0, clicks: 0, mpc: 1, hammerPrice: 15, hasLicense: false, unlockedAch: [],
                    buildings: [
                        { id: 0, name: "Röd Stuga", cost: 15, income: 1, count: 0 },
                        { id: 1, name: "Hyreshus", cost: 100, income: 5, count: 0 },
                        { id: 2, name: "Sjukhus", cost: 500, income: 20, count: 0 },
                        { id: 3, name: "Svensk Industri", cost: 2000, income: 100, count: 0 }
                    ]
                };
                update();
                location.reload();
            }
        }

        setInterval(() => {
            let pps = data.buildings.reduce((s, b) => s + (b.count * b.income), 0);
            data.money += pps / 10;
            update();
        }, 100);

        window.onload = () => {
            let s = localStorage.getItem('folkhem_save_v4');
            if (s) data = JSON.parse(s);
            update();
        };
    </script>
</body>
</html>
