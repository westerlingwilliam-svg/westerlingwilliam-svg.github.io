<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bygg Folkhemmet - Premium Neon Edition</title>
    <style>
        :root {
            --primary-blue: #005293;
            --secondary-blue: #1e3a5f;
            --swe-yellow: #fecc00;
            --sd-light-blue: #a3d4f7;
            --panel-bg: rgba(10, 25, 47, 0.90);
            --text-main: #ffffff;
            --neon-blue: 0 0 10px rgba(0, 82, 147, 0.6);
            --neon-yellow: 0 0 10px rgba(254, 204, 0, 0.6);
            /* Softare glöd för klick-effekter */
            --soft-yellow-glow: 0 0 10px rgba(254, 204, 0, 0.5);
        }

        * { 
            user-select: none; 
            -webkit-user-select: none; 
            box-sizing: border-box; 
            font-family: 'Arial Black', sans-serif; 
        }

        body { 
            background: linear-gradient(-45deg, #003a6b, #005293, #1e3a5f, #0a192f);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main); 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header { 
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 20px; 
            text-align: center; 
            border-bottom: 4px solid var(--swe-yellow);
            box-shadow: 0 0 15px rgba(254, 204, 0, 0.4);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: var(--swe-yellow);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: var(--neon-yellow);
        }

        .money-display {
            display: inline-block;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 45px;
            border-radius: 50px;
            margin-top: 15px;
            border: 3px solid var(--swe-yellow);
            box-shadow: 0 0 15px rgba(254, 204, 0, 0.3), inset 0 0 10px rgba(254, 204, 0, 0.2);
        }

        .money-display b { 
            font-size: 2.2rem; 
            color: var(--swe-yellow);
            text-shadow: 0 0 8px rgba(254, 204, 0, 0.6);
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .stat-capsule {
            background: rgba(0, 82, 147, 0.5);
            color: #cce4ff;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            border: 1px solid rgba(0, 82, 147, 0.6);
        }

        .stat-capsule span {
            color: white;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .main-layout { 
            display: grid; 
            grid-template-columns: 420px 1fr 420px; 
            gap: 25px; 
            padding: 25px; 
            max-width: 1800px; 
            margin: 0 auto; 
            width: 100%;
        }

        .panel { 
            background: var(--panel-bg);
            border-radius: 30px;
            padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(0, 82, 147, 0.3);
            border: 2px solid var(--primary-blue);
            max-height: 80vh;
            overflow-y: auto;
            backdrop-filter: blur(5px);
        }

        .panel h3 {
            text-align: center;
            color: var(--swe-yellow);
            text-transform: uppercase;
            text-shadow: var(--neon-yellow);
            border-bottom: 2px solid rgba(254, 204, 0, 0.3);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .center-area {
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }

        /* NEDTONAD Clicker */
        .clicker-circle {
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, #1a2b4a 0%, #050a14 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8rem;
            cursor: pointer;
            border: 6px solid #b38f00; /* Mattare guld */
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); 
            transition: 0.2s;
        }

        .clicker-circle:hover {
            box-shadow: 0 0 30px rgba(254, 204, 0, 0.4);
            border-color: var(--swe-yellow);
            transform: scale(1.02);
        }

        .clicker-circle:active { transform: scale(0.96); }
        /* Softare emoji-glöd */
        .clicker-circle span { filter: drop-shadow(0 0 10px rgba(254, 204, 0, 0.3)); }

        .item-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid rgba(0, 82, 147, 0.4);
            cursor: pointer;
            transition: 0.3s;
        }

        .item-card:hover:not(.disabled) {
            transform: translateX(5px);
            border-color: var(--swe-yellow);
            background: rgba(0, 82, 147, 0.25);
            box-shadow: 0 0 15px rgba(254, 204, 0, 0.4);
        }

        .item-card.disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .card-header b { color: white; font-size: 1.1rem; text-shadow: 0 0 5px rgba(255,255,255,0.4); }
        
        .card-price { 
            color: var(--swe-yellow); 
            background: rgba(0, 0, 0, 0.6); 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.9rem; 
            border: 1px solid rgba(254, 204, 0, 0.5);
            font-family: sans-serif;
        }

        .card-desc { font-size: 0.85rem; color: #b0d5ff; margin-top: 8px; font-family: sans-serif; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px;}

        /* UPPDRAGS-STYLING */
        .quest-group {
            margin-bottom: 25px;
            border: 1px solid rgba(0, 82, 147, 0.3);
            border-radius: 15px;
            background: rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .quest-group-title {
            background: rgba(0, 82, 147, 0.4);
            color: white;
            padding: 10px 15px;
            font-size: 1.1rem;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(0, 82, 147, 0.3);
            text-align: center;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .ach-card { 
            padding: 15px; 
            position: relative;
        }

        /* Linje mellan uppdrag */
        .ach-card:not(:last-child) {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ach-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .ach-title {
            color: white;
            font-size: 1rem;
        }

        .ach-reward {
            color: #00ff88;
            font-weight: bold;
            font-size: 0.9rem;
            text-shadow: 0 0 10px rgba(0,255,136,0.4);
        }

        .ach-req {
            font-size: 0.8rem;
            color: #a0c0ff;
            font-family: sans-serif;
            margin-bottom: 8px;
        }

        .progress-container { 
            background: #000; height: 10px; width: 100%; 
            border-radius: 10px; overflow: hidden;
            border: 1px solid rgba(0, 119, 255, 0.4);
            margin-bottom: 10px;
        }
        
        .progress-bar { 
            background: linear-gradient(90deg, var(--primary-blue), var(--swe-yellow));
            height: 100%; width: 0%; transition: width 0.5s ease; 
        }

        .claim-btn { 
            width: 100%; padding: 8px; 
            background: #222; border: 1px solid #444; 
            color: #666; font-weight: bold; border-radius: 8px; 
            transition: 0.3s; text-transform: uppercase;
            font-size: 0.8rem;
        }
        .claim-btn.ready { 
            background: linear-gradient(45deg, #00ff88, #00cc66); 
            cursor: pointer; 
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            border: none;
        }

        /* NEDTONAD klicktext */
        .plus-one { 
            position: absolute; color: white; font-weight: 900; 
            font-size: 2.2rem; pointer-events: none; animation: flyUp 0.8s forwards; 
            text-shadow: 0 0 5px rgba(255,255,255,0.8), 0 0 10px rgba(254, 204, 0, 0.4); 
            z-index: 1000; 
        }

        @keyframes flyUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }

        .back-link {
            margin-top: 30px; color: #7090c0; text-decoration: none; font-weight: bold;
            font-family: sans-serif; transition: 0.3s; font-size: 0.9rem;
        }
        .back-link:hover { color: white; text-shadow: 0 0 10px rgba(255,255,255,0.4); }

        /* Scrollbar */
        .panel::-webkit-scrollbar { width: 6px; }
        .panel::-webkit-scrollbar-thumb { background: rgba(0, 82, 147, 0.6); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Bygg Folkhemmet</h1>
        <div class="money-display">💰 <b id="money">0</b> kr</div>
        <div class="stats-bar">
            <div class="stat-capsule">Produktion: <span id="pps">0</span>/sek</div>
            <div class="stat-capsule">Klickkraft: <span id="mpc">1</span></div>
            <div class="stat-capsule" style="color: var(--swe-yellow); border-color: rgba(254, 204, 0, 0.5);">Bonus: <span id="bonus-val">0</span>%</div>
        </div>
    </div>

    <div class="main-layout">
        <div class="panel">
            <h3>Marknad</h3>
            <div id="essentials">
                <div class="item-card" id="hammer-btn" onclick="buyHammer()">
                    <div class="card-header"><b>🔨 Super-Hammare</b> <span class="card-price" id="hammer-cost">15</span></div>
                    <div class="card-desc">Ökar klickstyrka baserat på din PPS.</div>
                </div>
                <div class="item-card" id="auto-btn" onclick="buyAuto()">
                    <div class="card-header"><b>🤖 Auto-Bot</b> <span class="card-price" id="auto-cost">100</span></div>
                    <div class="card-desc">Genererar klick automatiskt per sekund.</div>
                </div>
            </div>
            <div style="height: 2px; background: rgba(0, 82, 147, 0.3); margin: 20px 0;"></div>
            <div id="building-list"></div>
        </div>

        <div class="center-area">
            <div class="clicker-circle" onclick="doClick(event)"><span>🏠</span></div>
            <a href="games.html" class="back-link">← TILLBAKA TILL MENYN</a>
        </div>

        <div class="panel">
            <h3>Sverige-Uppdrag</h3>
            <div id="ach-license-area">
                <div class="item-card" style="text-align: center; border: 2px dashed rgba(163, 212, 247, 0.4); background: rgba(0,0,0,0.3); cursor: default;">
                    <p style="color: #a0c0ff; font-family: sans-serif; margin-top: 0;">Lås upp speciella belöningar!</p>
                    <button class="claim-btn ready" onclick="buyLicense()" style="background: linear-gradient(45deg, #fecc00, #ffdb4d); color: #000; box-shadow: 0 0 15px rgba(254, 204, 0, 0.5); border: none;">JIMMIE-LICENS (1 500 kr)</button>
                </div>
            </div>
            <div id="ach-container">
                </div>
        </div>
    </div>

    <script>
        // Logikversion 9.0 (Bevarad)
        let data = {
            money: 0, clicks: 0, mpc: 1, autoClicks: 0,
            hammerPrice: 15, autoPrice: 100,
            hasLicense: false, questsDone: 0,
            achLevels: { click: 0, money: 0, b0: 0, total: 0, secret: 0 },
            bCounts: Array(BuildingsData().length).fill(0),
            bCosts: BuildingsData().map(b => b.baseCost),
            hammerLevel: 0
        };

        function BuildingsData() {
            return [
                { name: "Röd Stuga", inc: 1, baseCost: 50 },
                { name: "Hyreshus", inc: 8, baseCost: 400 },
                { name: "Sjukhus", inc: 45, baseCost: 2000 },
                { name: "Industri", inc: 180, baseCost: 10000 },
                { name: "Universitet", inc: 750, baseCost: 60000 },
                { name: "Kärnkraft", inc: 3500, baseCost: 400000 },
                { name: "Välfärdsstat", inc: 15000, baseCost: 2500000 },
                { name: "Rymdprogram", inc: 65000, baseCost: 15000000 },
                { name: "AI-Myndighet", inc: 250000, baseCost: 100000000 },
                { name: "Sverige 2.0", inc: 1200000, baseCost: 1000000000 },
                { name: "SD-Högkvarteret 🌸", inc: 10000000, baseCost: 10000000000 }
            ];
        }

        const buildings = BuildingsData();

        const achChains = {
            click: { title: "Klick-Milstolpar", quests: [
                { t: "Kom igång!", target: 10, reward: 10, req: "10 klick" },
                { t: "Finger-gympa", target: 50, reward: 100, req: "50 klick" },
                { t: "Klick-Proffs", target: 5000, reward: 20000, req: "5 000 klick" }
            ]},
            money: { title: "Välfärds-Mål", quests: [
                { t: "Småsparare", target: 1000, reward: 100, req: "Ha 1 000 kr" },
                { t: "Kapitalist", target: 100000, reward: 15000, req: "Ha 100 000 kr" }
            ]},
            b0: { title: "Bostads-Satsning", quests: [
                { t: "En röd vägg", target: 1, reward: 20, req: "1 Röd Stuga" },
                { t: "Stugby", target: 20, reward: 1000, req: "20 Röda Stugor" }
            ]},
            total: { title: "Infrastruktur", quests: [
                { t: "Byggstart", target: 1, reward: 10, req: "1 byggnad" },
                { t: "Metropol", target: 100, reward: 50000, req: "100 byggnader" }
            ]},
            secret: { title: "Special-Uppdrag", quests: [
                { t: "Falukorvs-fest", target: 5, targetType: "b1", reward: 2000, req: "Bygg 5 Hyreshus" },
                { t: "Fika-paus", target: 1000, targetType: "clicks", reward: 5000, req: "Klicka 1000 gånger" },
                { t: "Sverigevän", target: 1, targetType: "b10", reward: 500000, req: "Bygg 1 SD-Högkvarter" },
                { t: "Kärnkraft i trädgården", target: 10, targetType: "b5", reward: 100000, req: "Bygg 10 Kärnkraftverk" }
            ]}
        };

        function getQuestBonus() { return 1 + (data.questsDone * 0.10); }
        
        function getTotalPPS() {
            let pps = 0;
            const bData = BuildingsData();
            for(let i=0; i<bData.length; i++) {
                if(data.bCounts[i]) pps += data.bCounts[i] * bData[i].inc * getQuestBonus();
            }
            return pps;
        }

        function calculateMPC() {
            let pps = getTotalPPS();
            let base = 1 + (data.hammerLevel * 1);
            let productionBonus = (pps * 0.016) * data.hammerLevel; // 1/6 styrka
            return Math.max(1, Math.floor(base + productionBonus));
        }

        function doClick(e) {
            let currentMPC = calculateMPC();
            data.money += currentMPC; data.clicks++;
            if(e) {
                const t = document.createElement("div"); t.className = "plus-one"; t.innerText = "+" + currentMPC.toLocaleString();
                t.style.left = e.pageX + "px"; t.style.top = (e.pageY - 40) + "px";
                document.body.appendChild(t); setTimeout(() => t.remove(), 800);
            }
            updateNumbersOnly();
        }

        function buyHammer() { if (data.money >= data.hammerPrice) { data.money -= data.hammerPrice; data.hammerLevel++; data.hammerPrice = Math.round(data.hammerPrice * 2.1); renderBuildings(); updateNumbersOnly(); } }
        function buyAuto() { if (data.money >= data.autoPrice) { data.money -= data.autoPrice; data.autoClicks++; data.autoPrice = Math.round(data.autoPrice * 2.5); updateNumbersOnly(); } }
        function buyBuilding(id) { if (data.money >= data.bCosts[id]) { data.money -= data.bCosts[id]; data.bCounts[id]++; data.bCosts[id] = Math.round(data.bCosts[id] * 1.30); renderBuildings(); updateNumbersOnly(); } }
        function buyLicense() { if (data.money >= 1500) { data.money -= 1500; data.hasLicense = true; renderEverything(); } }

        function claimAch(type) {
            const level = data.achLevels[type];
            const ach = achChains[type].quests[level];
            if (getValByType(type, level) >= ach.target) {
                data.money += ach.reward;
                data.achLevels[type]++; data.questsDone++;
                renderEverything();
            }
        }

        function getValByType(type, level) {
            const ach = achChains[type].quests[level];
            if (type === 'secret') {
                if (ach.targetType === 'clicks') return data.clicks;
                if (ach.targetType.startsWith('b')) return data.bCounts[parseInt(ach.targetType.substring(1))];
                return 0;
            }
            if(type === 'click') return data.clicks;
            if(type === 'money') return data.money;
            if(type === 'total') return data.bCounts.reduce((a, b) => a + b, 0);
            if(type.startsWith('b')) return data.bCounts[parseInt(type.substring(1))];
            return 0;
        }

        function updateNumbersOnly() {
            let currentMPC = calculateMPC();
            const bData = BuildingsData();
            document.getElementById("money").innerText = Math.floor(data.money).toLocaleString();
            document.getElementById("mpc").innerText = currentMPC.toLocaleString();
            document.getElementById("pps").innerText = Math.floor(getTotalPPS()).toLocaleString();
            document.getElementById("bonus-val").innerText = Math.round((getQuestBonus()-1)*100);
            document.getElementById("hammer-cost").innerText = data.hammerPrice.toLocaleString();
            document.getElementById("auto-cost").innerText = data.autoPrice.toLocaleString();
            
            document.getElementById("hammer-btn").classList.toggle("disabled", data.money < data.hammerPrice);
            document.getElementById("auto-btn").classList.toggle("disabled", data.money < data.autoPrice);
            
            bData.forEach((_, i) => {
                const btn = document.getElementById("build-"+i);
                if(btn) btn.classList.toggle("disabled", data.money < data.bCosts[i]);
            });
            localStorage.setItem('folkhem_hardcore_v9_design_clear_quests', JSON.stringify(data));
        }

        function renderBuildings() {
            let bHtml = "";
            const bData = BuildingsData();
            bData.forEach((b, i) => {
                const cost = data.bCosts[i];
                if ((data.money >= cost * 0.2) || (data.bCounts[i] > 0)) {
                    bHtml += `<div class="item-card ${data.money < cost ? 'disabled' : ''}" id="build-${i}" onclick="buyBuilding(${i})">
                        <div class="card-header"><b>${b.name} (${data.bCounts[i]})</b> <span class="card-price">${cost.toLocaleString()} kr</span></div>
                        <div class="card-desc">Produktion: +${(b.inc * getQuestBonus()).toLocaleString()}/sek</div>
                    </div>`;
                }
            });
            document.getElementById("building-list").innerHTML = bHtml;
        }

        function renderEverything() {
            renderBuildings();
            document.getElementById("ach-license-area").style.display = data.hasLicense ? "none" : "block";
            
            if (data.hasLicense) {
                let html = "";
                Object.keys(achChains).forEach(type => {
                    const group = achChains[type];
                    const level = data.achLevels[type];
                    
                    if (level < group.quests.length) {
                        html += `<div class="quest-group">`;
                        html += `<div class="quest-group-title">${group.title}</div>`;
                        
                        // Visa bara det aktuella uppdraget i kedjan
                        const ach = group.quests[level];
                        const val = getValByType(type, level);
                        const progress = (val / ach.target) * 100;
                        const isReady = val >= ach.target;
                        
                        html += `
                            <div class="ach-card">
                                <div class="ach-card-header">
                                    <b class="ach-title">${type === 'secret' ? '🌟 ' : ''}${ach.t}</b>
                                    <span class="ach-reward">+${ach.reward.toLocaleString()} kr</span>
                                </div>
                                <div class="ach-req">${ach.req}</div>
                                <div class="progress-container"><div class="progress-bar" style="width: ${Math.min(100, progress)}%"></div></div>
                                <button class="claim-btn ${isReady ? 'ready' : ''}" onclick="if(${isReady}) claimAch('${type}')">${isReady ? 'HÄMTA' : 'LÅST'}</button>
                            </div>`;
                            
                        html += `</div>`; // Stäng quest-group
                    }
                });
                document.getElementById("ach-container").innerHTML = html;
            }
            updateNumbersOnly();
        }

        setInterval(() => {
            let pps = getTotalPPS();
            let currentMPC = calculateMPC();
            data.money += pps / 10;
            if(data.autoClicks > 0) data.money += (data.autoClicks * currentMPC) / 10;
            updateNumbersOnly();
        }, 100);

        window.onload = () => {
            let s = localStorage.getItem('folkhem_hardcore_v9_design_clear_quests');
            if (s) {
                let savedData = JSON.parse(s);
                // Fix för gamla saves med felaktig array-längd
                if (savedData.bCounts && savedData.bCounts.length < BuildingsData().length) {
                    while(savedData.bCounts.length < BuildingsData().length) savedData.bCounts.push(0);
                    while(savedData.bCosts.length < BuildingsData().length) savedData.bCosts.push(0); // Uppdateras via BuildingsData baseCost sen
                }
                Object.assign(data, savedData);
            }
            renderEverything();
        };
    </script>
</body>
</html>
