<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimmie.Fun - Spel och Saker</title>
    <style>
        /* Grundinställningar - Ren och modern stil som bilden */
        body {
            font-family: 'Courier New', Courier, monospace; /* Lite "retro-kod"-stil på texten */
            background-color: #fafafa;
            color: #333;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        /* Rubriken högst upp, centrerad och ren */
        header {
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            font-weight: bold;
        }

        header p {
            font-size: 1.2rem;
            color: #777;
            margin: 5px 0 0;
        }

        /* SJÄLVA GRIDET - Rutnätet där alla kort ligger */
        .game-grid {
            display: grid;
            /* Det här skapar 3 kolumner som anpassar sig efter skärmstorleken */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px; /* Mellanrum mellan korten */
            max-width: 1000px;
            margin: 0 auto; /* Centrerar hela gridet på skärmen */
        }

        /* Grunddesignen för varje kort */
        .game-card {
            background-color: #fff;
            border: 2px solid #ddd;
            border-radius: 12px;
            padding: 20px;
            height: 150px; /* Samma höjd som på bilden */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-decoration: none; /* Ta bort understrykning på länktext */
            color: inherit;
            overflow: hidden; /* Förhindrar att innehåll sticker ut */
            
            /* -- HÄR ÄR ANIMATIONEN -- */
            transition: all 0.3s ease; /* Gör att alla ändringar sker mjukt under 0.3 sekunder */
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); /* En liten mjuk skugga */
        }

        /* --- EFFEKT NÄR MAN HÅLLER MUSEN ÖVER (HOVER) --- */
        .game-card:hover {
            border-color: #333; /* Ramen blir mörkare */
            transform: translateY(-5px) scale(1.02); /* Kortet "lyfter" lite och blir aningen större */
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); /* Skuggan blir större för att se ut som det flyger */
        }

        /* Specifik design för rubrikerna på korten */
        .game-card h3 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: normal;
        }

        /* --- OLIKA STILAR FÖR VARJE KORT (För att matcha bilden) --- */

        /* 1. Stjärnteckning (Mörkt tema) */
        .card-stars {
            background-color: #111;
            color: #eee;
            border: none;
        }
        .card-stars:hover {
            border-color: #eee;
        }

        /* 2. Sandbox (Retro/Grön kant) */
        .card-sandbox {
            border-color: #ff9f43;
            background: linear-gradient(180deg, #fafafa 0%, #ffdfbf 100%);
        }
        .card-sandbox h3 {
            color: #e67e22;
        }

        /* 3. Livets Storlek (Naturen) */
        .card-life {
            border-color: #2ecc71;
            background-image: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }
        .card-life h3 {
            color: #27ae60;
        }

        /* 4. Robot-testet (Rent och vitt) */
        .card-robot {
            border-color: #e74c3c;
        }
        .card-robot h3 {
            color: #c0392b;
        }

        /* 5. Väg-trippen (Vägskylt-grönt) */
        .card-road {
            background-color: #1e8449;
            color: white;
            border: 2px solid #27ae60;
        }
        .card-road:hover {
            border-color: white;
        }

        /* 6. Clicker-spelet (Starkt rosa/rött) */
        .card-clicker {
            background-color: #e91e63;
            color: white;
            border-color: #f06292;
        }

        /* -- För att lägga till små ikoner/symboler senare -- */
        .card-icon {
            font-size: 1.5rem;
            opacity: 0.6;
            margin-bottom: auto;
        }
        
    </style>
</head>
<body>

    <header>
        <h1>Jimmie.Fun</h1>
        <p>spel och grejer av Wille</p>
    </header>

    <div class="game-grid">

        <a href="#" class="game-card card-stars">
            <span class="card-icon">✧</span>
            <h3>Stjärnteckning</h3>
        </a>

        <a href="#" class="game-card card-sandbox">
            <span class="card-icon">▤</span>
            <h3>Sandlådan</h3>
        </a>

        <a href="#" class="game-card card-life">
            <span class="card-icon">🌿</span>
            <h3>Hur stor är du?</h3>
        </a>

        <a href="#" class="game-card card-robot">
            <span class="card-icon">☑</span>
            <h3>Är du en robot?</h3>
        </a>

        <a href="#" class="game-card card-road">
            <span class="card-icon">↑</span>
            <h3>Internet-resan</h3>
        </a>

        <a href="#" class="game-card card-clicker">
            <span class="card-icon">⚡</span>
            <h3>Klick-mästaren</h3>
        </a>

    </div>

</body>
</html>
