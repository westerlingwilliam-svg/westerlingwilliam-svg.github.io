<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riksdags Opinion Tycoon - OMEGA EDITION</title>
    <style>
        :root {
            --sd-blue: #005293;
            --sd-yellow: #fecc00;
            --dark-blue: #001a33;
            --gold: #ffd700;
        }

        body {
            font-family: 'Segoe UI', Impact, sans-serif;
            background: var(--dark-blue);
            color: white;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Bakgrundsanimation från Elite Edition */
        .bg-glow {
            position: fixed;
            top: 50%; left: 50%;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(0,82,147,0.3) 0%, rgba(0,0,0,0) 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
            animation: pulse 5s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
        }

        .stats-header {
            background: linear-gradient(180deg, var(--sd-blue), #003d6e);
            width: 100%;
            padding: 25px 0;
            display: flex;
            justify-content: center;
            gap: 50px;
            border-bottom: 5px solid var(--sd-yellow);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .stat-item { text-align: center; }
        .stat-label { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; color: var(--sd-yellow); }
        .stat-num { font-size: 2.2rem; font-weight: 900; text-shadow: 0 0 15px rgba(254, 204, 0, 0.5); }

        /* Opinion Bar */
        .progress-wrapper {
            width: 90%;
            max-width: 1000px;
            margin: 40px 0;
            position: relative;
        }

        .bar-container {
            height: 45px;
            background: rgba(255,255,255,0.1);
            border-radius: 25px;
            border: 4px solid #fff;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #opinion-bar {
            height: 100%;
            width: 20%;
            background: linear-gradient(90deg, #ffcc00, #fff700, #ffcc00);
            background-size: 200% 100%;
            animation: shine 2s linear infinite;
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes shine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .milestone-marker {
            position: absolute;
            top: -10px;
            height: 65px;
            width: 4px;
            background: red;
            z-index: 5;
        }

        /* Dashboard grid (3 på bredden) */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            width: 95%;
            max-width: 1200px;
            padding-bottom: 100px;
        }

        .upgrade-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .upgrade-card:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-5px);
            border-color: var(--sd-yellow);
        }

        .upgrade-card h3 { color: var(--sd-yellow); margin: 0; font-size: 1.4rem; }

        .buy-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--sd-yellow);
            color: var(--dark-blue);
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 5px 0 #b38f00;
            margin-top: 10px;
        }

        .buy-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b38f00; }
        .buy-btn:disabled { background: #555; box-shadow: none; cursor: not-allowed; color: #888; }

        /* Jimmie-knappen för att tjäna pengar snabbt */
        .jimmie-btn {
            width: 150px; height: 150px;
            border-radius: 50%;
            background: var(--sd-blue);
            border: 6px solid var(--sd-yellow);
            color: white;
            font-weight: 900;
            cursor: pointer;
            margin-bottom: 40px;
            transition: 0.1s;
            box-shadow: 0 0 30px rgba(0, 82, 147, 0.5);
        }

        .jimmie-btn:active { transform: scale(0.9); }

        /* Popups / Modaler */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 999; display: none;
        }

        .modal {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: #fff; color: #222;
            padding: 40px; border-radius: 30px;
            z-index: 1000; display: none;
            text-align: center; width: 450px;
            border: 10px solid var(--sd-blue);
        }

        .modal.active { display: block; animation: popIn 0.3s forwards; }

        @keyframes popIn { to { transform: translate(-50%, -50%) scale(1); } }

        /* Victory Screen */
        #victory-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--sd-blue); z-index: 5000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body onclick="spawnParticle(event)">

    <div id="victory-screen">
        <h1 style="font-size: 8rem; color: var(--sd-yellow); margin: 0;">50.0%</h1>
        <h2 style="font-size: 3rem;">ABSOLUT MAJORITET!</h2>
        <p>Du har vunnit valet och makten i Sverige.</p>
        <button class="buy-btn" onclick="location.reload()" style="width: auto; padding: 20px 60px;">SPELA IGEN</button>
    </div>

    <div class="bg-glow"></div>

    <div class="stats-header">
        <div class="stat-item">
            <div class="stat-label">Budget</div>
            <div class="stat-num" id="money-val">0 kr</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Opinion</div>
            <div class="stat-num" id="opinion-val">20.00%</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Opinions-växt</div>
            <div class="stat-num" id="growth-val">+0.000%</div>
        </div>
    </div>

    <div class="progress-wrapper">
        <div class="bar-container">
            <div id="opinion-bar"></div>
        </div>
        <div class="milestone-marker" style="left: 4%;"></div> 
        <div style="position:absolute; left: 4%; top: 55px; font-size: 0.7rem;">4% SPÄRREN</div>
        
        <div class="milestone-marker" style="left: 50.1%; border-color: gold;"></div>
        <div style="position:absolute; left: 45%; top: 55px; font-size: 0.8rem; color: gold; font-weight: bold;">MAJORITET (50%)</div>
    </div>

    <button class="jimmie-btn" onclick="clickMoney(event)">HÅLL ETT TAL<br><small>+ Pengar</small></button>

    <div class="dashboard" id="shop"></div>

    <div class="overlay" id="overlay"></div>
    <div class="modal" id="event-modal">
        <h2 id="ev-title">HÄNDELSE</h2>
        <p id="ev-desc">Vad gör du?</p>
        <div id="ev-choices"></div>
    </div>

    <center style="padding: 40px;">
        <a href="games.html" style="color: white; text-decoration: none; opacity: 0.5;">Tillbaka till menyn</a>
    </center>

    <script>
        let state = {
            money: 150000,
            opinion: 20.0,
            moneyRate: 800,
            opinionRate: 0.0001, // Extremt långsamt (per 0.1s)
            clickPower: 750,
            active: true
        };

        const upgrades = [
            { id: 1, name: "Ny Slips", desc: "Ser proffsigare ut i TV.", cost: 10000, o: 0.0002, m: 200 },
            { id: 2, name: "Meme-fabrik", desc: "Nå de unga väljarna.", cost: 25000, o: 0.0008, m: 500 },
            { id: 3, name: "YouTube-shorts", desc: "Algoritmen älskar dig.", cost: 80000, o: 0.002, m: 1200 },
            { id: 4, name: "Eget Flygblad", desc: "Information till alla hem.", cost: 200000, o: 0.006, m: 3000 },
            { id: 5, name: "Kampanjbuss", desc: "Turnera i hela landet.", cost: 500000, o: 0.015, m: 8000 },
            { id: 6, name: "Kärnkraft-Merch", desc: "Sälj lysande tröjor.", cost: 1200000, o: 0.04, m: 20000 },
            { id: 7, name: "Eget Mediehus", desc: "Sänd nyheter dygnet runt.", cost: 4000000, o: 0.12, m: 60000 },
            { id: 8, name: "AI-Talskrivare", desc: "Perfekta tal varje gång.", cost: 10000000, o: 0.35, m: 150000 },
            { id: 9, name: "Sanningens Torn", desc: "Ett monument i huvudstaden.", cost: 25000000, o: 1.0, m: 400000 },
            { id: 10, name: "Slutspurten", desc: "Allt eller inget.", cost: 75000000, o: 5.0, m: 0 }
        ];

        const events = [
            { t: "TV4 NYHETERNA", d: "Du får en tuff fråga om invandring.", c: [{t:"Svara lugnt", o:0.4, m:0}, {t:"Gå till attack", o:1.2, m:-50000}]},
            { t: "DONATION", d: "En anonym person ger ett bidrag.", c: [{t:"Tacka (Pengar)", o:-0.2, m:200000}, {t:"Neka (Heder)", o:0.5, m:0}]},
            { t: "MATLAGNING", d: "Du lagar korv i TV. Hur går det?", c: [{t:"Det blir succé!", o:0.8, m:0}, {t:"Du bränner den", o:-0.4, m:10000}]},
            { t: "TWITTER-STORM", d: "Ett gammalt citat dyker upp.", c: [{t:"Be om ursäkt", o:0.1, m:0}, {t:"Dubbla ner", o:1.5, m:0}]}
        ];

        function initShop() {
            const shop = document.getElementById('shop');
            shop.innerHTML = "";
            upgrades.forEach(u => {
                shop.innerHTML += `
                    <div class="upgrade-card" id="u-${u.id}">
                        <div>
                            <h3>${u.name}</h3>
                            <p>${u.desc}</p>
                        </div>
                        <div>
                            <div style="font-weight:bold">${u.cost.toLocaleString()} kr</div>
                            <button class="buy-btn" id="btn-${u.id}" onclick="buyItem(${u.id})">KÖP NU</button>
                        </div>
                    </div>
                `;
            });
        }

        function clickMoney(e) {
            state.money += state.clickPower;
            updateUI();
        }

        function buyItem(id) {
            const i = upgrades.findIndex(x => x.id === id);
            const u = upgrades[i];
            if (state.money >= u.cost) {
                state.money -= u.cost;
                state.opinionRate += u.o;
                state.moneyRate += u.m;
                upgrades.splice(i, 1);
                document.getElementById(`u-${id}`).remove();
                updateUI();
            }
        }

        function updateUI() {
            if (!state.active) return;
            document.getElementById('money-val').innerText = Math.floor(state.money).toLocaleString() + " kr";
            document.getElementById('opinion-val').innerText = state.opinion.toFixed(3) + "%";
            document.getElementById('growth-val').innerText = "+" + (state.opinionRate * 10).toFixed(4) + "%";
            
            let w = (state.opinion / 50) * 100;
            document.getElementById('opinion-bar').style.width = Math.min(w, 100) + "%";

            if (state.opinion >= 50) {
                state.active = false;
                document.getElementById('victory-screen').style.display = 'flex';
            }

            upgrades.forEach(u => {
                const btn = document.getElementById(`btn-${u.id}`);
                if (btn) btn.disabled = state.money < u.cost;
            });
        }

        function triggerEvent() {
            if (!state.active) return;
            const ev = events[Math.floor(Math.random() * events.length)];
            document.getElementById('ev-title').innerText = ev.t;
            document.getElementById('ev-desc').innerText = ev.d;
            const cBox = document.getElementById('ev-choices');
            cBox.innerHTML = "";
            ev.c.forEach(choice => {
                const b = document.createElement('button');
                b.className = "buy-btn"; b.style.margin = "10px 0";
                b.innerText = choice.t;
                b.onclick = () => {
                    state.opinion += choice.o;
                    state.money += choice.m;
                    document.getElementById('overlay').style.display = 'none';
                    document.getElementById('event-modal').classList.remove('active');
                    updateUI();
                };
                cBox.appendChild(b);
            });
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('event-modal').classList.add('active');
        }

        function spawnParticle(e) {
            if (e.target.className !== 'jimmie-btn') return;
            const p = document.createElement('div');
            p.innerText = "+" + state.clickPower + "kr";
            p.style.cssText = `position:fixed; left:${e.clientX}px; top:${e.clientY}px; color:var(--sd-yellow); font-weight:bold; pointer-events:none; z-index:9999;`;
            document.body.appendChild(p);
            p.animate([{transform:'translateY(0)', opacity:1}, {transform:'translateY(-100px)', opacity:0}], 1000).onfinish = () => p.remove();
        }

        setInterval(() => {
            if (state.active) {
                state.money += state.moneyRate / 10;
                state.opinion += state.opinionRate;
                updateUI();
            }
        }, 100);

        setInterval(triggerEvent, 25000);
        initShop();
        updateUI();
    </script>
</body>
</html>
