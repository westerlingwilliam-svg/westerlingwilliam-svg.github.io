<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sverige-Byggaren: Lucky Blocks</title>
    <style>
        :root {
            --common: #b5b5b5;
            --rare: #4facfe;
            --epic: #a335ee;
            --legendary: #ff8000;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #001f3f;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        /* TOP BAR */
        .top-bar {
            background: #005293;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #fecc00;
        }
        .balance { font-size: 1.5rem; font-weight: bold; color: #fecc00; }

        /* MAIN LAYOUT */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* STADEN (Vänster sida) */
        #city-grid {
            flex: 2;
            background: #003366;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 5px;
            padding: 10px;
            background-image: radial-gradient(#004080 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .slot {
            background: rgba(255,255,255,0.05);
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            cursor: pointer;
        }
        .slot:hover { background: rgba(254, 204, 0, 0.1); }

        /* SIDEBAR (Höger sida) */
        .sidebar {
            flex: 1;
            background: #002b55;
            border-left: 2px solid #fecc00;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .lucky-block-section {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #005293;
        }
        #lucky-block {
            width: 120px; height: 120px;
            background: #fecc00;
            margin: 10px auto;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            color: #005293;
            cursor: pointer;
            box-shadow: 0 10px 0 #b38f00;
            transition: 0.1s;
        }
        #lucky-block:active { transform: translateY(5px); box-shadow: 0 5px 0 #b38f00; }

        .inventory {
            flex: 1;
            overflow-y: auto;
            margin-top: 20px;
        }
        .inv-item {
            background: rgba(255,255,255,0.1);
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="balance">💰 <span id="money">500</span> kr</div>
    <div>STADS-INKOMST: <span id="pps">0</span> kr/sek</div>
    <a href="games.html" style="color: white; text-decoration: none;">[ Avsluta ]</a>
</div>

<div class="main-container">
    <div id="city-grid">
        </div>

    <div class="sidebar">
        <div class="lucky-block-section">
            <h3>KÖP LUCKY BLOCK</h3>
            <div id="lucky-block">?</div>
            <p>Kostnad: <span id="block-cost">250</span> kr</p>
        </div>

        <h3>Ditt Inventory</h3>
        <div class="inventory" id="inventory">
            </div>
    </div>
</div>

<script>
    let money = 500;
    let blockCost = 250;
    let selectedBuilding = null;
    let incomePerSecond = 0;

    // Byggnads-data (Rarity påverkar inkomst)
    const buildings = [
        { name: "Röd Stuga", icon: "🏠", rarity: "common", income: 5, chance: 0.6 },
        { name: "Hyreshus", icon: "🏢", rarity: "rare", income: 25, chance: 0.3 },
        { name: "Kärnkraftverk", icon: "⚛️", rarity: "epic", income: 150, chance: 0.08 },
        { name: "Guld-Slott", icon: "🏰", rarity: "legendary", income: 1000, chance: 0.02 }
    ];

    let inventory = [];
    let cityData = Array(36).fill(null);

    // Initiera staden
    const grid = document.getElementById('city-grid');
    for (let i = 0; i < 36; i++) {
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.onclick = () => placeBuilding(i);
        grid.appendChild(slot);
    }

    // Öppna Lucky Block
    document.getElementById('lucky-block').onclick = () => {
        if (money >= blockCost) {
            money -= blockCost;
            blockCost = Math.ceil(blockCost * 1.1); // Priset ökar
            openBlock();
            updateUI();
        } else {
            alert("Du behöver mer pengar!");
        }
    };

    function openBlock() {
        const rand = Math.random();
        let cumulative = 0;
        let wonItem = buildings[0];

        for (const b of buildings) {
            cumulative += b.chance;
            if (rand < cumulative) {
                wonItem = { ...b, id: Date.now() };
                break;
            }
        }
        inventory.push(wonItem);
        renderInventory();
    }

    function renderInventory() {
        const invEl = document.getElementById('inventory');
        invEl.innerHTML = '';
        inventory.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'inv-item';
            div.style.borderLeft = `5px solid var(--${item.rarity})`;
            div.innerHTML = `
                <span>${item.icon} ${item.name}</span>
                <button onclick="selectForPlacement(${index})">SÄTT UT</button>
            `;
            invEl.appendChild(div);
        });
    }

    function selectForPlacement(index) {
        selectedBuilding = index;
        alert("Klicka nu på en ledig yta i staden!");
    }

    function placeBuilding(slotIndex) {
        if (selectedBuilding !== null && cityData[slotIndex] === null) {
            const item = inventory[selectedBuilding];
            cityData[slotIndex] = item;
            inventory.splice(selectedBuilding, 1);
            selectedBuilding = null;
            
            renderCity();
            renderInventory();
            calculateIncome();
        }
    }

    function renderCity() {
        const slots = document.getElementsByClassName('slot');
        cityData.forEach((data, i) => {
            slots[i].innerText = data ? data.icon : "";
            slots[i].style.background = data ? "rgba(255,255,255,0.15)" : "";
        });
    }

    function calculateIncome() {
        incomePerSecond = cityData.reduce((total, b) => total + (b ? b.income : 0), 0);
        document.getElementById('pps').innerText = incomePerSecond;
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(money).toLocaleString();
        document.getElementById('block-cost').innerText = blockCost;
    }

    // Gameloop - Pengar rullar in varje sekund
    setInterval(() => {
        money += incomePerSecond;
        updateUI();
    }, 1000);

    updateUI();
</script>

</body>
</html>
