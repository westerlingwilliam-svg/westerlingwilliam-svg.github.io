<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimmie's Secret</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--y:#fecc00;--r:#ff2244;--g:#00ff88;--b:#00aaff;--p:#cc44ff}
body{overflow:hidden;background:#000;color:#0f0;font-family:'Courier New',monospace;width:100vw;height:100vh;cursor:crosshair}

#bg{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 50%,#050a00 0%,#000 70%)}

/* Matrix rain */
#matrix-canvas{position:fixed;inset:0;opacity:0;transition:opacity 0.5s;pointer-events:none}

/* HUD corners */
#corner-tl,#corner-tr,#corner-bl,#corner-br{
  position:fixed;font-size:0.62rem;color:#00ff44;opacity:0;
  transition:opacity 0.3s;pointer-events:none;letter-spacing:1px;line-height:1.6;
}
#corner-tl{top:16px;left:16px}
#corner-tr{top:16px;right:16px;text-align:right}
#corner-bl{bottom:16px;left:16px}
#corner-br{bottom:16px;right:16px;text-align:right}
.hud-label{color:#00ff44;opacity:0.5;font-size:0.52rem;text-transform:uppercase;letter-spacing:2px}
.hud-val{color:#00ff88;font-weight:bold}
.hud-red{color:#ff4466}
.hud-yellow{color:#fecc00}
.hud-blue{color:#44aaff}

/* Scan lines */
#scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;opacity:0.4}

/* Center stage */
#stage{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px}

/* The button */
#bigbtn{
  position:relative;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#330000,#110000);
  border:4px solid #ff2244;cursor:pointer;
  box-shadow:0 0 30px #ff2244,0 0 60px rgba(255,34,68,0.3),inset 0 0 40px rgba(255,0,0,0.2);
  transition:transform 0.08s,box-shadow 0.08s;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:6px;
  user-select:none;
}
#bigbtn::before{
  content:'';position:absolute;inset:8px;border-radius:50%;
  border:2px solid rgba(255,100,100,0.3);
}
#bigbtn::after{
  content:'';position:absolute;inset:20px;border-radius:50%;
  background:radial-gradient(circle at 40% 30%,rgba(255,80,80,0.15),transparent 60%);
}
#bigbtn:hover{
  transform:scale(1.04);
  box-shadow:0 0 50px #ff2244,0 0 100px rgba(255,34,68,0.5),inset 0 0 50px rgba(255,0,0,0.3);
}
#bigbtn:active{transform:scale(0.96)}
#bigbtn .btn-icon{font-size:3rem;z-index:1}
#bigbtn .btn-text{font-size:0.75rem;letter-spacing:3px;color:#ff8899;text-transform:uppercase;z-index:1}
#bigbtn .btn-sub{font-size:0.55rem;letter-spacing:2px;color:#ff4466;opacity:0.7;z-index:1}

/* Pulsing ring animation */
@keyframes pulse-ring{
  0%{transform:scale(1);opacity:0.8}
  100%{transform:scale(1.8);opacity:0}
}
.pulse-ring{
  position:absolute;inset:-10px;border-radius:50%;
  border:2px solid #ff2244;
  animation:pulse-ring 1.5s ease-out infinite;
  pointer-events:none;
}
.pulse-ring:nth-child(2){animation-delay:0.5s}
.pulse-ring:nth-child(3){animation-delay:1s}

/* Title */
#title{
  font-size:1.6rem;letter-spacing:6px;color:#ff2244;
  text-shadow:0 0 20px #ff2244,0 0 40px rgba(255,34,68,0.4);
  text-transform:uppercase;font-weight:bold;
}
#subtitle{font-size:0.7rem;letter-spacing:4px;color:#ff4466;opacity:0.6;text-transform:uppercase}

/* Explosion particles — canvas overlay */
#explode-canvas{position:fixed;inset:0;pointer-events:none}

/* Data stream overlay */
#datastream{
  position:fixed;inset:0;display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:80px;pointer-events:none;opacity:0;transition:opacity 0.4s;
}
#datastream pre{
  font-size:0.58rem;color:#00ff44;line-height:1.5;letter-spacing:1px;
  text-shadow:0 0 6px #00ff44;max-width:600px;text-align:center;
}

/* Side panels */
#panel-l,#panel-r{
  position:fixed;top:50%;transform:translateY(-50%);
  width:160px;padding:12px;
  border:1px solid rgba(0,255,68,0.2);background:rgba(0,20,0,0.6);
  font-size:0.58rem;line-height:1.7;color:#00ff44;
  opacity:0;transition:opacity 0.4s;pointer-events:none;
}
#panel-l{left:12px;border-left:2px solid #00ff44}
#panel-r{right:12px;border-right:2px solid #00ff44;text-align:right}

/* Alert flash */
#alert{
  position:fixed;top:50px;left:50%;transform:translateX(-50%);
  background:rgba(255,34,68,0.9);color:#fff;
  font-size:0.9rem;letter-spacing:3px;padding:10px 28px;
  border:1px solid #ff2244;opacity:0;pointer-events:none;
  text-transform:uppercase;font-weight:bold;
  transition:opacity 0.15s;
}

/* Back button */
#backbtn{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.7);border:1px solid rgba(255,34,68,0.4);
  color:#ff4466;font-family:'Courier New',monospace;font-size:0.72rem;
  letter-spacing:2px;padding:8px 20px;cursor:pointer;text-decoration:none;
  transition:all 0.2s;text-transform:uppercase;
}
#backbtn:hover{border-color:#ff2244;color:#ff2244;background:rgba(255,34,68,0.1)}

/* Glitch effect */
@keyframes glitch{
  0%,100%{clip-path:none;transform:none}
  20%{clip-path:inset(30% 0 40% 0);transform:translate(-4px,0)}
  40%{clip-path:inset(60% 0 10% 0);transform:translate(4px,0)}
  60%{clip-path:inset(10% 0 70% 0);transform:translate(-2px,0)}
  80%{clip-path:none;transform:none}
}
.glitching{animation:glitch 0.2s steps(1) forwards}
</style>
</head>
<body>

<div id="bg"></div>
<canvas id="matrix-canvas"></canvas>
<div id="scanlines"></div>
<canvas id="explode-canvas"></canvas>

<!-- HUD corners -->
<div id="corner-tl">
  <div class="hud-label">SYSTEM</div>
  <div class="hud-val" id="sys-id">JIMMIE-OS v4.2</div>
  <div class="hud-label" style="margin-top:6px">UPTIME</div>
  <div class="hud-val" id="uptime">00:00:00</div>
  <div class="hud-label" style="margin-top:6px">CPU</div>
  <div class="hud-val hud-red" id="cpu-val">0%</div>
</div>
<div id="corner-tr">
  <div class="hud-label">KOORDINATER</div>
  <div class="hud-val hud-blue" id="coord">---.---N / ---.---E</div>
  <div class="hud-label" style="margin-top:6px">SIGNAL</div>
  <div class="hud-val hud-green" id="signal">-- dBm</div>
  <div class="hud-label" style="margin-top:6px">NODER</div>
  <div class="hud-val" id="nodes">0</div>
</div>
<div id="corner-bl">
  <div class="hud-label">PROTOKOLL</div>
  <div class="hud-val" id="proto">AES-256</div>
  <div class="hud-label" style="margin-top:6px">PAKET</div>
  <div class="hud-val hud-yellow" id="packets">0</div>
</div>
<div id="corner-br">
  <div class="hud-label">FREKVENS</div>
  <div class="hud-val hud-red" id="freq">-- GHz</div>
  <div class="hud-label" style="margin-top:6px">STATUS</div>
  <div class="hud-val" id="status">VILANDE</div>
</div>

<!-- Side panels -->
<div id="panel-l">
  <div style="color:#ff2244;font-weight:bold;margin-bottom:6px">◄ JIMMIE NET</div>
  <div id="panel-l-content"></div>
</div>
<div id="panel-r">
  <div style="color:#ff2244;font-weight:bold;margin-bottom:6px">DATASTRÖM ►</div>
  <div id="panel-r-content"></div>
</div>

<!-- Alert -->
<div id="alert">⚠ AKTIV ⚠</div>

<!-- Main stage -->
<div id="stage">
  <div id="title">Jimmie's Secret</div>
  <div id="subtitle">Klassificerad information</div>
  <div id="bigbtn">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="btn-icon">🔴</div>
    <div class="btn-text">TRYCK HÄR</div>
    <div class="btn-sub">Om du vågar</div>
  </div>
  <div style="font-size:0.6rem;color:#ff4466;opacity:0.4;letter-spacing:2px">[ HEMLIG KNAPP ]</div>
</div>

<div id="datastream"><pre id="datastream-text"></pre></div>
<a href="games.html" id="backbtn">← Tillbaka till spelen</a>

<script>
'use strict';

// ── Matrix rain ──────────────────────────────────────────────────
var mc = document.getElementById('matrix-canvas');
var mctx = mc.getContext('2d');
mc.width = window.innerWidth; mc.height = window.innerHeight;
var cols = Math.floor(mc.width / 14);
var drops = Array(cols).fill(1).map(function(){return Math.random()*mc.height/14|0;});
var matrixActive = false;
var matrixChars = 'ジサイアカタナハマヤラワガザダバパABCDEFGHIJKLMNOPRSTUVWXYZ0123456789@#$%^&*';

function drawMatrix() {
  if (!matrixActive) return;
  mctx.fillStyle = 'rgba(0,0,0,0.05)';
  mctx.fillRect(0,0,mc.width,mc.height);
  mctx.fillStyle = '#00ff44';
  mctx.font = '13px monospace';
  drops.forEach(function(y, i) {
    var ch = matrixChars[Math.random()*matrixChars.length|0];
    mctx.fillStyle = i % 5 === 0 ? '#ffffff' : '#00ff44';
    mctx.fillText(ch, i*14, y*14);
    if (y*14 > mc.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}
setInterval(drawMatrix, 40);

// ── Explosion particle system ─────────────────────────────────────
var ec = document.getElementById('explode-canvas');
var ectx = ec.getContext('2d');
ec.width = window.innerWidth; ec.height = window.innerHeight;
var particles = [];

function spawnExplosion(x, y, col, n) {
  for (var i = 0; i < (n||40); i++) {
    var ang = Math.random() * Math.PI * 2;
    var spd = 2 + Math.random() * 12;
    var size = 2 + Math.random() * 8;
    particles.push({
      x:x, y:y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
      life:1, decay:0.012+Math.random()*0.025,
      size:size, col:col,
      trail:[],
    });
  }
}

function spawnBigBang() {
  var cx = ec.width/2, cy = ec.height/2;
  var colors = ['#ff2244','#ff8800','#fecc00','#00ff88','#00aaff','#cc44ff','#ffffff'];
  colors.forEach(function(col) {
    spawnExplosion(cx, cy, col, 60);
  });
  // Ring blast
  for (var i = 0; i < 80; i++) {
    var ang = (i/80)*Math.PI*2;
    var spd = 8+Math.random()*6;
    particles.push({x:cx,y:cy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,decay:0.008,size:3+Math.random()*5,col:colors[i%colors.length],trail:[]});
  }
}

function updateParticles() {
  ectx.clearRect(0,0,ec.width,ec.height);
  for (var pi = particles.length-1; pi >= 0; pi--) {
    var p = particles[pi];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15; // gravity
    p.vx *= 0.98; p.vy *= 0.98;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(pi,1); continue; }
    p.trail.push({x:p.x,y:p.y});
    if (p.trail.length > 5) p.trail.shift();
    // Draw trail
    if (p.trail.length > 1) {
      ectx.beginPath();
      ectx.moveTo(p.trail[0].x, p.trail[0].y);
      for (var ti=1;ti<p.trail.length;ti++) ectx.lineTo(p.trail[ti].x,p.trail[ti].y);
      ectx.strokeStyle = p.col;
      ectx.globalAlpha = p.life * 0.3;
      ectx.lineWidth = p.size * 0.4;
      ectx.stroke();
    }
    // Draw particle
    ectx.globalAlpha = p.life;
    ectx.fillStyle = p.col;
    ectx.shadowColor = p.col;
    ectx.shadowBlur = 8;
    ectx.beginPath();
    ectx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2);
    ectx.fill();
    ectx.shadowBlur = 0;
    ectx.globalAlpha = 1;
  }
  // Spawn random small explosions when active
  if (matrixActive && Math.random() < 0.08) {
    var colors2 = ['#ff2244','#fecc00','#00ff88','#00aaff','#cc44ff'];
    spawnExplosion(
      Math.random()*ec.width, Math.random()*ec.height,
      colors2[Math.random()*colors2.length|0], 10
    );
  }
}
setInterval(updateParticles, 16);

// ── Random data generators ────────────────────────────────────────
function rndIP() {
  return [
    (Math.random()*223+1|0),
    (Math.random()*255|0),
    (Math.random()*255|0),
    (Math.random()*254+1|0)
  ].join('.');
}
function rndCoord() {
  var lat = (55+Math.random()*5).toFixed(4);
  var lon = (10+Math.random()*10).toFixed(4);
  return lat+'°N / '+lon+'°E';
}
function rndHex(n) {
  var h=''; for(var i=0;i<n;i++) h+='0123456789ABCDEF'[Math.random()*16|0]; return h;
}
function rndFreq() { return (2.3+Math.random()*3.5).toFixed(3); }

// ── HUD updater ───────────────────────────────────────────────────
var pressCount = 0;
var startTime = Date.now();
var hudInterval = null;

function updateHUD() {
  // Uptime
  var elapsed = Math.floor((Date.now()-startTime)/1000);
  var h=elapsed/3600|0, m=(elapsed%3600)/60|0, s=elapsed%60;
  document.getElementById('uptime').textContent =
    (h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;

  if (!matrixActive) return;

  document.getElementById('coord').textContent = rndCoord();
  document.getElementById('signal').textContent = (-40-(Math.random()*50|0))+' dBm';
  document.getElementById('nodes').textContent = 847+pressCount*23+(Math.random()*10|0);
  document.getElementById('cpu-val').textContent = (70+Math.random()*29|0)+'%';
  document.getElementById('packets').textContent = (pressCount*1847+Math.random()*500|0);
  document.getElementById('freq').textContent = rndFreq()+' GHz';
  document.getElementById('status').textContent = ['AKTIV','SÖKER','ANSLUTER','KRYPTERAR'][Math.random()*4|0];

  // Side panels
  var lLines = [];
  for (var i=0;i<6;i++) lLines.push(rndIP());
  document.getElementById('panel-l-content').innerHTML =
    lLines.map(function(ip){return '<div>'+ip+'</div>';}).join('');

  var rLines = [];
  for (var i=0;i<6;i++) rLines.push(rndHex(8)+' '+rndHex(4));
  document.getElementById('panel-r-content').innerHTML =
    rLines.map(function(h){return '<div>'+h+'</div>';}).join('');

  // Corner BR data
  document.getElementById('proto').textContent = ['AES-256','RSA-4096','JIMMIE-128','SD-CRYPT'][Math.random()*4|0];
}
setInterval(updateHUD, 800);
updateHUD();

// ── Data stream messages ──────────────────────────────────────────
var messages = [
  'SÖKER JIMMIE-NÄTVERKET...',
  'KRYPTERAT PAKET MOTTAGET',
  'ANSLUTER TILL SD-SERVRAR...',
  'AUTENTISERING PÅGÅR',
  'HEMLIG INFORMATION LADDAS',
  'JIMMIE_SECRET.DAT DEKRYPTERAS',
  'UPPRÄTTAR SÄKER KANAL',
  'DATASTRÖM AKTIV',
  'RIKSDAGSDATA STREAMAS',
  'JIMMIE ÄR ALLTID MED DIG',
  'SÄKERHETSPROTOKOLL AKTIVT',
  'ALLT ÄR UNDER KONTROLL',
];
var msgIdx = 0;
function nextMessage() {
  if (!matrixActive) return;
  var txt = messages[msgIdx % messages.length];
  msgIdx++;
  var el = document.getElementById('datastream-text');
  var hash = rndHex(8);
  el.textContent = '['+hash+'] '+txt+'\n';
  setTimeout(nextMessage, 600+Math.random()*800);
}

// ── Screen flash ──────────────────────────────────────────────────
function flashScreen(col) {
  var fl = document.createElement('div');
  fl.style.cssText = 'position:fixed;inset:0;background:'+col+';opacity:0.6;pointer-events:none;z-index:999;transition:opacity 0.3s';
  document.body.appendChild(fl);
  setTimeout(function(){ fl.style.opacity='0'; setTimeout(function(){fl.remove();},300); },80);
}

// ── BUTTON PRESS ─────────────────────────────────────────────────
var isRumbling = false;
document.getElementById('bigbtn').addEventListener('click', function() {
  pressCount++;
  var cx = ec.width/2, cy = ec.height/2;

  // Big explosion at center
  spawnBigBang();
  // Corner explosions
  [[0,0],[ec.width,0],[0,ec.height],[ec.width,ec.height]].forEach(function(pos) {
    setTimeout(function(){
      spawnExplosion(pos[0],pos[1],'#ff2244',30);
      spawnExplosion(pos[0],pos[1],'#fecc00',20);
    }, Math.random()*300);
  });

  // Flash
  flashScreen('#ff0022');

  // Activate matrix + HUD
  if (!matrixActive) {
    matrixActive = true;
    document.getElementById('matrix-canvas').style.opacity = '0.18';
    document.getElementById('corner-tl').style.opacity = '1';
    document.getElementById('corner-tr').style.opacity = '1';
    document.getElementById('corner-bl').style.opacity = '1';
    document.getElementById('corner-br').style.opacity = '1';
    document.getElementById('panel-l').style.opacity = '1';
    document.getElementById('panel-r').style.opacity = '1';
    document.getElementById('datastream').style.opacity = '1';
    nextMessage();
  }

  // Alert flash
  var alert = document.getElementById('alert');
  alert.style.opacity = '1';
  setTimeout(function(){ alert.style.opacity='0'; },600);

  // Screen shake
  if (!isRumbling) {
    isRumbling = true;
    var shakes = 0;
    var shakeInt = setInterval(function() {
      var dx=(Math.random()-0.5)*12, dy=(Math.random()-0.5)*12;
      document.getElementById('stage').style.transform = 'translate('+dx+'px,'+dy+'px)';
      shakes++;
      if (shakes>10){
        clearInterval(shakeInt);
        document.getElementById('stage').style.transform='';
        isRumbling=false;
      }
    },40);
  }

  // Glitch title
  var title = document.getElementById('title');
  title.classList.add('glitching');
  setTimeout(function(){title.classList.remove('glitching');},200);

  // Change button text occasionally
  var texts = ['TRYCKT!','HEJ JIMMIE','VAARNING!','HEMLIGT!','TRYCK IGEN','SD ÄR BÄST','⚠ AKTIV ⚠'];
  document.querySelector('#bigbtn .btn-text').textContent = texts[pressCount%texts.length];

  // Random additional explosions over next 2s
  for (var i=1;i<=6;i++) {
    setTimeout(function(){
      spawnExplosion(
        Math.random()*ec.width, Math.random()*ec.height,
        ['#ff2244','#fecc00','#00ff88','#cc44ff','#00aaff','#ff8800'][Math.random()*6|0],
        25
      );
    }, i*250+Math.random()*200);
  }
});

// Continuous gentle sparkle when idle
setInterval(function() {
  if (matrixActive) return;
  spawnExplosion(ec.width/2+((Math.random()-0.5)*40), ec.height/2+((Math.random()-0.5)*40), '#ff2244', 3);
}, 400);

window.addEventListener('resize', function() {
  mc.width=window.innerWidth; mc.height=window.innerHeight;
  ec.width=window.innerWidth; ec.height=window.innerHeight;
  drops = Array(Math.floor(mc.width/14)).fill(1);
});
</script>
</body>
</html>
