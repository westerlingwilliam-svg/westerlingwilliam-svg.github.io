<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimmie.Fun</title>
    <style>
        /* Modern design */
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f172a; /* Mörkblå/svart bakgrund */
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 40px;
            border-radius: 20px;
            background: #1e293b;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 2px solid #38bdf8; /* Ljusblå ram */
        }

        h1 {
            font-size: 3rem;
            color: #38bdf8;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-top: 10px;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Jimmie.Fun</h1>
        <p>Gjord av Wille</p>
        
        <div class="footer">
            <small>© 2026 - Skapad med kod</small>
        </div>
    </div>

</body>
</html>
