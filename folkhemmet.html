<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bygg Folkhemmet - Synergi Edition</title>
    <style>
        * { user-select: none; -webkit-user-select: none; box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
        body { background-color: #005293; color: #333; margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
        
        .header { 
            background: #fecc00; padding: 20px; text-align: center; 
            border-bottom: 5px solid #005293; box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
        }

        .main-layout { 
            display: grid; grid-template-columns: 350px 1fr 350px; 
            gap: 20px; padding: 20px; flex-grow: 1; 
        }

        .panel { 
            background: white; padding: 15px; border: 5px solid #fecc00; 
            border-radius: 10px; height: fit-content;
        }

        .center-area { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-start; padding-top: 30px;
        }

        .main-clicker { 
            background: #fff; border: 10px solid #fecc00; width: 220px; height: 220px; 
            border-radius: 50%; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; cursor: pointer; 
            box-shadow: 0 10px 0 #b38f00; transition: 0.05s; margin-bottom: 20px;
        }
        .main-clicker:active { transform: translateY(5px); box-shadow: 0 5px 0 #b38f00; }

        .buy-button { 
            background: #f0f0f0; border: 3px solid #005293; padding: 10px; margin: 8px 0; 
            cursor: pointer; display: flex; flex-direction: column;
            width: 100%; border-radius: 5px; font-family: inherit; 
        }
        .buy-button:hover:not(.disabled) { background: #e0e0e0; }
        .buy-button .top-row { display: flex; justify-content: space-between; width: 100%; font-size: 1rem; }
        .buy-button .info-row { font-size: 0.7rem; color: #666; margin-top: 4px; font-family: 'Arial', sans-serif; font-weight: bold; }
        .buy-button.disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

        .ach-card { background: #f9f9f9; border: 2px solid #005293; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .progress-container { background: #ddd; height: 12px; width: 100%; border-radius: 10px; margin-top: 5px; overflow: hidden; border: 1px solid #005293; }
        .progress-bar { background: linear-gradient(90deg, #005293, #fecc00); height: 100%; width: 0%; transition: width 0.2s; }
        
        .claim-btn { width: 100%; margin-top: 8px; padding: 8px; background: #666; border: 2px solid #444; color: white; cursor: not-allowed; border-radius: 4px; }
        .claim-btn.ready { background: #28a745; border-color: #1e7e34; cursor: pointer; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
        .plus-one { position: absolute; color: #fecc00; font-weight: bold; font-size: 1.5rem; pointer-events: none; animation: fly 0.8s forwards; text-shadow: 2px 2px 0px #005293; z-index: 1000; }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>BYGG FOLKHEMMET 🇸🇪</h1>
        <div style="font-size: 2rem;">Välfärd: <span id="money">0</span> kr</div>
        <div style="font-size: 1rem;">+<span id="pps">0</span>/sek | +<span id="mpc">1</span>/klick</div>
    </div>

    <div class="main-layout">
        <div class="panel">
            <h3>BUTIK</h3>
            <button class="buy-button" id="hammer-btn" onclick="buyHammer()">
                <div class="top-row"><b>Jimmies Hammare</b> <span id="hammer-cost">15</span> kr</div>
                <div class="info-row">Ökar din klickstyrka</div>
            </button>
            <button class="buy-button" id="auto-btn" onclick="buyAuto()">
                <div class="top-row"><b>Auto-Hammare</b> <span id="auto-cost">100</span> kr</div>
                <div class="info-row">Klickar automatiskt 1 gång/sek</div>
            </button>
            <hr>
            <div id="building-list"></div>
        </div>

        <div class="center-area">
            <div class="main-clicker" onclick="doClick(event)">
                <span style="font-size: 5rem;">🏠</span>
                <b>KLICKA!</b>
            </div>
            <a href="games.html" style="background:#333; color:white; padding:10px; text-decoration:none; border:2px solid #fecc00;">TILLBAKA</a>
        </div>

        <div class="panel">
            <h3>UPPDRAG</h3>
            <div id="ach-license-area">
                <button class="buy-button" onclick="buyLicense()" style="background:#fecc00;">LÅS UPP JIMMIE (1000 kr)</button>
            </div>
            <div id="ach-container"></div>
        </div>
    </div>

    <script>
        let data = {
            money: 0, clicks: 0, mpc: 1, autoClicks: 0,
            hammerPrice: 15, autoPrice: 100,
            hasLicense: false,
            achLevels: { click: 0, money: 0, b0: 0, b1: 0, b2: 0, b3: 0 },
            bCounts: [0, 0, 0, 0, 0, 0, 0],
            bCosts: [15, 100, 500, 2500, 15000, 100000, 1000000]
        };

        const buildings = [
            { name: "Röd Stuga", inc: 1 }, { name: "Hyreshus", inc: 8 },
            { name: "Sjukhus", inc: 45 }, { name: "Industri", inc: 180 },
            { name: "Universitet", inc: 750 }, { name: "Kärnkraft", inc: 3500 },
            { name: "Välfärdsstat", inc: 15000 }
        ];

        const achChains = {
            click: [{ t: "Klick-start", target: 50, reward: 500 }, { t: "Klick-maskin", target: 500, reward: 5000 }],
            money: [{ t: "Småsparare", target: 5000, reward: 1000 }, { t: "Miljonär", target: 1000000, reward: 200000 }],
            b0: [{ t: "Stugby", target: 10, reward: 500 }, { t: "Småland", target: 50, reward: 10000 }]
        };

        function getProduction(id) {
            // Varje ägd byggnad ger 1% extra till alla av samma typ
            let bonus = 1 + (data.bCounts[id] * 0.01);
            return buildings[id].inc * bonus;
        }

        function getTotalPPS() {
            let pps = 0;
            for(let i=0; i<buildings.length; i++) {
                pps += data.bCounts[i] * getProduction(i);
            }
            return pps;
        }

        function doClick(e) {
            data.money += data.mpc; data.clicks++;
            if(e) {
                const t = document.createElement("div"); t.className = "plus-one"; t.innerText = "+" + data.mpc;
                t.style.left = e.pageX + "px"; t.style.top = e.pageY + "px";
                document.body.appendChild(t); setTimeout(() => t.remove(), 800);
            }
            updateNumbersOnly();
        }

        function buyHammer() {
            if (data.money >= data.hammerPrice) {
                data.money -= data.hammerPrice; data.mpc++;
                data.hammerPrice = Math.round(data.hammerPrice * 2.2);
                renderEverything();
            }
        }

        function buyAuto() {
            if (data.money >= data.autoPrice) {
                data.money -= data.autoPrice; data.autoClicks++;
                data.autoPrice = Math.round(data.autoPrice * 2.5);
                renderEverything();
            }
        }

        function buyBuilding(id) {
            if (data.money >= data.bCosts[id]) {
                data.money -= data.bCosts[id]; data.bCounts[id]++;
                data.bCosts[id] = Math.round(data.bCosts[id] * 1.18);
                renderEverything();
            }
        }

        function buyLicense() { if (data.money >= 1000) { data.money -= 1000; data.hasLicense = true; renderEverything(); } }

        function claimAch(type) {
            const level = data.achLevels[type];
            if (getValByType(type) >= achChains[type][level].target) {
                data.money += achChains[type][level].reward;
                data.achLevels[type]++;
                renderEverything();
            }
        }

        function getValByType(type) {
            if(type === 'click') return data.clicks;
            if(type === 'money') return data.money;
            if(type.startsWith('b')) return data.bCounts[parseInt(type.substring(1))];
            return 0;
        }

        function updateNumbersOnly() {
            document.getElementById("money").innerText = Math.floor(data.money).toLocaleString();
            document.getElementById("mpc").innerText = data.mpc;
            document.getElementById("pps").innerText = Math.floor(getTotalPPS()).toLocaleString();
            
            document.getElementById("hammer-btn").classList.toggle("disabled", data.money < data.hammerPrice);
            document.getElementById("auto-btn").classList.toggle("disabled", data.money < data.autoPrice);
            
            for(let i=0; i<buildings.length; i++) {
                const btn = document.getElementById("build-"+i);
                if(btn) btn.classList.toggle("disabled", data.money < data.bCosts[i]);
            }
            localStorage.setItem('folkhem_save_synergy', JSON.stringify(data));
        }

        function renderEverything() {
            document.getElementById("hammer-cost").innerText = data.hammerPrice.toLocaleString();
            document.getElementById("auto-cost").innerText = data.autoPrice.toLocaleString();
            
            let bHtml = "";
            buildings.forEach((b, i) => {
                let currentProd = getProduction(i).toFixed(1);
                bHtml += `
                    <button class="buy-button" id="build-${i}" onclick="buyBuilding(${i})">
                        <div class="top-row"><b>${b.name} (${data.bCounts[i]})</b> <span>${data.bCosts[i].toLocaleString()} kr</span></div>
                        <div class="info-row">Ger just nu: ${currentProd}/sek styck</div>
                    </button>`;
            });
            document.getElementById("building-list").innerHTML = bHtml;

            document.getElementById("ach-license-area").style.display = data.hasLicense ? "none" : "block";
            if (data.hasLicense) {
                let html = "";
                Object.keys(achChains).forEach(type => {
                    const level = data.achLevels[type];
                    if (level < achChains[type].length) {
                        const ach = achChains[type][level];
                        const val = getValByType(type);
                        html += `
                            <div class="ach-card">
                                <b>${ach.t}</b><br><small>Belöning: ${ach.reward} kr</small>
                                <div class="progress-container"><div class="progress-bar" style="width: ${Math.min(100, (val/ach.target)*100)}%"></div></div>
                                <button class="claim-btn ${val >= ach.target ? 'ready' : ''}" onclick="claimAch('${type}')">HÄMTA</button>
                            </div>`;
                    }
                });
                document.getElementById("ach-container").innerHTML = html || "<p>Bra jobbat!</p>";
            }
            updateNumbersOnly();
        }

        // Gameloop: 10 gånger per sekund
        setInterval(() => {
            data.money += getTotalPPS() / 10;
            // Hantera Auto-hammare
            if(data.autoClicks > 0) {
                data.money += (data.autoClicks * data.mpc) / 10;
            }
            updateNumbersOnly();
        }, 100);

        window.onload = () => {
            let s = localStorage.getItem('folkhem_save_synergy');
            if (s) Object.assign(data, JSON.parse(s));
            renderEverything();
        };
    </script>
</body>
</html>
